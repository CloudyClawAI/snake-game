<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe — CloudyClaw Games</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7c6aff" />
  <link rel="stylesheet" href="design-system.css" />
  <style>
    .status {
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      min-height: 1.6em;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      background: var(--surface);
      padding: 12px;
      border-radius: var(--radius-card);
      border: 1px solid var(--border);
      width: min(340px, 90vw);
    }

    .cell {
      aspect-ratio: 1;
      background: var(--bg);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-hi);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2rem, 12vw, 3.5rem);
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    .cell:hover:not(.x):not(.o) { background: var(--surface-2); }
    .cell:active:not(.x):not(.o) { transform: scale(0.95); }
    .cell.x { color: #f43f5e; }
    .cell.o { color: #10b981; }

    .winning-cell {
      background: rgba(124,106,255,0.18) !important;
      border-color: var(--accent) !important;
      animation: pulse 0.9s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.07); }
    }

    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .stat-tile.x-badge .stat-value { color: #f43f5e; }
    .stat-tile.o-badge .stat-value { color: #10b981; }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <a href="index.html" class="nav-brand">Cloudy<span>Claw</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Games</a>
    </div>
  </nav>

  <div class="game-shell">
    <main class="game-main">
      <header class="game-header">
        <a href="index.html" class="back-link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13l-5-5 5-5"/></svg>Back to Hub</a>
        <h1 class="game-title">Tic-Tac-Toe</h1>
        <p class="game-subtitle">Classic 3×3 duel for two players.</p>
      </header>

      <div class="status" id="status">Player X's Turn</div>

      <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="reset">Reset Game</button>
        <button class="btn btn-secondary" id="reset-scores">Clear Scores</button>
      </div>
    </main>

    <aside class="game-sidebar">
      <div class="stat-grid">
        <div class="stat-tile x-badge">
          <span class="stat-label">X Wins</span>
          <span class="stat-value" id="x-wins">0</span>
        </div>
        <div class="stat-tile">
          <span class="stat-label">Draws</span>
          <span class="stat-value" id="draws">0</span>
        </div>
        <div class="stat-tile o-badge">
          <span class="stat-label">O Wins</span>
          <span class="stat-value" id="o-wins">0</span>
        </div>
      </div>
      <div class="lb-panel">
        <h3>Top Scores</h3>
        <div id="lb-tictactoe"></div>
      </div>
    </aside>
  </div>

  <script src="leaderboard.js"></script>
  <script src="leaderboard-cloud.js"></script>
  <script>
    const GAME_KEY = 'tictactoe';
    const boardElement = document.getElementById('board');
    const statusElement = document.getElementById('status');
    const cells = document.querySelectorAll('.cell');
    const xWinsEl = document.getElementById('x-wins');
    const oWinsEl = document.getElementById('o-wins');
    const drawsEl = document.getElementById('draws');

    let currentPlayer = 'X';
    let gameState = Array(9).fill('');
    let gameActive = true;
    let sessionXWins = 0, sessionOWins = 0, sessionDraws = 0;

    const winConditions = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    function handleCellClick(e) {
      const idx = parseInt(e.currentTarget.getAttribute('data-index'));
      if (gameState[idx] !== '' || !gameActive) return;
      gameState[idx] = currentPlayer;
      e.currentTarget.textContent = currentPlayer;
      e.currentTarget.classList.add(currentPlayer.toLowerCase());
      checkResult();
    }

    function checkResult() {
      for (const [a, b, c] of winConditions) {
        if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
          statusElement.textContent = `Player ${currentPlayer} Wins!`;
          [a, b, c].forEach(i => cells[i].classList.add('winning-cell'));
          gameActive = false;
          if (currentPlayer === 'X') { sessionXWins++; xWinsEl.textContent = sessionXWins; }
          else { sessionOWins++; oWinsEl.textContent = sessionOWins; }
          // Save combined score: X wins count as positive signal
          Leaderboard.saveScore(GAME_KEY, sessionXWins + sessionOWins);
          Leaderboard.renderWidget(GAME_KEY, 'lb-tictactoe');
          return;
        }
      }
      if (!gameState.includes('')) {
        statusElement.textContent = "It's a Draw!";
        sessionDraws++; drawsEl.textContent = sessionDraws;
        gameActive = false;
        return;
      }
      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      statusElement.textContent = `Player ${currentPlayer}'s Turn`;
    }

    function resetGame() {
      currentPlayer = 'X';
      gameState = Array(9).fill('');
      gameActive = true;
      statusElement.textContent = "Player X's Turn";
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
    }

    Leaderboard.renderWidget(GAME_KEY, 'lb-tictactoe');
    cells.forEach(cell => cell.addEventListener('click', handleCellClick));
    document.getElementById('reset').addEventListener('click', resetGame);
    document.getElementById('reset-scores').addEventListener('click', () => {
      sessionXWins = sessionOWins = sessionDraws = 0;
      xWinsEl.textContent = oWinsEl.textContent = drawsEl.textContent = '0';
    });
  </script>
</body>
</html>
