<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe — CloudyClaw Games</title>
    <meta name="description" content="Classic 3×3 Tic-Tac-Toe for two players locally. Winning cells animate on victory, instant reset to play again. No download needed." />
    <meta property="og:title" content="Tic-Tac-Toe — CloudyClaw Games" />
    <meta property="og:description" content="Classic 3×3 Tic-Tac-Toe for two players. Winning cells animate on victory. Play free in your browser." />
    <meta property="og:image" content="https://cloudyclawai.github.io/snake-game/og-preview.png" />
    <meta property="og:url" content="https://cloudyclawai.github.io/snake-game/tic-tac-toe.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://cloudyclawai.github.io/snake-game/tic-tac-toe.html" />
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --primary: #38bdf8;
            --secondary: #818cf8;
            --x-color: #f43f5e;
            --o-color: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .status {
            margin-bottom: 2rem;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            background-color: var(--card);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .cell {
            width: 100px;
            height: 100px;
            background-color: var(--bg);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cell:hover {
            background-color: #1e293b;
            transform: scale(1.02);
        }

        .cell.x { color: var(--x-color); }
        .cell.o { color: var(--o-color); }

        .controls {
            margin-top: 2rem;
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .winning-cell {
            background-color: #334155 !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <h1>Tic Tac Toe</h1>
    <div class="status" id="status">Player X's Turn</div>
    
    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <div class="controls">
        <button id="reset">Reset Game</button>
        <button id="share-btn" style="display:none;background:transparent;color:#7c6aff;border:1px solid #7c6aff66;border-radius:6px;padding:0.5rem 1.4rem;font-size:0.9rem;font-weight:bold;cursor:pointer;letter-spacing:0.06em;margin-left:0.5rem">🔗 Share Result</button>
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const shareBtn = document.getElementById('share-btn');

        function shareResult(message) {
          const text = `${message} at Tic-Tac-Toe on https://cloudyclawai.github.io/snake-game/ — can you win?`;
          if (navigator.share) {
            navigator.share({ text }).catch(() => {});
          } else {
            navigator.clipboard.writeText(text).then(() => {
              shareBtn.textContent = '✓ Copied!';
              setTimeout(() => { shareBtn.textContent = '🔗 Share Result'; }, 2000);
            }).catch(() => {});
          }
        }
        const resetBtn = document.getElementById('reset');
        const cells = document.querySelectorAll('.cell');

        let currentPlayer = 'X';
        let gameState = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        function handleCellClick(e) {
            const clickedCell = e.target;
            const clickedIndex = parseInt(clickedCell.getAttribute('data-index'));

            if (gameState[clickedIndex] !== "" || !gameActive) return;

            updateCell(clickedCell, clickedIndex);
            checkResult();
        }

        function updateCell(cell, index) {
            gameState[index] = currentPlayer;
            cell.innerText = currentPlayer;
            cell.classList.add(currentPlayer.toLowerCase());
        }

        function checkResult() {
            let roundWon = false;
            let winningCells = [];

            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
                    roundWon = true;
                    winningCells = [a, b, c];
                    break;
                }
            }

            if (roundWon) {
                statusElement.innerText = `Player ${currentPlayer} Wins!`;
                highlightWinningCells(winningCells);
                gameActive = false;
                shareBtn.style.display = 'inline-block';
                shareBtn.onclick = () => shareResult(`Player ${currentPlayer} wins`);
                return;
            }

            if (!gameState.includes("")) {
                statusElement.innerText = "It's a Draw!";
                gameActive = false;
                shareBtn.style.display = 'inline-block';
                shareBtn.onclick = () => shareResult("It was a Draw");
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            statusElement.innerText = `Player ${currentPlayer}'s Turn`;
        }

        function highlightWinningCells(indices) {
            indices.forEach(index => {
                cells[index].classList.add('winning-cell');
            });
        }

        function resetGame() {
            currentPlayer = 'X';
            gameState = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            statusElement.innerText = "Player X's Turn";
            shareBtn.style.display = 'none';
            cells.forEach(cell => {
                cell.innerText = "";
                cell.classList.remove('x', 'o', 'winning-cell');
            });
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        resetBtn.addEventListener('click', resetGame);
    </script>
</body>
</html>
