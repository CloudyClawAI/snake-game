<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Match — CloudyClaw Games</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7c6aff" />
  <link rel="stylesheet" href="design-system.css" />
  <style>
    :root {
      --match-glow: #22c55e55;
      --match-border: #22c55e;
      --card-back: #1c1a36;
      --card-back-border: #2e2b58;
    }

    .difficulty-row {
      display: flex;
      gap: 0.5rem;
    }
    .diff-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 0.4rem 1rem;
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }
    .diff-btn:hover { border-color: var(--accent); color: var(--accent); }
    .diff-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      gap: 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.65rem 1.4rem;
      width: 100%;
      max-width: 560px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
    }
    .stat .stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .stat .stat-val {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
    }
    .stat .stat-val.best { color: var(--accent); }
    .stat-divider { width: 1px; background: var(--border); align-self: stretch; }

    /* CARD GRID */
    .card-grid {
      display: grid;
      gap: 8px;
      width: 100%;
      max-width: 560px;
    }
    /* grid columns set via JS */

    /* CARD */
    .card-wrap {
      aspect-ratio: 1;
      perspective: 600px;
      cursor: pointer;
    }
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 10px;
    }
    .card-wrap.flipped .card-inner  { transform: rotateY(180deg); }
    .card-wrap.matched .card-inner  { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .card-back-face {
      background: var(--card-back);
      border: 1px solid var(--card-back-border);
      font-size: 1.4rem;
      color: var(--text-muted);
      box-shadow: inset 0 1px 4px #00000044;
    }
    /* subtle pattern on card back */
    .card-back-face::before {
      content: '✦';
      font-size: 1.2rem;
      color: var(--card-back-border);
    }
    .card-front-face {
      background: #1e1b3a;
      border: 1px solid #2e2b58;
      transform: rotateY(180deg);
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      transition: box-shadow 0.3s;
    }
    .card-wrap.matched .card-front-face {
      border-color: var(--match-border);
      box-shadow: 0 0 16px var(--match-glow), inset 0 0 8px #22c55e22;
      background: #122112;
    }
    .card-wrap.wrong .card-inner {
      animation: wrongShake 0.4s ease;
    }
    @keyframes wrongShake {
      0%   { transform: rotateY(180deg) translateX(0); }
      20%  { transform: rotateY(180deg) translateX(-5px); }
      40%  { transform: rotateY(180deg) translateX(5px); }
      60%  { transform: rotateY(180deg) translateX(-4px); }
      80%  { transform: rotateY(180deg) translateX(4px); }
      100% { transform: rotateY(180deg) translateX(0); }
    }

    /* Match pop */
    .card-wrap.matched .card-front-face {
      animation: matchPop 0.35s ease-out forwards;
    }
    @keyframes matchPop {
      0%   { transform: rotateY(180deg) scale(1); }
      50%  { transform: rotateY(180deg) scale(1.12); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    /* CONTROLS */
    .controls {
      display: flex;
      gap: 0.7rem;
    }
    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.55rem 1.3rem;
      font-size: 0.88rem;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      letter-spacing: 0.04em;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    .btn.primary:hover { background: #9b8fff; border-color: #9b8fff; color: #fff; }

    .game-modal {
      position: fixed;
      inset: 0;
      background: #0a0a14cc;
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    .game-modal.show {
      opacity: 1;
      pointer-events: all;
    }
    .overlay-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 2.4rem;
      text-align: center;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 0 60px var(--accent-glow);
      transform: scale(0.88);
      transition: transform 0.35s;
    }
    .game-modal.show .overlay-card { transform: scale(1); }
    .overlay-card .trophy { font-size: 3rem; margin-bottom: 0.5rem; }
    .overlay-card h2 { font-size: 1.7rem; color: #fff; margin-bottom: 0.4rem; }
    .overlay-card p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.25rem; }
    .overlay-card .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin: 1rem 0 1.4rem;
    }
    .overlay-card .st {
      background: #ffffff08;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem;
    }
    .overlay-card .st-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .overlay-card .st-val { font-size: 1.2rem; font-weight: 700; color: #fff; margin-top: 0.1rem; }
    .overlay-card .st-val.new-best { color: #22c55e; }
    .overlay-btns { display: flex; gap: 0.8rem; justify-content: center; }

    /* Responsive */
    @media (max-width: 380px) {
      .stats-bar { gap: 0.7rem; padding: 0.5rem 0.8rem; }
      .card-grid { gap: 5px; }
    }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <a href="index.html" class="nav-brand">Cloudy<span>Claw</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Games</a>
    </div>
  </nav>

  <div class="game-shell">
    <main class="game-main">
      <header class="game-header">
        <a href="index.html" class="back-link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13l-5-5 5-5"/></svg>Back to Hub</a>
        <h1 class="game-title">Memory Match</h1>
        <p class="game-subtitle">Flip cards and find matching pairs.</p>
      </header>

      <div class="difficulty-row" id="diffRow">
        <button class="diff-btn chip active" data-diff="easy">Easy (4×4)</button>
        <button class="diff-btn chip" data-diff="medium">Medium (4×6)</button>
        <button class="diff-btn chip" data-diff="hard">Hard (5×6)</button>
      </div>

      <div class="card-grid" id="cardGrid"></div>

      <div class="controls">
        <button class="btn btn-primary" id="btnNew">New Game</button>
      </div>
    </main>

    <aside class="game-sidebar">
      <div class="stat-grid">
        <div class="stat-tile">
          <span class="stat-label">Moves</span>
          <span class="stat-value" id="statMoves">0</span>
        </div>
        <div class="stat-tile">
          <span class="stat-label">Time</span>
          <span class="stat-value" id="statTime">0:00</span>
        </div>
        <div class="stat-tile">
          <span class="stat-label">Best Moves</span>
          <span class="stat-value" id="statBestMoves">—</span>
        </div>
        <div class="stat-tile">
          <span class="stat-label">Best Time</span>
          <span class="stat-value" id="statBestTime">—</span>
        </div>
        <div class="stat-tile">
          <span class="stat-label">Pairs</span>
          <span class="stat-value" id="statPairs">0 / 0</span>
        </div>
      </div>
    </aside>
  </div>

  <div class="game-modal" id="overlay">
  <div class="overlay-card">
    <div class="trophy">🏆</div>
    <h2>You Won!</h2>
    <p>All pairs matched!</p>
    <div class="stats-grid">
      <div class="st">
        <div class="st-label">Moves</div>
        <div class="st-val" id="ovMoves">—</div>
      </div>
      <div class="st">
        <div class="st-label">Time</div>
        <div class="st-val" id="ovTime">—</div>
      </div>
      <div class="st">
        <div class="st-label">Best Moves</div>
        <div class="st-val" id="ovBestMoves">—</div>
      </div>
      <div class="st">
        <div class="st-label">Best Time</div>
        <div class="st-val" id="ovBestTime">—</div>
      </div>
    </div>
    <div class="overlay-btns">
      <button class="btn primary" id="btnRestart">Play Again</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const ALL_EMOJIS = ['🎮','🎯','🎲','🎪','🎨','🎭','🎬','🎤','🌟','⚡','🔥','💎','🏆','🌈','🦋','🎸'];

  const DIFFICULTIES = {
    easy:   { cols: 4, rows: 4, pairs: 8,  label: '4×4' },
    medium: { cols: 4, rows: 6, pairs: 12, label: '4×6' },
    hard:   { cols: 5, rows: 6, pairs: 15, label: '5×6' },
  };

  const LS_KEY = 'mm_bests';

  // State
  let currentDiff = 'easy';
  let cards = [];          // [{id, emoji, el, flipped, matched}]
  let firstCard = null, secondCard = null;
  let lockBoard = false;
  let moves = 0, matchedPairs = 0, totalPairs = 0;
  let timerInterval = null, elapsedSeconds = 0, timerStarted = false;
  let bests = {};          // { easy: {moves, time}, medium: {...}, hard: {...} }

  // DOM
  const cardGrid   = document.getElementById('cardGrid');
  const statMoves  = document.getElementById('statMoves');
  const statTime   = document.getElementById('statTime');
  const statBestMoves = document.getElementById('statBestMoves');
  const statBestTime  = document.getElementById('statBestTime');
  const statPairs  = document.getElementById('statPairs');
  const overlay    = document.getElementById('overlay');
  const ovMoves    = document.getElementById('ovMoves');
  const ovTime     = document.getElementById('ovTime');
  const ovBestMoves= document.getElementById('ovBestMoves');
  const ovBestTime = document.getElementById('ovBestTime');
  const btnNew     = document.getElementById('btnNew');
  const btnRestart = document.getElementById('btnRestart');
  const diffRow    = document.getElementById('diffRow');

  // ---- STORAGE ----
  function loadBests() {
    try {
      const d = JSON.parse(localStorage.getItem(LS_KEY));
      if (d && typeof d === 'object') bests = d;
    } catch (_) {}
  }
  function saveBests() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(bests)); } catch (_) {}
  }
  function getBest(diff) {
    return bests[diff] || null;
  }

  // ---- TIMER ----
  function startTimer() {
    if (timerStarted) return;
    timerStarted = true;
    timerInterval = setInterval(() => {
      elapsedSeconds++;
      statTime.textContent = formatTime(elapsedSeconds);
    }, 1000);
  }
  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  function resetTimer() {
    stopTimer();
    elapsedSeconds = 0;
    timerStarted = false;
    statTime.textContent = '0:00';
  }
  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  // ---- SHUFFLE ----
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ---- BEST DISPLAY ----
  function renderBestStats() {
    const b = getBest(currentDiff);
    if (b) {
      statBestMoves.textContent = b.moves;
      statBestTime.textContent  = formatTime(b.time);
    } else {
      statBestMoves.textContent = '—';
      statBestTime.textContent  = '—';
    }
  }

  // ---- NEW GAME ----
  function newGame() {
    const cfg = DIFFICULTIES[currentDiff];
    totalPairs = cfg.pairs;
    moves = 0;
    matchedPairs = 0;
    firstCard = null;
    secondCard = null;
    lockBoard = false;

    resetTimer();
    overlay.classList.remove('show');

    statMoves.textContent = '0';
    statPairs.textContent = `0 / ${totalPairs}`;
    renderBestStats();

    // Build card data
    const emojis = ALL_EMOJIS.slice(0, totalPairs);
    const deck = shuffle([...emojis, ...emojis]);

    // Set grid
    cardGrid.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
    cardGrid.innerHTML = '';
    cards = [];

    deck.forEach((emoji, idx) => {
      const wrap = document.createElement('div');
      wrap.className = 'card-wrap';
      wrap.setAttribute('role', 'button');
      wrap.setAttribute('aria-label', 'Memory card');
      wrap.setAttribute('tabindex', '0');

      const inner = document.createElement('div');
      inner.className = 'card-inner';

      const backFace = document.createElement('div');
      backFace.className = 'card-face card-back-face';

      const frontFace = document.createElement('div');
      frontFace.className = 'card-face card-front-face';
      frontFace.textContent = emoji;

      inner.appendChild(backFace);
      inner.appendChild(frontFace);
      wrap.appendChild(inner);
      cardGrid.appendChild(wrap);

      const cardObj = { id: idx, emoji, el: wrap, flipped: false, matched: false };
      cards.push(cardObj);

      wrap.addEventListener('click', () => handleCardClick(cardObj));
      wrap.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          handleCardClick(cardObj);
        }
      });
    });
  }

  // ---- CARD CLICK ----
  function handleCardClick(card) {
    if (lockBoard) return;
    if (card.flipped || card.matched) return;

    startTimer();

    card.flipped = true;
    card.el.classList.add('flipped');

    if (!firstCard) {
      firstCard = card;
      return;
    }

    secondCard = card;
    lockBoard = true;
    moves++;
    statMoves.textContent = moves;

    if (firstCard.emoji === secondCard.emoji) {
      // Match!
      setTimeout(() => {
        firstCard.matched = true;
        secondCard.matched = true;
        firstCard.el.classList.add('matched');
        secondCard.el.classList.add('matched');
        firstCard.el.classList.remove('flipped');
        secondCard.el.classList.remove('flipped');

        matchedPairs++;
        statPairs.textContent = `${matchedPairs} / ${totalPairs}`;

        resetPair();

        if (matchedPairs === totalPairs) {
          stopTimer();
          setTimeout(showWin, 400);
        }
      }, 200);
    } else {
      // No match
      setTimeout(() => {
        firstCard.el.classList.add('wrong');
        secondCard.el.classList.add('wrong');
        setTimeout(() => {
          firstCard.el.classList.remove('flipped', 'wrong');
          secondCard.el.classList.remove('flipped', 'wrong');
          firstCard.flipped = false;
          secondCard.flipped = false;
          resetPair();
        }, 400);
      }, 600);
    }
  }

  function resetPair() {
    firstCard = null;
    secondCard = null;
    lockBoard = false;
  }

  // ---- WIN ----
  function showWin() {
    const b = getBest(currentDiff);
    let newBestMoves = false, newBestTime = false;

    if (!b || moves < b.moves) {
      newBestMoves = true;
    }
    if (!b || elapsedSeconds < b.time) {
      newBestTime = true;
    }

    // Update best
    if (!b) {
      bests[currentDiff] = { moves, time: elapsedSeconds };
    } else {
      if (moves < b.moves) b.moves = moves;
      if (elapsedSeconds < b.time) b.time = elapsedSeconds;
    }
    saveBests();
    renderBestStats();

    // Overlay
    ovMoves.textContent = moves;
    ovTime.textContent  = formatTime(elapsedSeconds);

    const bestNow = bests[currentDiff];
    ovBestMoves.textContent = bestNow.moves;
    ovBestTime.textContent  = formatTime(bestNow.time);

    if (newBestMoves) ovBestMoves.classList.add('new-best');
    else ovBestMoves.classList.remove('new-best');
    if (newBestTime) ovBestTime.classList.add('new-best');
    else ovBestTime.classList.remove('new-best');

    overlay.classList.add('show');
  }

  // ---- DIFFICULTY ----
  diffRow.addEventListener('click', e => {
    const btn = e.target.closest('.diff-btn');
    if (!btn) return;
    const diff = btn.dataset.diff;
    if (diff === currentDiff) return;
    currentDiff = diff;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b.dataset.diff === diff));
    newGame();
  });

  btnNew.addEventListener('click', newGame);
  btnRestart.addEventListener('click', newGame);

  // ---- BOOT ----
  loadBests();
  newGame();
})();
</script>
</body>
</html>
