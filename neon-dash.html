<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Dash — CloudyClaw Games</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7c6aff" />
  <link rel="stylesheet" href="design-system.css" />
  <style>
    :root {
      --bg1: #07111f;
      --bg2: #0d1b31;
      --panel: rgba(9, 18, 36, 0.78);
      --panel-border: rgba(255,255,255,0.1);
      --text: #e6f1ff;
      --muted: #8ea6c9;
      --accent: #7c6aff;
      --accent-2: #ff6a9b;
      --danger: #ff5c8a;
      --gold: #ffd86b;
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg1);
      color: var(--text);
    }

    .back-link {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 20;
    }

    .app {
      width: min(94vw, 1100px);
      margin: 4rem auto 1rem;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      align-items: stretch;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .game-shell {
      display: block;
      max-width: none;
      margin: 0;
      padding: 18px;
      position: relative;
      overflow: hidden;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    .brand h1 {
      font-size: clamp(1.4rem, 2vw, 2rem);
      margin: 0;
      letter-spacing: 0.04em;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      min-width: 74px;
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat strong {
      font-size: 1.1rem;
    }

    .canvas-wrap {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      aspect-ratio: 16 / 9;
      background: #000;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      background: rgba(0,0,0,0.7);
      transition: opacity 0.2s;
      z-index: 10;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-card {
      padding: 2rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      max-width: 400px;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: var(--radius-sm);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s;
    }

    button:hover { transform: scale(1.05); }

    .side {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .side { display: none; }
    }

    @media (max-width: 560px) {
      body {
        align-items: stretch;
        overflow-y: auto;
      }

      .app {
        width: 100%;
        margin: 3.5rem 0 0;
        padding: 0 0.75rem 1rem;
      }

      .hud {
        align-items: flex-start;
        flex-direction: column;
      }

      .stats {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Hub</a>

  <main class="app">
    <section class="panel game-shell">
      <div class="hud">
        <div class="brand">
          <h1>Neon Dash</h1>
        </div>
        <div class="stats">
          <div class="stat"><span>Distance</span><strong id="distance">0m</strong></div>
          <div class="stat"><span>Best</span><strong id="best">0m</strong></div>
          <div class="stat"><span>Multiplier</span><strong id="multiplier">1.0x</strong></div>
          <div class="stat"><span>Speed</span><strong id="speed">1.0x</strong></div>
        </div>
      </div>

      <div class="canvas-wrap">
        <canvas id="gameCanvas"></canvas>
        <div id="overlay" class="overlay">
          <div class="overlay-card">
            <h2 id="overlay-title">Neon Dash</h2>
            <p id="overlay-desc">Jump over obstacles and survive as long as you can!</p>
            <p style="font-size: 0.8rem; color: var(--muted); margin: 1rem 0;">Space / Click to Jump (Double jump enabled)</p>
            <button id="start-btn">Start Game</button>
          </div>
        </div>
      </div>
    </section>

    <aside class="panel side">
      <div class="card">
        <h3>Leaderboard</h3>
        <div id="lb-panel"></div>
      </div>
      <div class="card">
        <h3>Controls</h3>
        <p style="font-size: 0.85rem;">
          <strong>Space / Up / Tap:</strong> Jump<br>
          <strong>Double Tap:</strong> Double Jump<br>
          <strong>In Portal:</strong> Flip Gravity
        </p>
      </div>
    </aside>
  </main>

  <script src="leaderboard.js"></script>
  <script src="leaderboard-cloud.js"></script>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const distanceEl = document.getElementById('distance');
    const bestEl = document.getElementById('best');
    const multiplierEl = document.getElementById('multiplier');
    const speedEl = document.getElementById('speed');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');

    // Game Constants
    const GRAVITY = 0.6;
    const JUMP_FORCE = -10;
    const GROUND_HEIGHT = 80;
    const PLAYER_SIZE = 30;
    const INITIAL_SPEED = 5;

    let state = {
      running: false,
      distance: 0,
      best: parseInt(localStorage.getItem('neon-dash-best') || 0),
      speed: 1,
      multiplier: 1,
      streak: 0,
      checkpoint: 0,
      lastCheckpointDistance: 0,
      player: {
        x: 100,
        y: 0,
        vy: 0,
        jumps: 0,
        gravityDir: 1, // 1 for down, -1 for up
        rotation: 0
      },
      obstacles: [],
      particles: [],
      lastTime: 0,
      seed: Math.random().toString(36).substring(7),
      nextObstacleX: 600,
      message: '',
      messageTimer: 0
    };

    // Simple seeded PRNG
    function seededRandom(seed) {
      let x = Math.sin(seed++) * 10000;
      return x - Math.floor(x);
    }

    function resize() {
      const wrap = canvas.parentElement;
      canvas.width = wrap.clientWidth;
      canvas.height = wrap.clientHeight;
      state.player.y = canvas.height - GROUND_HEIGHT - PLAYER_SIZE;
    }

    window.addEventListener('resize', resize);
    resize();

    function init(fromCheckpoint = false) {
      if (!fromCheckpoint) {
        state.distance = 0;
        state.checkpoint = 0;
        state.lastCheckpointDistance = 0;
      } else {
        state.distance = state.lastCheckpointDistance;
      }
      
      state.speed = 1 + Math.floor(state.distance / 200) * 0.2;
      state.multiplier = 1 + Math.floor(state.distance / 100) * 0.1;
      state.streak = 0;
      state.player.y = canvas.height - GROUND_HEIGHT - PLAYER_SIZE;
      state.player.vy = 0;
      state.player.jumps = 0;
      state.player.gravityDir = 1;
      state.player.rotation = 0;
      state.obstacles = [];
      state.particles = [];
      state.nextObstacleX = canvas.width + 200;
      state.seed = Math.random().toString(36).substring(7);
      updateHud();
    }

    function updateHud() {
      distanceEl.textContent = Math.floor(state.distance) + 'm';
      bestEl.textContent = Math.floor(state.best) + 'm';
      multiplierEl.textContent = state.multiplier.toFixed(1) + 'x';
      speedEl.textContent = state.speed.toFixed(1) + 'x';
    }

    function jump() {
      if (!state.running) return;
      
      if (state.player.jumps < 2) {
        state.player.vy = JUMP_FORCE * state.player.gravityDir;
        state.player.jumps++;
        createParticles(state.player.x + PLAYER_SIZE/2, state.player.y + PLAYER_SIZE/2, '#7c6aff', 10);
      }
    }

    function createParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        state.particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 10,
          vy: (Math.random() - 0.5) * 10,
          life: 1,
          color
        });
      }
    }

    function spawnObstacle() {
      const types = ['spike', 'block', 'portal'];
      const r = seededRandom(state.distance + state.obstacles.length);
      const type = types[Math.floor(r * types.length)];
      
      let obs = {
        x: state.nextObstacleX,
        type: type,
        w: 30,
        h: 30
      };

      if (type === 'spike') {
        obs.y = state.player.gravityDir === 1 ? canvas.height - GROUND_HEIGHT - 30 : GROUND_HEIGHT;
      } else if (type === 'block') {
        obs.y = state.player.gravityDir === 1 ? canvas.height - GROUND_HEIGHT - 80 : GROUND_HEIGHT + 50;
        obs.w = 60;
        obs.h = 20;
      } else if (type === 'portal') {
        obs.y = canvas.height / 2 - 40;
        obs.w = 20;
        obs.h = 80;
      }

      state.obstacles.push(obs);
      state.nextObstacleX += 300 + seededRandom(state.distance) * (400 / state.speed);
    }

    function gameOver() {
      state.running = false;
      if (state.distance > state.best) {
        state.best = state.distance;
        localStorage.setItem('neon-dash-best', state.best);
        if (typeof Leaderboard !== 'undefined') {
          Leaderboard.saveScore('neon-dash', Math.floor(state.best));
        }
      }
      
      createParticles(state.player.x + PLAYER_SIZE/2, state.player.y + PLAYER_SIZE/2, '#ff5c8a', 50);
      
      document.getElementById('overlay-title').textContent = 'Game Over';
      document.getElementById('overlay-desc').textContent = `You traveled ${Math.floor(state.distance)}m!`;
      
      const restartBtn = document.getElementById('start-btn');
      if (state.lastCheckpointDistance > 0) {
        restartBtn.textContent = 'Restart from Checkpoint';
        restartBtn.onclick = () => {
          init(true);
          state.running = true;
          overlay.classList.add('hidden');
        };
        
        // Add a "Restart from Beginning" button if it doesn't exist
        if (!document.getElementById('restart-beginning')) {
          const btn = document.createElement('button');
          btn.id = 'restart-beginning';
          btn.textContent = 'Restart from Beginning';
          btn.style.marginTop = '10px';
          btn.style.background = 'var(--surface-2)';
          btn.style.border = '1px solid var(--border)';
          btn.onclick = () => {
            init(false);
            state.running = true;
            overlay.classList.add('hidden');
            btn.remove();
          };
          restartBtn.parentElement.appendChild(btn);
        }
      } else {
        restartBtn.textContent = 'Start Game';
        restartBtn.onclick = () => {
          init(false);
          state.running = true;
          overlay.classList.add('hidden');
        };
      }
      
      overlay.classList.remove('hidden');
    }

    function showMessage(text) {
      state.message = text;
      state.messageTimer = 120;
    }

    function update(dt) {
      if (!state.running) return;

      const currentSpeed = INITIAL_SPEED * state.speed;
      const moveDist = (currentSpeed * dt) / 16;
      state.distance += (moveDist / 10) * state.multiplier;

      // Speed ramp
      state.speed = 1 + Math.floor(state.distance / 200) * 0.2;
      if (state.speed > 3) state.speed = 3;

      // Multiplier bonus (no-hit streak)
      state.multiplier = 1 + Math.floor(state.distance / 100) * 0.1;

      // Checkpoints every 500m
      if (Math.floor(state.distance / 500) > state.checkpoint) {
        state.checkpoint = Math.floor(state.distance / 500);
        state.lastCheckpointDistance = state.checkpoint * 500;
        showMessage(`Checkpoint: ${state.lastCheckpointDistance}m`);
        createParticles(state.player.x, state.player.y, '#ffd86b', 30);
      }

      // Player Physics
      state.player.vy += GRAVITY * state.player.gravityDir;
      state.player.y += state.player.vy;

      const groundY = state.player.gravityDir === 1 
        ? canvas.height - GROUND_HEIGHT - PLAYER_SIZE 
        : GROUND_HEIGHT;

      if (state.player.gravityDir === 1) {
        if (state.player.y > groundY) {
          state.player.y = groundY;
          state.player.vy = 0;
          state.player.jumps = 0;
        }
      } else {
        if (state.player.y < groundY) {
          state.player.y = groundY;
          state.player.vy = 0;
          state.player.jumps = 0;
        }
      }

      // Rotation
      if (state.player.jumps > 0) {
        state.player.rotation += 0.1 * state.player.gravityDir;
      } else {
        state.player.rotation = 0;
      }

      // Particle Trail
      if (state.running) {
        state.particles.push({
          x: state.player.x + Math.random() * PLAYER_SIZE,
          y: state.player.y + (state.player.gravityDir === 1 ? PLAYER_SIZE : 0),
          vx: -2 - Math.random() * 2,
          vy: (Math.random() - 0.5) * 2,
          life: 0.5 + Math.random() * 0.5,
          color: '#7c6aff'
        });
      }

      // Obstacles
      if (state.nextObstacleX < state.player.x + canvas.width) {
        spawnObstacle();
      }

      state.obstacles.forEach(obs => {
        obs.x -= moveDist;
        
        // Collision detection
        if (
          state.player.x < obs.x + obs.w &&
          state.player.x + PLAYER_SIZE > obs.x &&
          state.player.y < obs.y + obs.h &&
          state.player.y + PLAYER_SIZE > obs.y
        ) {
          if (obs.type === 'portal') {
            if (!obs.used) {
              state.player.gravityDir *= -1;
              obs.used = true;
              createParticles(obs.x + obs.w/2, obs.y + obs.h/2, '#ff6a9b', 20);
              showMessage('Gravity Flipped!');
            }
          } else {
            gameOver();
          }
        }
      });

      state.obstacles = state.obstacles.filter(obs => obs.x + obs.w > 0);

      // Particles
      state.particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;
      });
      state.particles = state.particles.filter(p => p.life > 0);

      if (state.messageTimer > 0) state.messageTimer--;

      updateHud();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw Parallax Stars
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 50; i++) {
        const x = (seededRandom(i) * canvas.width * 2 - (state.distance * 2 * (i % 5 + 1))) % (canvas.width * 2);
        const y = seededRandom(i + 100) * canvas.height;
        ctx.globalAlpha = 0.2 + (i % 5) * 0.1;
        ctx.fillRect(x < 0 ? x + canvas.width * 2 : x, y, 2, 2);
      }
      ctx.globalAlpha = 1;

      // Draw Grid (Background)
      ctx.strokeStyle = 'rgba(124, 106, 255, 0.05)';
      ctx.lineWidth = 1;
      const gridSize = 40;
      const offset = (state.distance * 10) % gridSize;
      for (let x = -offset; x < canvas.width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      // Draw Ground
      ctx.fillStyle = '#12121f';
      ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, GROUND_HEIGHT);
      ctx.fillRect(0, 0, canvas.width, GROUND_HEIGHT);
      
      ctx.strokeStyle = '#7c6aff';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, canvas.height - GROUND_HEIGHT);
      ctx.lineTo(canvas.width, canvas.height - GROUND_HEIGHT);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, GROUND_HEIGHT);
      ctx.lineTo(canvas.width, GROUND_HEIGHT);
      ctx.stroke();

      // Draw Obstacles
      state.obstacles.forEach(obs => {
        ctx.save();
        ctx.shadowBlur = 15;
        if (obs.type === 'spike') {
          ctx.shadowColor = '#ff5c8a';
          ctx.fillStyle = '#ff5c8a';
          ctx.beginPath();
          if (obs.y > canvas.height / 2) {
            ctx.moveTo(obs.x, obs.y + obs.h);
            ctx.lineTo(obs.x + obs.w / 2, obs.y);
            ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
          } else {
            ctx.moveTo(obs.x, obs.y);
            ctx.lineTo(obs.x + obs.w / 2, obs.y + obs.h);
            ctx.lineTo(obs.x + obs.w, obs.y);
          }
          ctx.closePath();
          ctx.fill();
          
          // Inner glow
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 1;
          ctx.stroke();
        } else if (obs.type === 'block') {
          ctx.shadowColor = '#ffd86b';
          ctx.fillStyle = '#ffd86b';
          ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
          
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.strokeRect(obs.x + 2, obs.y + 2, obs.w - 4, obs.h - 4);
        } else if (obs.type === 'portal') {
          const pulse = Math.sin(state.distance / 5) * 5;
          ctx.shadowBlur = 20 + pulse;
          ctx.shadowColor = '#ff6a9b';
          ctx.strokeStyle = '#ff6a9b';
          ctx.lineWidth = 4;
          ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
          
          ctx.fillStyle = 'rgba(255, 106, 155, 0.3)';
          ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
          
          // Portal "energy" lines
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 1;
          for (let i = 0; i < 3; i++) {
            const ly = obs.y + ((state.distance * 5 + i * 20) % obs.h);
            ctx.beginPath();
            ctx.moveTo(obs.x, ly);
            ctx.lineTo(obs.x + obs.w, ly);
            ctx.stroke();
          }
        }
        ctx.restore();
      });

      // Draw Player
      ctx.save();
      ctx.translate(state.player.x + PLAYER_SIZE / 2, state.player.y + PLAYER_SIZE / 2);
      ctx.rotate(state.player.rotation);
      
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#7c6aff';
      ctx.fillStyle = '#7c6aff';
      ctx.fillRect(-PLAYER_SIZE / 2, -PLAYER_SIZE / 2, PLAYER_SIZE, PLAYER_SIZE);
      
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.strokeRect(-PLAYER_SIZE / 2, -PLAYER_SIZE / 2, PLAYER_SIZE, PLAYER_SIZE);
      ctx.restore();

      // Draw Particles
      state.particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);
      });
      ctx.globalAlpha = 1;

      // Draw Message
      if (state.messageTimer > 0) {
        ctx.save();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 24px Segoe UI';
        ctx.textAlign = 'center';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#000';
        ctx.globalAlpha = Math.min(1, state.messageTimer / 20);
        ctx.fillText(state.message, canvas.width / 2, canvas.height / 2);
        ctx.restore();
      }
    }

    function loop(time) {
      const dt = time - state.lastTime;
      state.lastTime = time;

      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    startBtn.addEventListener('click', () => {
      init();
      state.running = true;
      overlay.classList.add('hidden');
    });

    window.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        jump();
      }
    });

    canvas.addEventListener('mousedown', e => {
      e.preventDefault();
      jump();
    });

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      jump();
    }, { passive: false });

    requestAnimationFrame(loop);
    Leaderboard.render('lb-panel', 'neon-dash');
  </script>
</body>
</html>
