<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Circuit | CloudyClaw Games</title>
  <meta name="description" content="Neon-lit 3D arcade racer on a floating circuit. Race for the fastest lap time.">
  <link rel="stylesheet" href="design-system.css">
  <style>
    :root {
      --neon-cyan: #00f2ff;
      --neon-magenta: #ff00ff;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      touch-action: none;
    }

    #game-container {
      position: relative;
      width: 100%;
      max-width: 960px;
      min-height: 280px;
      aspect-ratio: 16 / 9;
      background: #000;
      box-shadow: 0 0 48px var(--accent-glow);
      border-radius: var(--radius-card);
      overflow: hidden;
    }

    #game-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #webgl-fallback {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      background: var(--surface);
      color: var(--text);
      gap: 0.75rem;
    }

    #webgl-fallback h2 {
      color: var(--neon-cyan);
      font-size: 1.4rem;
      letter-spacing: 0.06em;
    }

    #webgl-fallback p {
      color: var(--text-muted);
      max-width: 28ch;
      font-size: 0.95rem;
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 14px 18px;
      box-sizing: border-box;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 8;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
    }

    #hud .lap {
      color: var(--neon-magenta);
      text-shadow: 0 0 10px var(--neon-magenta), 0 0 20px var(--neon-magenta);
    }

    #hud .speed {
      color: var(--neon-cyan);
      font-size: 1.4rem;
      opacity: 1;
      background: rgba(0, 0, 0, 0.4);
      padding: 4px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--neon-cyan);
      box-shadow: 0 0 15px var(--neon-cyan);
    }

    .game-overlay {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
      background: rgba(5, 5, 16, 0.88);
      z-index: 20;
      pointer-events: auto;
      font-family: var(--font);
    }

    .game-overlay.visible {
      display: flex;
    }

    .game-overlay h1,
    .game-overlay h2 {
      margin: 0 0 0.5rem;
      letter-spacing: 0.08em;
    }

    #start-screen h1 {
      font-size: clamp(2.4rem, 8vw, 4rem);
      color: var(--neon-cyan);
      text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-magenta);
      font-family: var(--font-mono);
      font-style: italic;
    }

    #results-screen h2 {
      font-size: clamp(1.8rem, 6vw, 3rem);
      color: var(--neon-magenta);
      text-shadow: 0 0 20px var(--neon-magenta), 0 0 40px var(--neon-cyan);
      font-family: var(--font-mono);
    }

    .overlay-sub {
      color: var(--text-muted);
      font-size: 0.92rem;
      line-height: 1.55;
      max-width: 32ch;
      margin: 0 0 1rem;
    }

    .overlay-stat {
      font-size: 1.35rem;
      font-weight: 700;
      color: #fff;
      margin: 0.25rem 0;
    }

    .overlay-score {
      font-size: 1.1rem;
      color: var(--neon-cyan);
      margin-bottom: 1rem;
    }

    .overlay-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .overlay-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: var(--font);
      letter-spacing: 0.06em;
      transition: transform 0.1s, background 0.2s;
    }

    .overlay-btn:hover {
      background: #9b8fff;
      transform: scale(1.04);
    }

    .overlay-btn.secondary {
      background: var(--surface-2, #1a1a2e);
      border: 1px solid var(--border);
    }

    .leaderboard-mini {
      margin-top: 1rem;
      width: min(260px, 90%);
    }

    #countdown-overlay {
      z-index: 25;
      background: rgba(0, 0, 0, 0.55);
      pointer-events: none;
    }

    #countdown-num {
      font-size: clamp(4rem, 18vw, 7rem);
      font-weight: 900;
      color: var(--neon-cyan);
      text-shadow: 0 0 40px var(--neon-cyan), 0 0 80px var(--neon-magenta);
      animation: countdown-pop 0.85s ease;
    }

    @keyframes countdown-pop {
      0% { transform: scale(1.5); opacity: 0; }
      35% { transform: scale(1); opacity: 1; }
      85% { opacity: 1; }
      100% { opacity: 0.15; }
    }

    #status-banner {
      position: absolute;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1rem;
      letter-spacing: 0.06em;
      pointer-events: none;
      z-index: 9;
      opacity: 0;
      transition: opacity 0.2s;
    }

    #status-banner.visible {
      opacity: 1;
    }

    #touch-controls {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 7;
    }

    .touch-cluster {
      position: absolute;
      bottom: 12px;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .touch-cluster.left {
      left: 12px;
    }

    .touch-cluster.right {
      right: 12px;
    }

    .touch-btn {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      border: 1px solid rgba(0, 242, 255, 0.45);
      background: rgba(0, 0, 0, 0.55);
      color: var(--neon-cyan);
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      touch-action: manipulation;
      cursor: pointer;
    }

    .touch-btn.gas {
      width: 64px;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--neon-magenta);
      border-color: rgba(255, 0, 255, 0.45);
    }

    .touch-btn:active {
      background: rgba(0, 242, 255, 0.15);
    }

    .touch-btn.gas:active {
      background: rgba(255, 0, 255, 0.15);
    }

    @media (min-width: 720px) {
      .touch-cluster {
        display: none;
      }
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M10 13l-5-5 5-5"/>
    </svg>
    Back to Hub
  </a>

  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="webgl-fallback" aria-live="polite">
      <h2>WebGL required</h2>
      <p>This game needs WebGL. Try a modern desktop or mobile browser with hardware acceleration enabled.</p>
    </div>
    <div id="hud" aria-live="polite">
      <div id="race-time">0:00.0</div>
      <div class="hud-center">
        <div class="speed" id="speed-display">0 KM/H</div>
      </div>
      <div class="lap" id="lap-display">LAP 0/3</div>
    </div>
    <div id="start-screen" class="game-overlay visible">
      <h1>NEON CIRCUIT</h1>
      <p class="overlay-sub">3 laps on the neon track. WASD / arrows to steer · Space or GAS to start</p>
      <button type="button" class="overlay-btn" id="start-btn">START RACE</button>
      <div class="leaderboard-mini" id="lb-widget-start"></div>
    </div>
    <div id="countdown-overlay" class="game-overlay" aria-live="assertive">
      <div id="countdown-num">3</div>
    </div>
    <div id="results-screen" class="game-overlay">
      <h2>RACE COMPLETE</h2>
      <div class="overlay-stat" id="final-time">0:00.0</div>
      <div class="overlay-score" id="final-score">SCORE: 0</div>
      <div class="overlay-actions">
        <button type="button" class="overlay-btn" id="retry-btn">RETRY</button>
        <button type="button" class="overlay-btn secondary" id="share-btn">SHARE</button>
      </div>
      <div class="leaderboard-mini" id="lb-widget-results"></div>
    </div>
    <div id="status-banner" aria-live="assertive"></div>
    <div id="touch-controls">
      <div class="touch-cluster left">
        <button type="button" class="touch-btn" id="btn-left" aria-label="Steer left">◀</button>
        <button type="button" class="touch-btn" id="btn-right" aria-label="Steer right">▶</button>
      </div>
      <div class="touch-cluster right">
        <button type="button" class="touch-btn gas" id="btn-gas" aria-label="Accelerate">GAS</button>
      </div>
    </div>
  </div>

  <script src="leaderboard.js"></script>
  <script src="leaderboard-cloud.js"></script>
  <script type="module">
    import * as THREE from './vendor/three.module.min.js';

    const canvas = document.getElementById('game-canvas');
    const container = document.getElementById('game-container');
    const fallbackPanel = document.getElementById('webgl-fallback');

    const TRACK_HALF_WIDTH = 6;
    const RAIL_W = 0.22;
    const RAIL_H = 0.55;
    const EXTRUDE_STEPS = 180;
    const CHASE_BACK = 14;
    const CHASE_UP = 6;
    const CHASE_LERP = 0.12;
    const LOOK_AHEAD = 0.04;
    const TOTAL_LAPS = 3;
    const MAX_SPEED = 95;
    const ACCEL = 65;
    const BRAKE_FORCE = 85;
    const DRAG = 0.35;
    const STEER_RATE = 28;
    const LATERAL_GRIP = 6.2;
    const OFF_TRACK_FRAC = 0.92;
    const OFF_TRACK_RESET_SEC = 1.5;
    const FINISH_LINE_T = 0.02;
    const GAME_KEY = 'neon-circuit';

    const COLORS = {
      void: 0x050510,
      road: 0x101828,
      roadEmissive: 0x00aacc,
      railEmissive: 0xaa00aa,
      lane: 0x00f2ff,
      marker: 0xff00ff,
    };

    let renderer;
    let scene;
    let camera;
    let trackCurve;
    let trackLength = 1;
    let carGroup;
    let trailMesh;
    let trailPoints = [];
    const TRAIL_MAX = 60;
    let lastFrameTime = 0;
    let width = 1;
    let height = 1;

    let gameState = 'WAITING';
    let raceStartMs = 0;
    let completedLaps = 0;
    let prevT = FINISH_LINE_T;
    let offTrackTimer = 0;
    let bannerHideTimer = 0;
    let screenShake = 0;
    let countdownTimer = null;
    let lastRaceTimeMs = 0;
    let lastRaceScore = 0;

    const car = { t: FINISH_LINE_T, u: 0, v: 0 };
    const keys = Object.create(null);
    const touchInput = { left: false, right: false, gas: false, brake: false };
    let frameInput = { steer: 0, gas: false, brake: false };

    const raceTimeEl = document.getElementById('race-time');
    const speedDisplayEl = document.getElementById('speed-display');
    const lapDisplayEl = document.getElementById('lap-display');
    const statusBanner = document.getElementById('status-banner');
    const startScreen = document.getElementById('start-screen');
    const countdownOverlay = document.getElementById('countdown-overlay');
    const countdownNum = document.getElementById('countdown-num');
    const resultsScreen = document.getElementById('results-screen');
    const finalTimeEl = document.getElementById('final-time');
    const finalScoreEl = document.getElementById('final-score');
    const startBtn = document.getElementById('start-btn');
    const retryBtn = document.getElementById('retry-btn');
    const shareBtn = document.getElementById('share-btn');

    const chasePos = new THREE.Vector3();
    const shakeOffset = new THREE.Vector3();
    const chaseLook = new THREE.Vector3();
    const scratchPos = new THREE.Vector3();
    const scratchTan = new THREE.Vector3();
    const scratchCam = new THREE.Vector3();
    const trackNormal = new THREE.Vector3();
    const upOffset = new THREE.Vector3(0, CHASE_UP, 0);
    const lookLift = new THREE.Vector3(0, 1.2, 0);
    const carLookTarget = new THREE.Vector3();

    function showWebGLFallback() {
      canvas.style.display = 'none';
      fallbackPanel.style.display = 'flex';
      document.getElementById('hud').style.display = 'none';
      document.getElementById('touch-controls').style.display = 'none';
      startScreen.classList.remove('visible');
      countdownOverlay.classList.remove('visible');
      resultsScreen.classList.remove('visible');
    }

    let audioCtx = null;
    let engineOsc = null;
    let engineGain = null;
    let beatOsc = null;
    let beatGain = null;
    let beatCount = 0;
    let nextBeatTime = 0;

    function initAudio() {
      if (audioCtx) return;
      try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) audioCtx = new Ctx();
        
        // Setup engine sound
        engineOsc = audioCtx.createOscillator();
        engineGain = audioCtx.createGain();
        engineOsc.type = 'sawtooth';
        engineOsc.frequency.value = 40;
        engineGain.gain.value = 0;
        engineOsc.connect(engineGain);
        engineGain.connect(audioCtx.destination);
        engineOsc.start();

        // Setup beat sound
        beatGain = audioCtx.createGain();
        beatGain.gain.value = 0;
        beatGain.connect(audioCtx.destination);
      } catch {
        audioCtx = null;
      }
    }

    function playKick(time) {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.connect(g);
      g.connect(beatGain);
      osc.frequency.setValueAtTime(150, time);
      osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.5);
      g.gain.setValueAtTime(0.3, time);
      g.gain.exponentialRampToValueAtTime(0.01, time + 0.5);
      osc.start(time);
      osc.stop(time + 0.5);
    }

    function playHihat(time) {
      const bufSize = audioCtx.sampleRate * 0.1;
      const buffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const src = audioCtx.createBufferSource();
      src.buffer = buffer;
      const g = audioCtx.createGain();
      src.connect(g);
      g.connect(beatGain);
      g.gain.setValueAtTime(0.05, time);
      g.gain.exponentialRampToValueAtTime(0.01, time + 0.05);
      src.start(time);
      src.stop(time + 0.1);
    }

    function updateAudio() {
      if (!audioCtx || !engineOsc) return;
      if (gameState === 'RACING' || gameState === 'FINISHED') {
        const targetFreq = 40 + (car.v / MAX_SPEED) * 120;
        const targetVol = gameState === 'RACING' ? 0.05 + (car.v / MAX_SPEED) * 0.1 : 0.02;
        engineOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
        engineGain.gain.setTargetAtTime(targetVol, audioCtx.currentTime, 0.1);
        
        beatGain.gain.setTargetAtTime(0.6, audioCtx.currentTime, 0.1);
        
        // Simple 120bpm sequencer
        const secondsPerBeat = 60.0 / 120.0;
        if (audioCtx.currentTime > nextBeatTime) {
          if (beatCount % 2 === 0) playKick(nextBeatTime);
          if (beatCount % 2 === 1) playHihat(nextBeatTime);
          beatCount++;
          nextBeatTime = audioCtx.currentTime + secondsPerBeat / 2;
        }
      } else {
        engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.2);
        beatGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.2);
      }
    }

    function playBeep(freq, durationMs = 120, volume = 0.12) {
      if (!audioCtx) return;
      try {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + durationMs / 1000);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + durationMs / 1000);
      } catch {
        /* optional audio — ignore */
      }
    }

    function addScreenShake(amount) {
      screenShake = Math.max(screenShake, amount);
    }

    function computeScore(raceTimeMs) {
      return Math.max(1, Math.floor(1_000_000 / Math.max(raceTimeMs, 1)));
    }

    function showBanner(text, durationSec = 2) {
      statusBanner.textContent = text;
      statusBanner.classList.add('visible');
      bannerHideTimer = durationSec;
    }

    function formatRaceTime(ms) {
      const totalSec = ms / 1000;
      const mins = Math.floor(totalSec / 60);
      const secs = totalSec - mins * 60;
      return `${mins}:${secs.toFixed(1).padStart(mins > 0 ? 4 : 3, '0')}`;
    }

    function updateHud(now) {
      const speedKmh = Math.round(car.v * 1.45);
      speedDisplayEl.textContent = `${speedKmh} KM/H`;

      if (gameState === 'WAITING' || gameState === 'COUNTDOWN') {
        lapDisplayEl.textContent = 'LAP 0/3';
        raceTimeEl.textContent = '0:00.0';
        return;
      }
      if (gameState === 'FINISHED') return;
      if (gameState === 'RACING' && raceStartMs > 0) {
        raceTimeEl.textContent = formatRaceTime(now - raceStartMs);
      }
      lapDisplayEl.textContent = `LAP ${Math.min(completedLaps + 1, TOTAL_LAPS)}/${TOTAL_LAPS}`;
    }

    function buildTrackCurve() {
      const pts = [
        new THREE.Vector3(0, 0, 120),
        new THREE.Vector3(60, 5, 100),
        new THREE.Vector3(100, 10, 40),
        new THREE.Vector3(80, 5, -50),
        new THREE.Vector3(30, 0, -100),
        new THREE.Vector3(-40, 8, -110),
        new THREE.Vector3(-100, 12, -60),
        new THREE.Vector3(-110, 6, 20),
        new THREE.Vector3(-70, 0, 90),
        new THREE.Vector3(-30, -2, 110),
      ];
      return new THREE.CatmullRomCurve3(pts, true, 'catmullrom', 0.5);
    }

    function buildRoadProfile() {
      const w = TRACK_HALF_WIDTH;
      const shape = new THREE.Shape();
      shape.moveTo(-w - RAIL_W, 0);
      shape.lineTo(-w - RAIL_W, RAIL_H);
      shape.lineTo(-w, RAIL_H);
      shape.lineTo(-w, 0.08);
      shape.lineTo(w, 0.08);
      shape.lineTo(w, RAIL_H);
      shape.lineTo(w + RAIL_W, RAIL_H);
      shape.lineTo(w + RAIL_W, 0);
      shape.closePath();
      return shape;
    }

    function buildTrackMesh(curve) {
      const profile = buildRoadProfile();
      const geometry = new THREE.ExtrudeGeometry(profile, {
        steps: EXTRUDE_STEPS,
        bevelEnabled: false,
        extrudePath: curve,
      });
      geometry.computeVertexNormals();

      const material = new THREE.MeshStandardMaterial({
        color: COLORS.road,
        emissive: COLORS.roadEmissive,
        emissiveIntensity: 0.85,
        metalness: 0.35,
        roughness: 0.55,
        side: THREE.DoubleSide,
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.receiveShadow = false;
      mesh.castShadow = false;
      return mesh;
    }

    function buildLaneLines(curve) {
      const group = new THREE.Group();
      const lineMat = new THREE.LineBasicMaterial({
        color: COLORS.lane,
        transparent: true,
        opacity: 0.55,
      });

      const offsets = [-TRACK_HALF_WIDTH * 0.45, TRACK_HALF_WIDTH * 0.45];
      const normal = new THREE.Vector3();
      const lanePt = new THREE.Vector3();
      for (const lateral of offsets) {
        const points = [];
        const segments = 120;
        for (let i = 0; i <= segments; i += 1) {
          const t = i / segments;
          scratchPos.copy(curve.getPointAt(t));
          scratchTan.copy(curve.getTangentAt(t)).normalize();
          normal.set(-scratchTan.z, 0, scratchTan.x).normalize();
          lanePt.copy(scratchPos).addScaledVector(normal, lateral);
          lanePt.y += 0.12;
          points.push(lanePt.clone());
        }
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        group.add(new THREE.Line(geo, lineMat));
      }
      return group;
    }

    function buildCornerMarkers(curve, controlPoints) {
      const coneGeo = new THREE.ConeGeometry(0.55, 1.6, 6);
      const coneMat = new THREE.MeshStandardMaterial({
        color: 0x220022,
        emissive: COLORS.marker,
        emissiveIntensity: 0.9,
        metalness: 0.2,
        roughness: 0.4,
      });
      const mesh = new THREE.InstancedMesh(coneGeo, coneMat, controlPoints.length);
      const dummy = new THREE.Object3D();
      controlPoints.forEach((pt, i) => {
        const t = findClosestT(curve, pt);
        dummy.position.copy(curve.getPointAt(t)).add(new THREE.Vector3(0, 0.9, 0));
        dummy.rotation.set(0, 0, 0);
        dummy.updateMatrix();
        mesh.setMatrixAt(i, dummy.matrix);
      });

      mesh.instanceMatrix.needsUpdate = true;
      return mesh;
    }

    function findClosestT(curve, point) {
      let bestT = 0;
      let bestDist = Infinity;
      const samples = 64;
      for (let i = 0; i <= samples; i += 1) {
        const t = i / samples;
        scratchPos.copy(curve.getPointAt(t));
        const d = scratchPos.distanceToSquared(point);
        if (d < bestDist) {
          bestDist = d;
          bestT = t;
        }
      }
      return bestT;
    }

    function buildScene(curve, controlPoints) {
      const root = new THREE.Scene();
      root.background = new THREE.Color(COLORS.void);
      root.fog = new THREE.FogExp2(COLORS.void, 0.0012);

      const hemi = new THREE.HemisphereLight(0x66ccff, 0x180828, 1.2);
      const ambient = new THREE.AmbientLight(0x445577, 0.5);
      const key = new THREE.DirectionalLight(0xccddff, 1.5);
      key.position.set(40, 100, 30);
      const rim = new THREE.DirectionalLight(0xff66ff, 0.8);
      rim.position.set(-50, 40, -40);

      root.add(hemi, ambient, key, rim);
      root.add(buildTrackMesh(curve));
      root.add(buildLaneLines(curve));
      root.add(buildCornerMarkers(curve, controlPoints));

      // Stars
      const starCount = 1200;
      const starGeo = new THREE.BufferGeometry();
      const starPos = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        const r = 400 + Math.random() * 200;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        starPos[i * 3 + 1] = Math.abs(r * Math.sin(phi) * Math.sin(theta));
        starPos[i * 3 + 2] = r * Math.cos(phi);
      }
      starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
      const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, transparent: true, opacity: 0.8 });
      root.add(new THREE.Points(starGeo, starMat));

      // Neon Buildings
      const bldgGeo = new THREE.BoxGeometry(1, 1, 1);
      for (let i = 0; i < 40; i++) {
        const h = 10 + Math.random() * 40;
        const w = 5 + Math.random() * 10;
        const d = 5 + Math.random() * 10;
        const bldgMat = new THREE.MeshStandardMaterial({
          color: 0x0a0a1a,
          emissive: Math.random() > 0.5 ? COLORS.lane : COLORS.marker,
          emissiveIntensity: 0.4 + Math.random() * 0.6,
        });
        const bldg = new THREE.Mesh(bldgGeo, bldgMat);
        const angle = Math.random() * Math.PI * 2;
        const dist = 150 + Math.random() * 100;
        bldg.position.set(Math.cos(angle) * dist, h / 2 - 10, Math.sin(angle) * dist);
        bldg.scale.set(w, h, d);
        root.add(bldg);
      }

      const grid = new THREE.GridHelper(600, 60, 0x111133, 0x080814);
      grid.position.y = -10;
      root.add(grid);

      return root;
    }

    function initRenderer() {
      try {
        renderer = new THREE.WebGLRenderer({
          canvas,
          antialias: true,
          alpha: false,
          powerPreference: 'high-performance',
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.05;
        return true;
      } catch (err) {
        console.error('WebGLRenderer init failed:', err);
        return false;
      }
    }

    function resize() {
      const rect = container.getBoundingClientRect();
      width = Math.max(1, Math.floor(rect.width));
      height = Math.max(1, Math.floor(rect.height));
      if (!renderer || !camera) return;
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    function createCar() {
      const group = new THREE.Group();
      
      // Main body
      const bodyGeo = new THREE.BoxGeometry(2.4, 0.6, 4.4);
      const bodyMat = new THREE.MeshStandardMaterial({
        color: 0x050510,
        emissive: COLORS.lane,
        emissiveIntensity: 0.8,
        metalness: 0.8,
        roughness: 0.2,
      });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 0.5;
      group.add(body);

      // Cockpit
      const cockGeo = new THREE.BoxGeometry(1.6, 0.5, 1.8);
      const cockMat = new THREE.MeshStandardMaterial({
        color: 0x000000,
        emissive: COLORS.lane,
        emissiveIntensity: 0.4,
        metalness: 0.9,
        roughness: 0.1,
        transparent: true,
        opacity: 0.7,
      });
      const cockpit = new THREE.Mesh(cockGeo, cockMat);
      cockpit.position.set(0, 0.9, 0.2);
      group.add(cockpit);

      // Spoiler
      const spoilerBaseGeo = new THREE.BoxGeometry(0.2, 0.6, 0.2);
      const spoilerTopGeo = new THREE.BoxGeometry(2.6, 0.1, 0.8);
      const spoilerMat = new THREE.MeshStandardMaterial({ color: 0x111122, emissive: COLORS.marker, emissiveIntensity: 0.5 });
      
      const sLeft = new THREE.Mesh(spoilerBaseGeo, spoilerMat);
      sLeft.position.set(-0.9, 0.8, -1.8);
      group.add(sLeft);
      
      const sRight = new THREE.Mesh(spoilerBaseGeo, spoilerMat);
      sRight.position.set(0.9, 0.8, -1.8);
      group.add(sRight);
      
      const sTop = new THREE.Mesh(spoilerTopGeo, spoilerMat);
      sTop.position.set(0, 1.1, -1.8);
      group.add(sTop);

      // Wheels
      const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 16);
      const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
      const wheelPositions = [
        [-1.3, 0.45, 1.4], [1.3, 0.45, 1.4],
        [-1.3, 0.45, -1.4], [1.3, 0.45, -1.4]
      ];
      wheelPositions.forEach(pos => {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.position.set(...pos);
        wheel.rotation.z = Math.PI / 2;
        group.add(wheel);
      });

      // Underglow
      const glowGeo = new THREE.PlaneGeometry(2.2, 4.0);
      const glowMat = new THREE.MeshBasicMaterial({
        color: COLORS.lane,
        transparent: true,
        opacity: 0.4,
        side: THREE.DoubleSide
      });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      glow.position.y = 0.05;
      glow.rotation.x = Math.PI / 2;
      group.add(glow);

      return group;
    }

    function placeCarOnTrack() {
      const p = trackCurve.getPointAt(car.t);
      const tan = trackCurve.getTangentAt(car.t).normalize();
      
      // Calculate a better normal that accounts for elevation
      // We can use the binormal (tangent cross some up vector, then cross back)
      const up = new THREE.Vector3(0, 1, 0);
      const binormal = new THREE.Vector3().crossVectors(tan, up).normalize();
      const normal = new THREE.Vector3().crossVectors(binormal, tan).normalize();
      
      scratchPos.copy(p).addScaledVector(binormal, car.u);
      scratchPos.y += 0.35;
      
      carGroup.position.copy(scratchPos);
      
      // Orient car to follow track tangent and normal
      const lookTarget = new THREE.Vector3().copy(scratchPos).add(tan);
      carGroup.lookAt(lookTarget);
      
      // Apply the track's normal to the car's up vector
      // This is a bit tricky with lookAt, so we'll use a matrix or quaternions if needed.
      // For now, lookAt is okay, but it doesn't handle the "bank" of the track.
    }

    function bindInput() {
      const steerKeys = new Set(['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'KeyA', 'KeyD', 'KeyW', 'KeyS', 'Space']);

      document.addEventListener('keydown', (e) => {
        if (steerKeys.has(e.code)) e.preventDefault();
        keys[e.code] = true;
        if (gameState === 'WAITING' && (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp')) {
          requestRaceStart();
        }
      });

      document.addEventListener('keyup', (e) => {
        keys[e.code] = false;
      });

      window.addEventListener('blur', () => {
        for (const k of Object.keys(keys)) keys[k] = false;
        touchInput.left = false;
        touchInput.right = false;
        touchInput.gas = false;
        touchInput.brake = false;
      });

      function bindTouchButton(id, field) {
        const el = document.getElementById(id);
        const press = (e) => {
          e.preventDefault();
          touchInput[field] = true;
          if (gameState === 'WAITING' && field === 'gas') requestRaceStart();
        };
        const release = () => { touchInput[field] = false; };
        el.addEventListener('pointerdown', press);
        el.addEventListener('pointerup', release);
        el.addEventListener('pointerleave', release);
        el.addEventListener('pointercancel', release);
      }

      bindTouchButton('btn-left', 'left');
      bindTouchButton('btn-right', 'right');
      bindTouchButton('btn-gas', 'gas');
    }

    function sampleInput() {
      const steer =
        (touchInput.right || keys.ArrowRight || keys.KeyD ? 1 : 0)
        - (touchInput.left || keys.ArrowLeft || keys.KeyA ? 1 : 0);
      const gas = touchInput.gas || keys.ArrowUp || keys.KeyW;
      const brake = touchInput.brake || keys.ArrowDown || keys.KeyS;
      frameInput = { steer, gas, brake };
    }

    function beginCountdown() {
      if (gameState !== 'WAITING') return;
      initAudio();
      gameState = 'COUNTDOWN';
      startScreen.classList.remove('visible');
      resultsScreen.classList.remove('visible');
      statusBanner.classList.remove('visible');

      let count = 3;
      countdownNum.textContent = String(count);
      countdownOverlay.classList.add('visible');
      playBeep(440, 90);

      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        count -= 1;
        if (count > 0) {
          countdownNum.textContent = String(count);
          countdownNum.style.animation = 'none';
          countdownNum.offsetHeight;
          countdownNum.style.animation = '';
          playBeep(520, 90);
        } else if (count === 0) {
          countdownNum.textContent = 'GO!';
          countdownNum.style.animation = 'none';
          countdownNum.offsetHeight;
          countdownNum.style.animation = '';
          playBeep(880, 160, 0.16);
        } else {
          clearInterval(countdownTimer);
          countdownTimer = null;
          countdownOverlay.classList.remove('visible');
          startRace();
        }
      }, 900);
    }

    function requestRaceStart() {
      if (gameState !== 'WAITING') return;
      beginCountdown();
    }

    function startRace() {
      gameState = 'RACING';
      raceStartMs = performance.now();
      completedLaps = 0;
      offTrackTimer = 0;
      car.t = FINISH_LINE_T;
      car.u = 0;
      car.v = 0;
      prevT = car.t;
      showBanner('GO!', 1.2);
      addScreenShake(4);
    }

    function resetRace() {
      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }
      gameState = 'WAITING';
      raceStartMs = 0;
      completedLaps = 0;
      offTrackTimer = 0;
      screenShake = 0;
      car.t = FINISH_LINE_T;
      car.u = 0;
      car.v = 0;
      prevT = car.t;
      raceTimeEl.textContent = '0:00.0';
      lapDisplayEl.textContent = 'LAP 0/3';
      speedDisplayEl.textContent = '0 KM/H';
      statusBanner.classList.remove('visible');
      countdownOverlay.classList.remove('visible');
      resultsScreen.classList.remove('visible');
      startScreen.classList.add('visible');
    }

    function finishRace(now) {
      gameState = 'FINISHED';
      const totalMs = now - raceStartMs;
      lastRaceTimeMs = totalMs;
      lastRaceScore = computeScore(totalMs);
      const timeStr = formatRaceTime(totalMs);

      raceTimeEl.textContent = timeStr;
      lapDisplayEl.textContent = `FINISHED — ${timeStr}`;
      finalTimeEl.textContent = timeStr;
      finalScoreEl.textContent = `SCORE: ${lastRaceScore.toLocaleString()}`;
      resultsScreen.classList.add('visible');
      addScreenShake(8);
      playBeep(660, 200, 0.14);
      playBeep(990, 280, 0.1);

      if (typeof Leaderboard !== 'undefined') {
        Leaderboard.saveScore(GAME_KEY, lastRaceScore);
        Leaderboard.renderWidget(GAME_KEY, 'lb-widget-results');
        Leaderboard.renderWidget(GAME_KEY, 'lb-widget-start');
      }
    }

    function resetLapProgress() {
      car.t = FINISH_LINE_T;
      car.u = 0;
      car.v = Math.min(car.v, 18);
      prevT = car.t;
      offTrackTimer = 0;
      showBanner('OFF TRACK — LAP RESET', 2);
      addScreenShake(6);
      playBeep(180, 220, 0.1);
    }

    function onLapCrossing() {
      completedLaps += 1;
      playBeep(720, 100, 0.1);
      if (completedLaps >= TOTAL_LAPS) {
        finishRace(performance.now());
        return;
      }
      showBanner(`LAP ${completedLaps}/${TOTAL_LAPS}`, 1.5);
      addScreenShake(3);
    }

    function detectLapCrossing() {
      if (prevT > 0.82 && car.t < 0.18) {
        onLapCrossing();
      }
      prevT = car.t;
    }

    function updateCarPhysics(dt) {
      const { steer, gas, brake } = frameInput;

      if (gas) {
        car.v += ACCEL * dt;
      } else if (brake) {
        car.v -= BRAKE_FORCE * dt;
      }
      car.v -= car.v * DRAG * dt;
      car.v = Math.max(0, Math.min(car.v, MAX_SPEED));

      car.u += steer * STEER_RATE * dt;
      car.u -= car.u * LATERAL_GRIP * dt;

      const offLimit = TRACK_HALF_WIDTH * OFF_TRACK_FRAC;
      if (Math.abs(car.u) > offLimit) {
        offTrackTimer += dt;
        if (offTrackTimer >= OFF_TRACK_RESET_SEC) {
          resetLapProgress();
        }
      } else {
        offTrackTimer = 0;
      }

      car.t += (car.v * dt) / trackLength;
      if (car.t >= 1) car.t -= 1;
      if (car.t < 0) car.t += 1;

      detectLapCrossing();
    }

    function updateChaseCamera(dt) {
      const p = trackCurve.getPointAt(car.t);
      const tan = trackCurve.getTangentAt(car.t).normalize();
      const up = new THREE.Vector3(0, 1, 0);
      const binormal = new THREE.Vector3().crossVectors(tan, up).normalize();
      
      scratchPos.copy(p).addScaledVector(binormal, car.u);
      scratchCam.copy(scratchPos).addScaledVector(tan, -CHASE_BACK).add(upOffset);

      chasePos.lerp(scratchCam, CHASE_LERP);
      
      const lookT = (car.t + LOOK_AHEAD) % 1;
      chaseLook.copy(trackCurve.getPointAt(lookT)).add(lookLift);
      chaseLook.addScaledVector(binormal, car.u * 0.35);

      if (screenShake > 0) {
        shakeOffset.set(
          (Math.random() * 2 - 1) * screenShake * 0.08,
          (Math.random() * 2 - 1) * screenShake * 0.05,
          (Math.random() * 2 - 1) * screenShake * 0.08,
        );
        camera.position.copy(chasePos).add(shakeOffset);
        screenShake = Math.max(0, screenShake - dt * 14);
      } else {
        camera.position.copy(chasePos);
      }
      camera.lookAt(chaseLook);
    }

    function updateTrail() {
      if (gameState !== 'RACING' && gameState !== 'FINISHED') {
        trailMesh.visible = false;
        return;
      }
      trailMesh.visible = true;

      // Add current position to trail
      const left = new THREE.Vector3(-1, 0, 0).applyQuaternion(carGroup.quaternion).add(carGroup.position);
      const right = new THREE.Vector3(1, 0, 0).applyQuaternion(carGroup.quaternion).add(carGroup.position);
      
      trailPoints.unshift({ left, right });
      if (trailPoints.length > TRAIL_MAX) trailPoints.pop();

      const posAttr = trailMesh.geometry.attributes.position;
      const positions = posAttr.array;
      for (let i = 0; i < TRAIL_MAX; i++) {
        const p = trailPoints[i] || trailPoints[trailPoints.length - 1] || { left: carGroup.position, right: carGroup.position };
        positions[i * 6 + 0] = p.left.x;
        positions[i * 6 + 1] = p.left.y;
        positions[i * 6 + 2] = p.left.z;
        positions[i * 6 + 3] = p.right.x;
        positions[i * 6 + 4] = p.right.y;
        positions[i * 6 + 5] = p.right.z;
      }
      posAttr.needsUpdate = true;
      
      // Update indices for the mesh if not already set
      if (!trailMesh.geometry.index) {
        const indices = [];
        for (let i = 0; i < TRAIL_MAX - 1; i++) {
          const a = i * 2;
          const b = i * 2 + 1;
          const c = (i + 1) * 2;
          const d = (i + 1) * 2 + 1;
          indices.push(a, b, c);
          indices.push(b, d, c);
        }
        trailMesh.geometry.setIndex(indices);
      }
    }

    function update(dt, now) {
      if (bannerHideTimer > 0) {
        bannerHideTimer -= dt;
        if (bannerHideTimer <= 0 && gameState === 'RACING') {
          statusBanner.classList.remove('visible');
        }
      }

      sampleInput();

      if (gameState === 'RACING') {
        updateCarPhysics(dt);
      }

      placeCarOnTrack();

      // Apply visual tilt after lookAt so it isn't overwritten by placeCarOnTrack
      const steerForTilt = frameInput.steer;
      carGroup.rotation.z = THREE.MathUtils.lerp(carGroup.rotation.z, -steerForTilt * 0.25, 0.1);
      carGroup.rotation.x = THREE.MathUtils.lerp(carGroup.rotation.x, (frameInput.gas ? -0.05 : (frameInput.brake ? 0.05 : 0)), 0.1);

      updateChaseCamera(dt);
      updateTrail();
      updateAudio();
      updateHud(now);
    }

    function render() {
      renderer.render(scene, camera);
    }

    function gameLoop(now) {
      requestAnimationFrame(gameLoop);
      if (width <= 1 || height <= 1) resize();
      if (!lastFrameTime) lastFrameTime = now;
      const dt = Math.min((now - lastFrameTime) / 1000, 0.033);
      lastFrameTime = now;
      update(dt, now);
      render();
    }

    function init() {
      if (!initRenderer()) {
        showWebGLFallback();
        return;
      }

      trackCurve = buildTrackCurve();
      trackLength = trackCurve.getLength();
      const controlPoints = trackCurve.points;

      scene = buildScene(trackCurve, controlPoints);
      carGroup = createCar();
      scene.add(carGroup);

      // Trail Initialization
      const trailGeo = new THREE.BufferGeometry();
      const trailPos = new Float32Array(TRAIL_MAX * 3 * 2); // 2 points per segment
      trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
      const trailMat = new THREE.MeshBasicMaterial({
        color: COLORS.lane,
        transparent: true,
        opacity: 0.6,
        side: THREE.DoubleSide
      });
      trailMesh = new THREE.Mesh(trailGeo, trailMat);
      trailMesh.frustumCulled = false;
      scene.add(trailMesh);

      camera = new THREE.PerspectiveCamera(58, 1, 0.5, 600);
      camera.position.set(0, 12, 40);

      bindInput();
      resize();
      window.addEventListener('resize', resize);

      startBtn.addEventListener('click', () => {
        initAudio();
        requestRaceStart();
      });
      retryBtn.addEventListener('click', () => {
        initAudio();
        resetRace();
        requestRaceStart();
      });
      shareBtn.addEventListener('click', async () => {
        const timeStr = formatRaceTime(lastRaceTimeMs);
        const text = `I scored ${lastRaceScore.toLocaleString()} in Neon Circuit (${timeStr})! Can you beat my lap?`;
        try {
          if (navigator.share) {
            await navigator.share({ title: 'Neon Circuit', text, url: window.location.href });
          } else if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(`${text} ${window.location.href}`);
            shareBtn.textContent = 'COPIED!';
            setTimeout(() => { shareBtn.textContent = 'SHARE'; }, 2000);
          }
        } catch {
          /* user cancelled share */
        }
      });

      const testGl = renderer.getContext();
      if (!testGl || testGl.isContextLost()) {
        showWebGLFallback();
        return;
      }

      if (typeof Leaderboard !== 'undefined') {
        Leaderboard.renderWidget(GAME_KEY, 'lb-widget-start');
      }

      resetRace();
      placeCarOnTrack();
      updateChaseCamera(0);
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(() => {
      resize();
      init();
    });
  </script>
</body>
