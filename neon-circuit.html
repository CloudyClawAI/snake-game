<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Circuit | CloudyClaw Games</title>
  <meta name="description" content="Neon-lit 3D arcade racer on a floating circuit. Race for the fastest lap time.">
  <link rel="stylesheet" href="design-system.css">
  <style>
    :root {
      --neon-cyan: #00f2ff;
      --neon-magenta: #ff00ff;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      touch-action: none;
    }

    #game-container {
      position: relative;
      width: 100%;
      max-width: 960px;
      min-height: 280px;
      aspect-ratio: 16 / 9;
      background: #000;
      box-shadow: 0 0 48px var(--accent-glow);
      border-radius: var(--radius-card);
      overflow: hidden;
    }

    #game-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #webgl-fallback {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      background: var(--surface);
      color: var(--text);
      gap: 0.75rem;
    }

    #webgl-fallback h2 {
      color: var(--neon-cyan);
      font-size: 1.4rem;
      letter-spacing: 0.06em;
    }

    #webgl-fallback p {
      color: var(--text-muted);
      max-width: 28ch;
      font-size: 0.95rem;
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 14px 18px;
      box-sizing: border-box;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 8;
      font-family: var(--font);
      font-weight: 700;
      font-size: 0.95rem;
      color: #fff;
      text-shadow: 0 0 12px var(--neon-cyan);
    }

    #hud .lap {
      color: var(--neon-magenta);
      text-shadow: 0 0 12px var(--neon-magenta);
    }

    #status-banner {
      position: absolute;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1rem;
      letter-spacing: 0.06em;
      pointer-events: none;
      z-index: 9;
      opacity: 0;
      transition: opacity 0.2s;
    }

    #status-banner.visible {
      opacity: 1;
    }

    #touch-controls {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 7;
    }

    .touch-cluster {
      position: absolute;
      bottom: 12px;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .touch-cluster.left {
      left: 12px;
    }

    .touch-cluster.right {
      right: 12px;
    }

    .touch-btn {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      border: 1px solid rgba(0, 242, 255, 0.45);
      background: rgba(0, 0, 0, 0.55);
      color: var(--neon-cyan);
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      touch-action: manipulation;
      cursor: pointer;
    }

    .touch-btn.gas {
      width: 64px;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--neon-magenta);
      border-color: rgba(255, 0, 255, 0.45);
    }

    .touch-btn:active {
      background: rgba(0, 242, 255, 0.15);
    }

    .touch-btn.gas:active {
      background: rgba(255, 0, 255, 0.15);
    }

    @media (min-width: 720px) {
      .touch-cluster {
        display: none;
      }
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M10 13l-5-5 5-5"/>
    </svg>
    Back to Hub
  </a>

  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="webgl-fallback" aria-live="polite">
      <h2>WebGL required</h2>
      <p>This game needs WebGL. Try a modern desktop or mobile browser with hardware acceleration enabled.</p>
    </div>
    <div id="hud" aria-live="polite">
      <div id="race-time">0:00.0</div>
      <div class="lap" id="lap-display">LAP 0/3</div>
    </div>
    <div id="status-banner" aria-live="assertive"></div>
    <div id="touch-controls">
      <div class="touch-cluster left">
        <button type="button" class="touch-btn" id="btn-left" aria-label="Steer left">◀</button>
        <button type="button" class="touch-btn" id="btn-right" aria-label="Steer right">▶</button>
      </div>
      <div class="touch-cluster right">
        <button type="button" class="touch-btn gas" id="btn-gas" aria-label="Accelerate">GAS</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from './vendor/three.module.min.js';

    const canvas = document.getElementById('game-canvas');
    const container = document.getElementById('game-container');
    const fallbackPanel = document.getElementById('webgl-fallback');

    const TRACK_HALF_WIDTH = 6;
    const RAIL_W = 0.22;
    const RAIL_H = 0.55;
    const EXTRUDE_STEPS = 180;
    const CHASE_BACK = 14;
    const CHASE_UP = 6;
    const CHASE_LERP = 0.12;
    const LOOK_AHEAD = 0.04;
    const TOTAL_LAPS = 3;
    const MAX_SPEED = 78;
    const ACCEL = 52;
    const BRAKE_FORCE = 70;
    const DRAG = 0.42;
    const STEER_RATE = 24;
    const LATERAL_GRIP = 5.5;
    const OFF_TRACK_FRAC = 0.92;
    const OFF_TRACK_RESET_SEC = 1.5;
    const FINISH_LINE_T = 0.02;

    const COLORS = {
      void: 0x050510,
      road: 0x101828,
      roadEmissive: 0x00aacc,
      railEmissive: 0xaa00aa,
      lane: 0x00f2ff,
      marker: 0xff00ff,
    };

    let renderer;
    let scene;
    let camera;
    let trackCurve;
    let trackLength = 1;
    let carGroup;
    let lastFrameTime = 0;
    let width = 1;
    let height = 1;

    let gameState = 'WAITING';
    let raceStartMs = 0;
    let completedLaps = 0;
    let prevT = FINISH_LINE_T;
    let offTrackTimer = 0;
    let bannerHideTimer = 0;

    const car = { t: FINISH_LINE_T, u: 0, v: 0 };
    const keys = Object.create(null);
    const touchInput = { left: false, right: false, gas: false, brake: false };
    let frameInput = { steer: 0, gas: false, brake: false };

    const raceTimeEl = document.getElementById('race-time');
    const lapDisplayEl = document.getElementById('lap-display');
    const statusBanner = document.getElementById('status-banner');

    const chasePos = new THREE.Vector3();
    const chaseLook = new THREE.Vector3();
    const scratchPos = new THREE.Vector3();
    const scratchTan = new THREE.Vector3();
    const scratchCam = new THREE.Vector3();
    const trackNormal = new THREE.Vector3();
    const upOffset = new THREE.Vector3(0, CHASE_UP, 0);
    const lookLift = new THREE.Vector3(0, 1.2, 0);
    const carLookTarget = new THREE.Vector3();

    function showWebGLFallback() {
      canvas.style.display = 'none';
      fallbackPanel.style.display = 'flex';
      document.getElementById('hud').style.display = 'none';
      document.getElementById('touch-controls').style.display = 'none';
    }

    function showBanner(text, durationSec = 2) {
      statusBanner.textContent = text;
      statusBanner.classList.add('visible');
      bannerHideTimer = durationSec;
    }

    function formatRaceTime(ms) {
      const totalSec = ms / 1000;
      const mins = Math.floor(totalSec / 60);
      const secs = totalSec - mins * 60;
      return `${mins}:${secs.toFixed(1).padStart(mins > 0 ? 4 : 3, '0')}`;
    }

    function updateHud(now) {
      if (gameState === 'WAITING') {
        lapDisplayEl.textContent = 'LAP 0/3';
        return;
      }
      if (gameState === 'FINISHED') return;
      if (gameState === 'RACING' && raceStartMs > 0) {
        raceTimeEl.textContent = formatRaceTime(now - raceStartMs);
      }
      lapDisplayEl.textContent = `LAP ${Math.min(completedLaps + 1, TOTAL_LAPS)}/${TOTAL_LAPS}`;
    }

    function buildTrackCurve() {
      const pts = [
        new THREE.Vector3(0, 0, 95),
        new THREE.Vector3(55, 0, 75),
        new THREE.Vector3(88, 0, 20),
        new THREE.Vector3(70, 0, -45),
        new THREE.Vector3(20, 0, -82),
        new THREE.Vector3(-45, 0, -78),
        new THREE.Vector3(-82, 0, -30),
        new THREE.Vector3(-75, 0, 35),
        new THREE.Vector3(-35, 0, 80),
      ];
      return new THREE.CatmullRomCurve3(pts, true, 'catmullrom', 0.35);
    }

    function buildRoadProfile() {
      const w = TRACK_HALF_WIDTH;
      const shape = new THREE.Shape();
      shape.moveTo(-w - RAIL_W, 0);
      shape.lineTo(-w - RAIL_W, RAIL_H);
      shape.lineTo(-w, RAIL_H);
      shape.lineTo(-w, 0.08);
      shape.lineTo(w, 0.08);
      shape.lineTo(w, RAIL_H);
      shape.lineTo(w + RAIL_W, RAIL_H);
      shape.lineTo(w + RAIL_W, 0);
      shape.closePath();
      return shape;
    }

    function buildTrackMesh(curve) {
      const profile = buildRoadProfile();
      const geometry = new THREE.ExtrudeGeometry(profile, {
        steps: EXTRUDE_STEPS,
        bevelEnabled: false,
        extrudePath: curve,
      });
      geometry.computeVertexNormals();

      const material = new THREE.MeshStandardMaterial({
        color: COLORS.road,
        emissive: COLORS.roadEmissive,
        emissiveIntensity: 0.85,
        metalness: 0.35,
        roughness: 0.55,
        side: THREE.DoubleSide,
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.receiveShadow = false;
      mesh.castShadow = false;
      return mesh;
    }

    function buildLaneLines(curve) {
      const group = new THREE.Group();
      const lineMat = new THREE.LineBasicMaterial({
        color: COLORS.lane,
        transparent: true,
        opacity: 0.55,
      });

      const offsets = [-TRACK_HALF_WIDTH * 0.45, TRACK_HALF_WIDTH * 0.45];
      const normal = new THREE.Vector3();
      const lanePt = new THREE.Vector3();
      for (const lateral of offsets) {
        const points = [];
        const segments = 120;
        for (let i = 0; i <= segments; i += 1) {
          const t = i / segments;
          scratchPos.copy(curve.getPointAt(t));
          scratchTan.copy(curve.getTangentAt(t)).normalize();
          normal.set(-scratchTan.z, 0, scratchTan.x).normalize();
          lanePt.copy(scratchPos).addScaledVector(normal, lateral);
          lanePt.y += 0.12;
          points.push(lanePt.clone());
        }
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        group.add(new THREE.Line(geo, lineMat));
      }
      return group;
    }

    function buildCornerMarkers(curve, controlPoints) {
      const coneGeo = new THREE.ConeGeometry(0.55, 1.6, 6);
      const coneMat = new THREE.MeshStandardMaterial({
        color: 0x220022,
        emissive: COLORS.marker,
        emissiveIntensity: 0.9,
        metalness: 0.2,
        roughness: 0.4,
      });
      const mesh = new THREE.InstancedMesh(coneGeo, coneMat, controlPoints.length);
      const dummy = new THREE.Object3D();
      controlPoints.forEach((pt, i) => {
        const t = findClosestT(curve, pt);
        dummy.position.copy(curve.getPointAt(t)).add(new THREE.Vector3(0, 0.9, 0));
        dummy.rotation.set(0, 0, 0);
        dummy.updateMatrix();
        mesh.setMatrixAt(i, dummy.matrix);
      });

      mesh.instanceMatrix.needsUpdate = true;
      return mesh;
    }

    function findClosestT(curve, point) {
      let bestT = 0;
      let bestDist = Infinity;
      const samples = 64;
      for (let i = 0; i <= samples; i += 1) {
        const t = i / samples;
        scratchPos.copy(curve.getPointAt(t));
        const d = scratchPos.distanceToSquared(point);
        if (d < bestDist) {
          bestDist = d;
          bestT = t;
        }
      }
      return bestT;
    }

    function buildScene(curve, controlPoints) {
      const root = new THREE.Scene();
      root.background = new THREE.Color(COLORS.void);
      root.fog = new THREE.FogExp2(COLORS.void, 0.0016);

      const hemi = new THREE.HemisphereLight(0x66ccff, 0x180828, 1.0);
      const ambient = new THREE.AmbientLight(0x445577, 0.45);
      const key = new THREE.DirectionalLight(0xccddff, 1.35);
      key.position.set(40, 80, 30);
      const rim = new THREE.DirectionalLight(0xff66ff, 0.65);
      rim.position.set(-50, 30, -40);

      root.add(hemi, ambient, key, rim);
      root.add(buildTrackMesh(curve));
      root.add(buildLaneLines(curve));
      root.add(buildCornerMarkers(curve, controlPoints));

      const grid = new THREE.GridHelper(400, 40, 0x111133, 0x080814);
      grid.position.y = -6;
      root.add(grid);

      return root;
    }

    function initRenderer() {
      try {
        renderer = new THREE.WebGLRenderer({
          canvas,
          antialias: true,
          alpha: false,
          powerPreference: 'high-performance',
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.05;
        return true;
      } catch (err) {
        console.error('WebGLRenderer init failed:', err);
        return false;
      }
    }

    function resize() {
      const rect = container.getBoundingClientRect();
      width = Math.max(1, Math.floor(rect.width));
      height = Math.max(1, Math.floor(rect.height));
      if (!renderer || !camera) return;
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    function createCar() {
      const group = new THREE.Group();
      const bodyGeo = new THREE.BoxGeometry(2.4, 0.7, 4.2);
      const bodyMat = new THREE.MeshStandardMaterial({
        color: 0x111122,
        emissive: COLORS.lane,
        emissiveIntensity: 0.95,
        metalness: 0.5,
        roughness: 0.35,
      });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 0.45;
      group.add(body);

      const stripGeo = new THREE.BoxGeometry(2.5, 0.12, 0.35);
      const stripMat = new THREE.MeshStandardMaterial({
        color: 0x220022,
        emissive: COLORS.marker,
        emissiveIntensity: 1.1,
        metalness: 0.2,
        roughness: 0.3,
      });
      const rearStrip = new THREE.Mesh(stripGeo, stripMat);
      rearStrip.position.set(0, 0.55, -1.9);
      group.add(rearStrip);

      return group;
    }

    function placeCarOnTrack() {
      scratchPos.copy(trackCurve.getPointAt(car.t));
      scratchTan.copy(trackCurve.getTangentAt(car.t)).normalize();
      trackNormal.set(-scratchTan.z, 0, scratchTan.x).normalize();
      scratchPos.addScaledVector(trackNormal, car.u);
      scratchPos.y += 0.35;
      carGroup.position.copy(scratchPos);
      carLookTarget.copy(scratchPos).add(scratchTan);
      carGroup.lookAt(carLookTarget);
    }

    function bindInput() {
      const steerKeys = new Set(['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'KeyA', 'KeyD', 'KeyW', 'KeyS', 'Space']);

      document.addEventListener('keydown', (e) => {
        if (steerKeys.has(e.code)) e.preventDefault();
        keys[e.code] = true;
        if (gameState === 'WAITING' && (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp')) {
          startRace();
        }
        if (gameState === 'FINISHED' && e.code === 'Space') {
          resetRace();
        }
      });

      document.addEventListener('keyup', (e) => {
        keys[e.code] = false;
      });

      window.addEventListener('blur', () => {
        for (const k of Object.keys(keys)) keys[k] = false;
        touchInput.left = false;
        touchInput.right = false;
        touchInput.gas = false;
        touchInput.brake = false;
      });

      function bindTouchButton(id, field) {
        const el = document.getElementById(id);
        const press = (e) => {
          e.preventDefault();
          touchInput[field] = true;
          if (gameState === 'WAITING' && field === 'gas') startRace();
        };
        const release = () => { touchInput[field] = false; };
        el.addEventListener('pointerdown', press);
        el.addEventListener('pointerup', release);
        el.addEventListener('pointerleave', release);
        el.addEventListener('pointercancel', release);
      }

      bindTouchButton('btn-left', 'left');
      bindTouchButton('btn-right', 'right');
      bindTouchButton('btn-gas', 'gas');
    }

    function sampleInput() {
      const steer =
        (touchInput.right || keys.ArrowRight || keys.KeyD ? 1 : 0)
        - (touchInput.left || keys.ArrowLeft || keys.KeyA ? 1 : 0);
      const gas = touchInput.gas || keys.ArrowUp || keys.KeyW;
      const brake = touchInput.brake || keys.ArrowDown || keys.KeyS;
      frameInput = { steer, gas, brake };
    }

    function startRace() {
      gameState = 'RACING';
      raceStartMs = performance.now();
      completedLaps = 0;
      offTrackTimer = 0;
      car.t = FINISH_LINE_T;
      car.u = 0;
      car.v = 0;
      prevT = car.t;
      showBanner('GO!', 1.2);
    }

    function resetRace() {
      gameState = 'WAITING';
      raceStartMs = 0;
      completedLaps = 0;
      offTrackTimer = 0;
      car.t = FINISH_LINE_T;
      car.u = 0;
      car.v = 0;
      prevT = car.t;
      raceTimeEl.textContent = '0:00.0';
      lapDisplayEl.textContent = 'LAP 0/3';
      showBanner('SPACE / GAS TO START', 0);
      statusBanner.classList.add('visible');
    }

    function finishRace(now) {
      gameState = 'FINISHED';
      const totalMs = now - raceStartMs;
      raceTimeEl.textContent = formatRaceTime(totalMs);
      lapDisplayEl.textContent = `FINISHED — ${formatRaceTime(totalMs)}`;
      showBanner(`RACE COMPLETE — ${formatRaceTime(totalMs)}`, 0);
    }

    function resetLapProgress() {
      car.t = FINISH_LINE_T;
      car.u = 0;
      car.v = Math.min(car.v, 18);
      prevT = car.t;
      offTrackTimer = 0;
      showBanner('OFF TRACK — LAP RESET', 2);
    }

    function onLapCrossing() {
      completedLaps += 1;
      if (completedLaps >= TOTAL_LAPS) {
        finishRace(performance.now());
        return;
      }
      showBanner(`LAP ${completedLaps}/${TOTAL_LAPS}`, 1.5);
    }

    function detectLapCrossing() {
      if (prevT > 0.82 && car.t < 0.18) {
        onLapCrossing();
      }
      prevT = car.t;
    }

    function updateCarPhysics(dt) {
      const { steer, gas, brake } = frameInput;

      if (gas) {
        car.v += ACCEL * dt;
      } else if (brake) {
        car.v -= BRAKE_FORCE * dt;
      }
      car.v -= car.v * DRAG * dt;
      car.v = Math.max(0, Math.min(car.v, MAX_SPEED));

      car.u += steer * STEER_RATE * dt;
      car.u -= car.u * LATERAL_GRIP * dt;

      const offLimit = TRACK_HALF_WIDTH * OFF_TRACK_FRAC;
      if (Math.abs(car.u) > offLimit) {
        offTrackTimer += dt;
        if (offTrackTimer >= OFF_TRACK_RESET_SEC) {
          resetLapProgress();
        }
      } else {
        offTrackTimer = 0;
      }

      car.t += (car.v * dt) / trackLength;
      if (car.t >= 1) car.t -= 1;
      if (car.t < 0) car.t += 1;

      detectLapCrossing();
      placeCarOnTrack();
    }

    function updateChaseCamera() {
      scratchPos.copy(trackCurve.getPointAt(car.t));
      scratchTan.copy(trackCurve.getTangentAt(car.t)).normalize();
      trackNormal.set(-scratchTan.z, 0, scratchTan.x).normalize();
      scratchPos.addScaledVector(trackNormal, car.u);
      scratchCam.copy(scratchPos).addScaledVector(scratchTan, -CHASE_BACK).add(upOffset);

      chasePos.lerp(scratchCam, CHASE_LERP);
      const lookT = (car.t + LOOK_AHEAD) % 1;
      chaseLook.copy(trackCurve.getPointAt(lookT)).add(lookLift);
      chaseLook.addScaledVector(trackNormal, car.u * 0.35);

      camera.position.copy(chasePos);
      camera.lookAt(chaseLook);
    }

    function update(dt, now) {
      if (bannerHideTimer > 0) {
        bannerHideTimer -= dt;
        if (bannerHideTimer <= 0 && gameState !== 'WAITING') {
          statusBanner.classList.remove('visible');
        }
      }

      sampleInput();

      if (gameState === 'RACING') {
        updateCarPhysics(dt);
      }

      placeCarOnTrack();
      updateChaseCamera();
      updateHud(now);
    }

    function render() {
      renderer.render(scene, camera);
    }

    function gameLoop(now) {
      requestAnimationFrame(gameLoop);
      if (width <= 1 || height <= 1) resize();
      if (!lastFrameTime) lastFrameTime = now;
      const dt = Math.min((now - lastFrameTime) / 1000, 0.033);
      lastFrameTime = now;
      update(dt, now);
      render();
    }

    function init() {
      if (!initRenderer()) {
        showWebGLFallback();
        return;
      }

      trackCurve = buildTrackCurve();
      trackLength = trackCurve.getLength();
      const controlPoints = trackCurve.points;

      scene = buildScene(trackCurve, controlPoints);
      carGroup = createCar();
      scene.add(carGroup);

      camera = new THREE.PerspectiveCamera(58, 1, 0.5, 600);
      camera.position.set(0, 12, 40);

      bindInput();
      resize();
      window.addEventListener('resize', resize);

      const testGl = renderer.getContext();
      if (!testGl || testGl.isContextLost()) {
        showWebGLFallback();
        return;
      }

      resetRace();
      placeCarOnTrack();
      updateChaseCamera();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(() => {
      resize();
      init();
    });
  </script>
</body>
</html>
