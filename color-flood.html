<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Flood — CloudyClaw Games</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="canonical" href="https://cloudyclawai.github.io/snake-game/color-flood.html" />
  <meta name="theme-color" content="#7c6aff" />
  <link rel="stylesheet" href="design-system.css">
  <style>
    :root {
      --color-0: #ff4d4d; /* Red */
      --color-1: #2ecc71; /* Green */
      --color-2: #3498db; /* Blue */
      --color-3: #f1c40f; /* Yellow */
      --color-4: #9b59b6; /* Purple */
      --color-5: #e67e22; /* Orange */
    }

    .canvas-wrap {
      aspect-ratio: 1 / 1;
      background: var(--surface);
      border: 4px solid var(--surface-2);
      box-shadow: var(--shadow-card);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.5rem;
    }

    .color-btn {
      aspect-ratio: 1 / 1;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: transform 0.1s, border-color 0.2s;
      position: relative;
    }

    .color-btn:hover {
      transform: scale(1.05);
      border-color: #fff;
    }

    .color-btn:active {
      transform: scale(0.95);
    }

    .color-btn span {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.5);
      pointer-events: none;
    }

    .color-0 { background-color: var(--color-0); }
    .color-1 { background-color: var(--color-1); }
    .color-2 { background-color: var(--color-2); }
    .color-3 { background-color: var(--color-3); }
    .color-4 { background-color: var(--color-4); }
    .color-5 { background-color: var(--color-5); }

    .game-options {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
    }

    .option-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .option-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .board-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 10, 20, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      z-index: 20;
      border-radius: var(--radius-card);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .board-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .board-overlay h2 { font-size: 2rem; margin-bottom: 0.5rem; }
    .board-overlay p { color: var(--text-muted); margin-bottom: 1.5rem; }

    .timer {
      font-family: var(--font-mono);
      color: var(--accent);
    }

    @media (max-width: 400px) {
      .palette { gap: 0.3rem; }
    }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <a href="index.html" class="nav-brand">Cloudy<span>Claw</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Games</a>
    </div>
  </nav>

  <div class="game-shell">
    <main class="game-main">
      <header class="game-header">
        <a href="index.html" class="back-link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13l-5-5 5-5"/></svg>Back to Hub</a>
        <h1 class="game-title">Color Flood</h1>
        <p class="game-subtitle">Flood the board with a single color before moves run out.</p>
      </header>

      <div class="canvas-wrap canvas-container" style="position: relative; max-width: 500px; margin: 0 auto;">
        <canvas id="game-canvas"></canvas>
        <div id="game-over-overlay" class="board-overlay">
          <h2 id="overlay-title">Game Over</h2>
          <p id="overlay-msg">Try again!</p>
          <button class="btn btn-primary" onclick="resetGame()">Play Again</button>
        </div>
      </div>

      <div class="controls">
        <div class="palette">
          <button class="color-btn color-0" onclick="handleColorPick(0)"><span>1</span></button>
          <button class="color-btn color-1" onclick="handleColorPick(1)"><span>2</span></button>
          <button class="color-btn color-2" onclick="handleColorPick(2)"><span>3</span></button>
          <button class="color-btn color-3" onclick="handleColorPick(3)"><span>4</span></button>
          <button class="color-btn color-4" onclick="handleColorPick(4)"><span>5</span></button>
          <button class="color-btn color-5" onclick="handleColorPick(5)"><span>6</span></button>
        </div>
        <div class="game-options">
          <button class="option-btn chip" onclick="setSize(10, this)">10×10</button>
          <button class="option-btn chip active" onclick="setSize(14, this)">14×14</button>
          <button class="option-btn chip" onclick="setSize(18, this)">18×18</button>
        </div>
      </div>
    </main>

    <aside class="game-sidebar">
      <div class="stat-grid">
        <div class="stat-tile">
          <span class="stat-label">Moves</span>
          <span class="stat-value" id="moves-display">0 / 25</span>
        </div>
        <div class="stat-tile">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score-display">0</span>
        </div>
        <div class="stat-tile">
          <span class="stat-label">Best</span>
          <span class="stat-value" id="best-display">0</span>
        </div>
        <div class="stat-tile">
          <span class="stat-label">Time</span>
          <span class="stat-value timer" id="timer-display">00:00</span>
        </div>
      </div>
      <div id="lb-widget" class="lb-panel"></div>
    </aside>
  </div>

  <script src="leaderboard.js"></script>
  <script src="leaderboard-cloud.js"></script>
  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const movesDisplay = document.getElementById('moves-display');
    const scoreDisplay = document.getElementById('score-display');
    const bestDisplay = document.getElementById('best-display');
    const timerDisplay = document.getElementById('timer-display');
    const overlay = document.getElementById('game-over-overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg = document.getElementById('overlay-msg');

    const COLORS = [
      '#ff4d4d', // Red
      '#2ecc71', // Green
      '#3498db', // Blue
      '#f1c40f', // Yellow
      '#9b59b6', // Purple
      '#e67e22'  // Orange
    ];

    let gridSize = 14;
    let grid = [];
    let moves = 0;
    let maxMoves = 25;
    let score = 0;
    let startTime = null;
    let timerInterval = null;
    let gameState = 'ready'; // ready, playing, won, lost
    let streak = 0;

    // Animation state
    let cellAnims = []; // {r, c, color, startTime}

    function init() {
      resizeCanvas();
      resetGame();
      Leaderboard.renderWidget('color-flood', 'lb-widget');
      bestDisplay.textContent = Leaderboard.getBest('color-flood').toLocaleString();
      
      window.addEventListener('keydown', e => {
        if (gameState !== 'playing') return;
        const key = e.key;
        if (key >= '1' && key <= '6') {
          handleColorPick(parseInt(key) - 1);
        }
      });

      requestAnimationFrame(render);
    }

    function resizeCanvas() {
      const size = canvas.parentElement.clientWidth;
      canvas.width = size * window.devicePixelRatio;
      canvas.height = size * window.devicePixelRatio;
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }

    function resetGame() {
      grid = [];
      for (let r = 0; r < gridSize; r++) {
        grid[r] = [];
        for (let c = 0; c < gridSize; c++) {
          grid[r][c] = Math.floor(Math.random() * 6);
        }
      }

      // Ensure 0,0 is not already the same as a lot of neighbors if we want a fair start?
      // Actually random is fine.

      moves = 0;
      maxMoves = gridSize === 10 ? 20 : (gridSize === 14 ? 25 : 35);
      score = 0;
      gameState = 'playing';
      startTime = Date.now();
      cellAnims = [];
      
      updateStats();
      overlay.classList.remove('visible');
      
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);
      updateTimer();
    }

    function setSize(size, btn) {
      gridSize = size;
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      resetGame();
    }

    function updateTimer() {
      if (!startTime) return;
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
      const secs = (elapsed % 60).toString().padStart(2, '0');
      timerDisplay.textContent = `${mins}:${secs}`;
    }

    function updateStats() {
      movesDisplay.textContent = `${moves} / ${maxMoves}`;
      scoreDisplay.textContent = score.toLocaleString();
    }

    function handleColorPick(colorIndex) {
      if (gameState !== 'playing') return;
      
      const oldColor = grid[0][0];
      if (colorIndex === oldColor) return;

      moves++;
      
      // Find all cells currently connected to (0,0) with oldColor
      const owned = findConnected(0, 0, oldColor);
      
      // Change color and trigger animation
      const now = performance.now();
      for (const [r, c] of owned) {
        grid[r][c] = colorIndex;
        // Ripple effect: delay based on distance from top-left
        const dist = r + c;
        cellAnims.push({
          r, c, 
          color: COLORS[colorIndex], 
          startTime: now + dist * 30,
          duration: 200
        });
      }

      updateStats();

      // Check win condition after a short delay to allow animation to start
      if (checkWin()) {
        win();
      } else if (moves >= maxMoves) {
        lose();
      }
    }

    function findConnected(r, c, color) {
      const connected = [];
      const queue = [[r, c]];
      const visited = new Set([`${r},${c}`]);
      
      while (queue.length > 0) {
        const [currR, currC] = queue.shift();
        connected.push([currR, currC]);
        
        const neighbors = [[0, 1], [0, -1], [1, 0], [-1, 0]];
        for (const [dr, dc] of neighbors) {
          const nr = currR + dr;
          const nc = currC + dc;
          const key = `${nr},${nc}`;
          
          if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize && 
              !visited.has(key) && grid[nr][nc] === color) {
            visited.add(key);
            queue.push([nr, nc]);
          }
        }
      }
      return connected;
    }

    function checkWin() {
      const firstColor = grid[0][0];
      for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
          if (grid[r][c] !== firstColor) return false;
        }
      }
      return true;
    }

    function win() {
      gameState = 'won';
      clearInterval(timerInterval);
      
      const movesRemaining = maxMoves - moves;
      const levelScore = movesRemaining * 100;
      score += levelScore;
      
      streak++;
      if (streak >= 3) {
        score += 500; // Streak bonus
      }

      Leaderboard.saveScore('color-flood', score);
      Leaderboard.renderWidget('color-flood', 'lb-widget');
      bestDisplay.textContent = Leaderboard.getBest('color-flood').toLocaleString();

      overlayTitle.textContent = 'Board Cleared!';
      overlayMsg.textContent = `Score: ${score} (${movesRemaining} moves left)`;
      overlay.classList.add('visible');
    }

    function lose() {
      gameState = 'lost';
      clearInterval(timerInterval);
      streak = 0;
      
      overlayTitle.textContent = 'Out of Moves';
      overlayMsg.textContent = `Final Score: ${score}`;
      overlay.classList.add('visible');
    }

    function render(time) {
      const size = canvas.width / window.devicePixelRatio;
      const cellSize = size / gridSize;
      
      ctx.clearRect(0, 0, size, size);
      
      // Draw base grid
      for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
          ctx.fillStyle = COLORS[grid[r][c]];
          ctx.fillRect(c * cellSize, r * cellSize, cellSize + 0.5, cellSize + 0.5);
        }
      }

      // Draw animations
      for (let i = cellAnims.length - 1; i >= 0; i--) {
        const anim = cellAnims[i];
        const elapsed = time - anim.startTime;
        
        if (elapsed < 0) continue;
        
        if (elapsed > anim.duration) {
          cellAnims.splice(i, 1);
          continue;
        }

        const progress = elapsed / anim.duration;
        // Ripple effect: scale up from center
        ctx.save();
        ctx.fillStyle = anim.color;
        const centerX = (anim.c + 0.5) * cellSize;
        const centerY = (anim.r + 0.5) * cellSize;
        const currentSize = cellSize * progress;
        
        ctx.fillRect(
          centerX - currentSize / 2, 
          centerY - currentSize / 2, 
          currentSize, 
          currentSize
        );
        ctx.restore();
      }

      requestAnimationFrame(render);
    }

    window.addEventListener('resize', resizeCanvas);
    init();
  </script>
</body>
</html>
