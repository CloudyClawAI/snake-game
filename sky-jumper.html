<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Jumper — CloudyClaw Games</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7c6aff" />
  <link rel="stylesheet" href="design-system.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 0 0 80px;
      overflow: hidden;
      touch-action: none;
      background: #87CEEB; /* Initial sky blue */
      transition: background 1s ease;
    }

    #game-container {
      position: relative;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
      border-radius: var(--radius-card);
      overflow: hidden;
      width: min(400px, 100%);
      aspect-ratio: 2 / 3;
      max-height: calc(100vh - 230px);
      margin: 0 auto;
      background: transparent;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .ui {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,20,0.85);
      z-index: 10;
      gap: 0.8rem;
      padding: 1.5rem;
      text-align: center;
    }

    .hidden { display: none !important; }

    .ui h1 {
      color: var(--accent);
      margin: 0;
      font-size: clamp(1.6rem, 8vw, 2.6rem);
      text-shadow: 0 0 20px var(--accent-glow);
    }

    .ui p { font-size: 1rem; color: var(--text-muted); margin: 0; }

    .ui button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.75rem 1.8rem;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: transform 0.1s, background 0.15s;
      margin-top: 0.4rem;
    }
    .ui button:active { transform: scale(0.95); }
    .ui button:hover { background: #9b8fff; }

    .score-display {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 1.5rem;
      font-weight: bold;
      z-index: 5;
      pointer-events: none;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
      color: #fff;
    }

    .lb-panel {
      width: min(400px, 100%);
      margin: 1rem auto 0;
    }

    #best-score-line {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      padding: 6px 0 2px;
    }

  </style>
</head>
<body>

  <nav class="nav-bar">
    <a href="index.html" class="nav-brand">Cloudy<span>Claw</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Games</a>
    </div>
  </nav>

  <div class="game-shell">
    <main class="game-main">
      <header class="game-header">
        <a href="index.html" class="back-link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13l-5-5 5-5"/></svg>Back to Hub</a>
        <h1 class="game-title">Sky Jumper</h1>
        <p class="game-subtitle">Jump higher, shoot enemies, and beat your best height.</p>
      </header>

  <div style="width: 100%">
    <div id="game-container">
      <div class="score-display" id="score">0m</div>
      <canvas id="gameCanvas" width="400" height="600"></canvas>

      <div id="start-screen" class="ui">
        <h1>Sky Jumper</h1>
        <p>Arrows to steer, Space to shoot</p>
        <p>Tilt or drag on mobile</p>
        <button id="start-btn">Start Game</button>
      </div>

      <div id="game-over-screen" class="ui hidden">
        <h1>Game Over!</h1>
        <p id="final-score">Height: 0m</p>
        <div id="lb-widget"></div>
        <button id="restart-btn">Try Again</button>
      </div>
    </div>

    <div id="best-score-line"></div>
    <div class="lb-panel">
      <div class="lb-panel" id="lb-container">
        <h3>Top Scores</h3>
        <div id="lb-widget-main"></div>
      </div>
    </div>
  </div>
    </main>
  </div>

  <script src="leaderboard.js"></script>
  <script src="leaderboard-cloud.js"></script>
  <script>
    const GAME_KEY = 'sky-jumper';
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreElement = document.getElementById('final-score');
    const bestLine = document.getElementById('best-score-line');

    // Game Constants
    const CANVAS_WIDTH = 400;
    const CANVAS_HEIGHT = 600;
    const GRAVITY = 0.4;
    const JUMP_FORCE = -10;
    const STEER_SPEED = 0.5;
    const FRICTION = 0.9;
    const PLATFORM_WIDTH = 60;
    const PLATFORM_HEIGHT = 15;
    const MAX_PLATFORMS = 15;

    // Game State
    let gameActive = false;
    let score = 0;
    let maxHeight = 0;
    let player = {
      x: CANVAS_WIDTH / 2,
      y: CANVAS_HEIGHT - 100,
      vx: 0,
      vy: 0,
      width: 30,
      height: 30,
      color: '#FFD700',
      facingRight: true,
      powerup: null,
      powerupTimer: 0,
      shielded: false
    };
    let platforms = [];
    let enemies = [];
    let bullets = [];
    let powerups = [];
    let cameraY = 0;
    let keys = {};
    let touchX = null;
    let lastShotTime = 0;
    const SHOT_COOLDOWN = 250;

    function updateBestLine() {
      const best = Leaderboard.getBest(GAME_KEY);
      bestLine.textContent = best ? `Best: ${best.toLocaleString()}m` : '';
    }
    updateBestLine();
    Leaderboard.renderWidget(GAME_KEY, 'lb-widget-main');

    // Types
    const PLATFORM_TYPES = {
      NORMAL: 'normal',
      MOVING: 'moving',
      SPRING: 'spring',
      CRUMBLING: 'crumbling',
      CLOUD: 'cloud'
    };

    const POWERUP_TYPES = {
      ROCKET: { type: 'rocket', duration: 180, color: '#f44336', icon: '🚀' },
      JETPACK: { type: 'jetpack', duration: 360, color: '#2196F3', icon: '🎒' },
      SPRING_SHOES: { type: 'spring_shoes', duration: 1, color: '#9C27B0', icon: '👟' },
      SHIELD: { type: 'shield', duration: Infinity, color: '#00BCD4', icon: '🛡️' }
    };

    const ENEMY_TYPES = {
      MONSTER: { type: 'monster', color: '#E91E63', icon: '👾' },
      UFO: { type: 'ufo', color: '#9E9E9E', icon: '🛸' }
    };

    class Platform {
      constructor(x, y, type = PLATFORM_TYPES.NORMAL) {
        this.x = x;
        this.y = y;
        this.width = PLATFORM_WIDTH;
        this.height = PLATFORM_HEIGHT;
        this.type = type;
        this.vx = type === PLATFORM_TYPES.MOVING ? (Math.random() < 0.5 ? 2 : -2) : 0;
        this.broken = false;
        this.opacity = 1;
      }

      update() {
        if (this.type === PLATFORM_TYPES.MOVING) {
          this.x += this.vx;
          if (this.x < 0 || this.x + this.width > CANVAS_WIDTH) {
            this.vx *= -1;
          }
        }
        if (this.broken && this.opacity > 0) {
          this.opacity -= 0.1;
        }
      }

      draw(ctx, cameraOffset) {
        if (this.opacity <= 0) return;
        
        ctx.save();
        ctx.globalAlpha = this.opacity;
        
        let color = '#8BC34A'; // Normal green
        if (this.type === PLATFORM_TYPES.MOVING) color = '#2196F3'; // Blue
        if (this.type === PLATFORM_TYPES.SPRING) color = '#FF9800'; // Orange
        if (this.type === PLATFORM_TYPES.CRUMBLING) color = '#795548'; // Brown
        if (this.type === PLATFORM_TYPES.CLOUD) color = '#FFFFFF'; // White

        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(this.x, this.y + cameraOffset, this.width, this.height, 5);
        ctx.fill();
        
        // Add some detail
        ctx.strokeStyle = 'rgba(0,0,0,0.1)';
        ctx.stroke();

        if (this.type === PLATFORM_TYPES.SPRING) {
          ctx.fillStyle = '#FF5722';
          ctx.fillRect(this.x + this.width/4, this.y + cameraOffset - 5, this.width/2, 5);
        }

        ctx.restore();
      }
    }

    class Enemy {
      constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.width = 40;
        this.height = 40;
        this.type = type;
        this.vx = type === ENEMY_TYPES.UFO ? 3 : 1;
        this.direction = 1;
        this.alive = true;
      }

      update() {
        this.x += this.vx * this.direction;
        if (this.x < 0 || this.x + this.width > CANVAS_WIDTH) {
          this.direction *= -1;
        }
      }

      draw(ctx, cameraOffset) {
        if (!this.alive) return;
        ctx.font = '30px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.type.icon, this.x + this.width/2, this.y + cameraOffset + this.height/2);
      }
    }

    class PowerUp {
      constructor(x, y, config) {
        this.x = x;
        this.y = y;
        this.width = 30;
        this.height = 30;
        this.config = config;
        this.collected = false;
      }

      draw(ctx, cameraOffset) {
        if (this.collected) return;
        ctx.font = '24px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.config.icon, this.x + this.width/2, this.y + cameraOffset + this.height/2);
      }
    }

    class Bullet {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vy = -10;
        this.radius = 4;
        this.active = true;
      }

      update() {
        this.y += this.vy;
      }

      draw(ctx, cameraOffset) {
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(this.x, this.y + cameraOffset, this.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initGame() {
      gameActive = false;
      score = 0;
      maxHeight = 0;
      cameraY = 0;
      player = {
        x: CANVAS_WIDTH / 2 - 15,
        y: CANVAS_HEIGHT - 100,
        vx: 0,
        vy: 0,
        width: 30,
        height: 30,
        color: '#FFD700',
        facingRight: true,
        powerup: null,
        powerupTimer: 0,
        shielded: false
      };
      
      platforms = [];
      enemies = [];
      bullets = [];
      powerups = [];
      
      // Starting platform
      platforms.push(new Platform(CANVAS_WIDTH / 2 - PLATFORM_WIDTH / 2, CANVAS_HEIGHT - 50));
      
      // Initial platforms
      for (let i = 1; i < MAX_PLATFORMS; i++) {
        generatePlatform(CANVAS_HEIGHT - i * 60);
      }
      
      scoreElement.innerText = '0m';
      document.body.style.background = '#87CEEB';
      
      startScreen.classList.remove('hidden');
      gameOverScreen.classList.add('hidden');
      draw();
    }

    function generatePlatform(y) {
      const x = Math.random() * (CANVAS_WIDTH - PLATFORM_WIDTH);
      let type = PLATFORM_TYPES.NORMAL;
      
      const r = Math.random();
      if (r > 0.95) type = PLATFORM_TYPES.SPRING;
      else if (r > 0.85) type = PLATFORM_TYPES.MOVING;
      else if (r > 0.75) type = PLATFORM_TYPES.CRUMBLING;
      else if (r > 0.7) type = PLATFORM_TYPES.CLOUD;

      const p = new Platform(x, y, type);
      platforms.push(p);

      // Randomly add powerup on normal platforms
      if (type === PLATFORM_TYPES.NORMAL && Math.random() > 0.9) {
        const puTypes = Object.values(POWERUP_TYPES);
        const puConfig = puTypes[Math.floor(Math.random() * puTypes.length)];
        powerups.push(new PowerUp(x + PLATFORM_WIDTH/2 - 15, y - 35, puConfig));
      }

      // Randomly add enemy above platform
      if (Math.random() > 0.92 && y < -500) {
        const eTypes = Object.values(ENEMY_TYPES);
        const eConfig = eTypes[Math.floor(Math.random() * eTypes.length)];
        enemies.push(new Enemy(Math.random() * (CANVAS_WIDTH - 40), y - 100, eConfig));
      }
    }

    function shoot() {
      if (!gameActive) return;
      const now = Date.now();
      if (now - lastShotTime < SHOT_COOLDOWN) return;
      lastShotTime = now;
      bullets.push(new Bullet(player.x + player.width/2, player.y));
    }

    function startGame() {
      gameActive = true;
      startScreen.classList.add('hidden');
      gameOverScreen.classList.add('hidden');
      requestAnimationFrame(gameLoop);
    }

    function endGame() {
      gameActive = false;
      const finalScore = Math.floor(maxHeight / 10);
      Leaderboard.saveScore(GAME_KEY, finalScore);
      finalScoreElement.innerText = `Height: ${finalScore}m`;
      Leaderboard.renderWidget(GAME_KEY, 'lb-widget');
      Leaderboard.renderWidget(GAME_KEY, 'lb-widget-main');
      updateBestLine();
      gameOverScreen.classList.remove('hidden');
    }

    function update() {
      if (!gameActive) return;

      // Player Input
      if (keys['ArrowLeft']) {
        player.vx -= STEER_SPEED;
        player.facingRight = false;
      }
      if (keys['ArrowRight']) {
        player.vx += STEER_SPEED;
        player.facingRight = true;
      }
      
      if (touchX !== null) {
        if (touchX < CANVAS_WIDTH / 2) {
          player.vx -= STEER_SPEED;
          player.facingRight = false;
        } else {
          player.vx += STEER_SPEED;
          player.facingRight = true;
        }
      }

      player.vx *= FRICTION;
      player.x += player.vx;

      // Screen Wrap
      if (player.x + player.width < 0) player.x = CANVAS_WIDTH;
      if (player.x > CANVAS_WIDTH) player.x = -player.width;

      // Powerup Logic
      if (player.powerup) {
        player.powerupTimer--;
        if (player.powerup === POWERUP_TYPES.ROCKET.type) {
          player.vy = -15;
        } else if (player.powerup === POWERUP_TYPES.JETPACK.type) {
          player.vy = -10;
        }
        
        if (player.powerupTimer <= 0) {
          player.powerup = null;
        }
      }

      // Gravity and Movement
      if (!player.powerup || (player.powerup !== POWERUP_TYPES.ROCKET.type && player.powerup !== POWERUP_TYPES.JETPACK.type)) {
        player.vy += GRAVITY;
      }
      player.y += player.vy;

      // Camera Follow
      if (player.y < CANVAS_HEIGHT / 2 + cameraY) {
        cameraY = player.y - CANVAS_HEIGHT / 2;
      }

      // Update Platforms and Collision
      platforms.forEach(p => {
        p.update();
        
        // Collision only when falling
        if (player.vy > 0 && !p.broken) {
          if (player.x + player.width > p.x && 
              player.x < p.x + p.width &&
              player.y + player.height > p.y &&
              player.y + player.height < p.y + p.height + player.vy) {
            
            player.y = p.y - player.height;
            
            let jumpMultiplier = 1;
            if (player.powerup === POWERUP_TYPES.SPRING_SHOES.type) {
              jumpMultiplier = 1.5;
              player.powerup = null;
            }

            if (p.type === PLATFORM_TYPES.SPRING) {
              player.vy = JUMP_FORCE * 2 * jumpMultiplier;
            } else if (p.type === PLATFORM_TYPES.CLOUD) {
              player.vy = JUMP_FORCE * jumpMultiplier;
              p.broken = true;
            } else if (p.type === PLATFORM_TYPES.CRUMBLING) {
              player.vy = JUMP_FORCE * jumpMultiplier;
              p.broken = true;
            } else {
              player.vy = JUMP_FORCE * jumpMultiplier;
            }
          }
        }
      });

      // Update Powerups
      powerups.forEach(pu => {
        if (!pu.collected && 
            player.x + player.width > pu.x && 
            player.x < pu.x + pu.width &&
            player.y + player.height > pu.y &&
            player.y < pu.y + pu.height) {
          
          pu.collected = true;
          if (pu.config.type === POWERUP_TYPES.SHIELD.type) {
            player.shielded = true;
          } else {
            player.powerup = pu.config.type;
            player.powerupTimer = pu.config.duration;
          }
        }
      });

      // Update Enemies
      enemies.forEach(e => {
        if (!e.alive) return;
        e.update();
        
        // Collision with player
        if (player.x + player.width > e.x && 
            player.x < e.x + e.width &&
            player.y + player.height > e.y &&
            player.y < e.y + e.height) {
          
          if (player.shielded) {
            player.shielded = false;
            e.alive = false;
          } else if (player.vy > 0 && player.y + player.height < e.y + 20) {
            // Stomp enemy
            player.vy = JUMP_FORCE;
            e.alive = false;
          } else {
            endGame();
          }
        }

        // Collision with bullets
        bullets.forEach(b => {
          if (b.active && 
              b.x > e.x && b.x < e.x + e.width &&
              b.y > e.y && b.y < e.y + e.height) {
            b.active = false;
            e.alive = false;
          }
        });
      });

      // Update Bullets
      bullets.forEach(b => b.update());
      bullets = bullets.filter(b => b.active && b.y > cameraY - 100);

      // Remove old objects and generate new ones
      platforms = platforms.filter(p => p.y < cameraY + CANVAS_HEIGHT + 100);
      enemies = enemies.filter(e => e.alive && e.y < cameraY + CANVAS_HEIGHT + 100);
      powerups = powerups.filter(pu => !pu.collected && pu.y < cameraY + CANVAS_HEIGHT + 100);

      while (platforms.length < MAX_PLATFORMS) {
        const lowestY = Math.min(...platforms.map(p => p.y));
        generatePlatform(lowestY - (Math.random() * 40 + 60));
      }

      // Score
      const currentHeight = Math.floor(Math.abs(player.y - (CANVAS_HEIGHT - 100)));
      if (currentHeight > maxHeight) {
        maxHeight = currentHeight;
        score = Math.floor(maxHeight / 10);
        scoreElement.innerText = score + 'm';
      }

      // Game Over
      if (player.y > cameraY + CANVAS_HEIGHT) {
        endGame();
      }

      // Background Color based on height
      const heightInM = score;
      if (heightInM < 1000) {
        document.body.style.background = '#87CEEB'; // Sky
      } else if (heightInM < 3000) {
        document.body.style.background = '#4A90E2'; // High sky
      } else if (heightInM < 6000) {
        document.body.style.background = '#1e293b'; // Space edge
      } else {
        document.body.style.background = '#0a0a14'; // Deep space
      }
    }

    function draw() {
      ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      
      const cameraOffset = -cameraY;

      // Draw Background Details (Stars/Clouds)
      if (score > 5000) {
        ctx.fillStyle = '#fff';
        for (let i = 0; i < 20; i++) {
          const x = (Math.sin(i * 123.45) * 0.5 + 0.5) * CANVAS_WIDTH;
          const y = ((Math.cos(i * 678.90) * 0.5 + 0.5) * CANVAS_HEIGHT + cameraY * 0.2) % CANVAS_HEIGHT;
          ctx.beginPath();
          ctx.arc(x, y, 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Draw Platforms
      platforms.forEach(p => p.draw(ctx, cameraOffset));

      // Draw Powerups
      powerups.forEach(pu => pu.draw(ctx, cameraOffset));

      // Draw Enemies
      enemies.forEach(e => e.draw(ctx, cameraOffset));

      // Draw Bullets
      bullets.forEach(b => b.draw(ctx, cameraOffset));

      // Draw Player (Cartoonish Bouncy Character)
      ctx.save();
      ctx.translate(player.x + player.width/2, player.y + cameraOffset + player.height/2);
      
      // Squash and stretch based on velocity
      const stretch = 1 + Math.abs(player.vy) * 0.02;
      const squash = 1 / stretch;
      ctx.scale(squash * (player.facingRight ? 1 : -1), stretch);

      // Body
      ctx.fillStyle = player.color;
      ctx.beginPath();
      ctx.roundRect(-player.width/2, -player.height/2, player.width, player.height, 10);
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-7, -5, 5, 0, Math.PI * 2);
      ctx.arc(7, -5, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(-7, -5, 2, 0, Math.PI * 2);
      ctx.arc(7, -5, 2, 0, Math.PI * 2);
      ctx.fill();

      // Powerup visuals
      if (player.powerup === POWERUP_TYPES.ROCKET.type) {
        ctx.font = '20px Arial';
        ctx.fillText('🚀', -10, 20);
      } else if (player.powerup === POWERUP_TYPES.JETPACK.type) {
        ctx.font = '20px Arial';
        ctx.fillText('🎒', -10, 20);
      } else if (player.powerup === POWERUP_TYPES.SPRING_SHOES.type) {
        ctx.font = '16px Arial';
        ctx.fillText('👟', -10, 20);
      }

      if (player.shielded) {
        ctx.strokeStyle = '#00BCD4';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, 25, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    }

    function gameLoop() {
      update();
      draw();
      if (gameActive) {
        requestAnimationFrame(gameLoop);
      }
    }

    // Input
    window.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space') shoot();
    });
    window.addEventListener('keyup', e => keys[e.code] = false);
    
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      if (!gameActive) return;
      shoot();
      touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
    }, { passive: false });
    
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
    }, { passive: false });
    
    canvas.addEventListener('touchend', () => touchX = null);

    document.getElementById('start-btn').onclick = startGame;
    document.getElementById('restart-btn').onclick = initGame;

    initGame();
  </script>
</body>
</html>
