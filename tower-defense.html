<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower Defense — CloudyClaw Games</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#7c6aff" />
<link rel="stylesheet" href="design-system.css" />
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #07080f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
  padding: 60px 8px 16px;
  font-family: 'Segoe UI', Consolas, monospace;
  color: #e0e0e0;
  user-select: none;
  overflow-x: hidden;
}
h1 {
  font-size: 1.7rem;
  letter-spacing: 0.18em;
  color: #4afa9a;
  text-shadow: 0 0 14px #4afa9a88;
  margin-bottom: 10px;
}
#wrap {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
}
#canvas-scaler {
  transform-origin: top left;
  flex-shrink: 0;
}
@keyframes pulse { from{filter:brightness(1)} to{filter:brightness(1.4)} }
canvas {
  border: 2px solid #4afa9a22;
  border-radius: 4px;
  box-shadow: 0 0 32px #4afa9a18;
  display: block;
  cursor: crosshair;
  flex-shrink: 0;
}
#sb {
  width: 215px;
  background: #0e1420;
  border: 1px solid #1e2d40;
  border-radius: 8px;
  padding: 10px 9px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  flex-shrink: 0;
}
.sb-title {
  color: #4afa9a;
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border-bottom: 1px solid #1e2d40;
  padding-bottom: 4px;
  margin-top: 2px;
}
#tbns { display:flex; flex-direction:column; gap:5px; }
.tbn {
  background: #111927;
  border: 2px solid #1e2d40;
  border-radius: 6px;
  color: #cdd;
  padding: 7px 8px;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  font-size: 12px;
  transition: border-color .15s, background .15s;
  width: 100%;
  line-height: 1.4;
}
.tbn:hover { background:#172030; border-color:#3b82f6; }
.tbn.sel { border-color:#4afa9a; background:#0d2219; }
.tbn .tn { font-weight:700; font-size:13.5px; }
.tbn .tc { color:#f1c40f; font-size:11px; }
.tbn .td { color:#667; font-size:10.5px; }
#tinfo {
  background: #111927;
  border: 1px solid #1e2d40;
  border-radius: 6px;
  padding: 8px;
  font-size: 11.5px;
  min-height: 110px;
  line-height: 1.6;
}
#tinfo .srow { color:#93c5fd; }
#tinfo .uname { color:#f1c40f; font-weight:700; }
.sbtn {
  border: none; border-radius: 5px;
  padding: 7px 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12.5px;
  font-weight: 700;
  width: 100%;
  transition: opacity .15s, filter .15s;
}
.sbtn:disabled { opacity:.38; cursor:not-allowed; }
.sbtn:not(:disabled):hover { filter: brightness(1.15); }
#upgbtn  { background:#f1c40f; color:#111; }
#sellbtn { background:#c0392b; color:#fff; }
#wavebtn { background:#4afa9a; color:#050a05; font-size:14px; }
#ffbtn   { background:#1e2d40; color:#9ab; }
#ffbtn.on{ background:#f1c40f; color:#000; }
#bombbtn { background:#e74c3c; color:#fff; }
#bombbtn.arm{ background:#ff7b00; animation:pulse .6s infinite alternate; }
#fzbtn   { background:#3498db; color:#fff; }
#wavebadge {
  background:#4afa9a15; border:1px solid #4afa9a33;
  border-radius:5px; padding:5px 8px;
  font-size:11px; color:#4afa9a; text-align:center;
  line-height:1.5;
}
</style>
</head>
<body>
<a class="back-link" href="index.html">← Hub</a>
<h1>⚔️ TOWER DEFENSE</h1>
<div id="wrap">
  <div id="canvas-scaler"><canvas id="c"></canvas></div>
  <div id="sb">
    <div id="wavebadge">Place towers, then start!</div>
    <div class="sb-title">Towers — click to select</div>
    <div id="tbns"></div>
    <div class="sb-title">Selected Tower</div>
    <div id="tinfo"><span style="color:#445">Click a cell or existing tower.</span></div>
    <button id="upgbtn" class="sbtn" disabled>Upgrade</button>
    <button id="sellbtn" class="sbtn" style="display:none">Sell Tower</button>
    <div class="sb-title">Wave Control</div>
    <button id="wavebtn" class="sbtn">▶ Start Wave 1</button>
    <button id="ffbtn"   class="sbtn">⏩ 2× Speed: OFF</button>
    <div class="sb-title">Special Abilities</div>
    <button id="bombbtn" class="sbtn">💥 Air Strike — 120g</button>
    <button id="fzbtn"   class="sbtn">❄️ Blizzard — 80g</button>
  </div>
</div>
<script>
// ─── constants ───────────────────────────────────────────────────────────────
const CELL = 34, COLS = 21, ROWS = 15;
const GY   = 55;                   // HUD height
const CW   = COLS * CELL;          // 714
const CH   = GY + ROWS * CELL;     // 565

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = CW;
canvas.height = CH;

// ── Responsive canvas scaling ────────────────────────────────────────────────
function applyCanvasScale() {
  const scaler = document.getElementById('canvas-scaler');
  const avail = Math.min(window.innerWidth - 16, CW);
  const scale = avail / CW;
  scaler.style.transform = `scale(${scale})`;
  scaler.style.width = CW + 'px';
  scaler.style.height = CH + 'px';
  scaler.style.marginBottom = ((scale - 1) * CH) + 'px';
}
applyCanvasScale();
window.addEventListener('resize', applyCanvasScale);

// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    this.beginPath();
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y); this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r); this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h); this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r); this.arcTo(x,y,x+r,y,r);
    this.closePath();
  };
}

// ─── path ────────────────────────────────────────────────────────────────────
// Waypoints [col, row]; -1 / COLS entries are off-screen spawn/exit
const WP = [
  [-1,3],[3,3],[3,0],[8,0],[8,6],[13,6],[13,2],[17,2],[17,11],[21,11]
];
// Pixel centres
const WPX = WP.map(([c,r]) => [c*CELL + CELL/2, GY + r*CELL + CELL/2]);

const pathSet = new Set();
for (let i=0;i<WP.length-1;i++){
  const [c0,r0]=WP[i],[c1,r1]=WP[i+1];
  if (c0===c1){
    for(let r=Math.min(r0,r1);r<=Math.max(r0,r1);r++)
      if(c0>=0&&c0<COLS&&r>=0&&r<ROWS) pathSet.add(`${c0},${r}`);
  } else {
    for(let c=Math.min(c0,c1);c<=Math.max(c0,c1);c++)
      if(c>=0&&c<COLS&&r0>=0&&r0<ROWS) pathSet.add(`${c},${r0}`);
  }
}

// ─── tower definitions ───────────────────────────────────────────────────────
const TD = {
  arrow:{
    name:'Arrow', icon:'🏹', cost:50, color:'#2ecc71', barrelLen:14,
    dmg:18, range:130, rate:50, spd:9,
    upgs:[
      {name:'Longbow',     cost:80,  dm:1.6, rg:1.15, rt:0.75},
      {name:'Barrage',     cost:155, dm:2.2, rg:1.30, rt:0.60, multi:3}
    ],
    desc:'Fast single-target'
  },
  cannon:{
    name:'Cannon', icon:'💣', cost:100, color:'#e67e22', barrelLen:16,
    dmg:72, range:102, rate:130, spd:5, splash:52,
    upgs:[
      {name:'Heavy Shell', cost:150, dm:1.8, rg:1.10, rt:0.88, sp:1.5},
      {name:'Cluster Bomb',cost:230, dm:2.5, rg:1.20, rt:0.78, sp:2.0}
    ],
    desc:'AoE explosion'
  },
  magic:{
    name:'Magic',  icon:'✨', cost:75,  color:'#9b59b6', barrelLen:13,
    dmg:26, range:118, rate:82, spd:6.5, dot:7, dotTicks:5, dotInt:28,
    upgs:[
      {name:'Arcane Bolt', cost:105, dm:1.6, rg:1.20, rt:0.80, dotM:1.6},
      {name:'Chaos Storm', cost:185, dm:2.3, rg:1.35, rt:0.65, chain:3}
    ],
    desc:'Poison damage-over-time'
  },
  ice:{
    name:'Ice',    icon:'❄️', cost:75,  color:'#3498db', barrelLen:13,
    dmg:11, range:122, rate:70, spd:5.5, slow:0.38, slowDur:95,
    upgs:[
      {name:'Frost Core',  cost:112, dm:1.3, rg:1.20, rt:0.85, slM:1.35},
      {name:'Blizzard',    cost:195, dm:1.8, rg:1.45, rt:0.72, slM:1.75, aoe:true}
    ],
    desc:'Slows + freezes'
  }
};
const TKEYS = ['arrow','cannon','magic','ice'];

function tStats(t){
  const d=TD[t.type];
  let dmg=d.dmg, range=d.range, rate=d.rate, splash=d.splash||0;
  let slow=d.slow||0, slowDur=d.slowDur||0;
  let dot=d.dot||0, dotTicks=d.dotTicks||0, dotInt=d.dotInt||30;
  let multi=0, chain=0, aoe=false;
  for(let i=0;i<t.lvl;i++){
    const u=d.upgs[i];
    dmg=Math.round(dmg*(u.dm||1));
    range=Math.round(range*(u.rg||1));
    rate=Math.round(rate*(u.rt||1));
    if(u.sp)   splash=Math.round(splash*u.sp);
    if(u.dotM) dot=Math.round(dot*u.dotM);
    if(u.slM)  slow=Math.min(slow*u.slM, 0.92);
    if(u.multi)multi=u.multi;
    if(u.chain)chain=u.chain;
    if(u.aoe)  aoe=true;
  }
  return {dmg,range,rate,splash,slow,slowDur,dot,dotTicks,dotInt,multi,chain,aoe};
}

function tCost(t){
  const d=TD[t.type];
  let c=d.cost;
  for(let i=0;i<t.lvl;i++) c+=d.upgs[i].cost;
  return c;
}

// ─── enemy definitions ───────────────────────────────────────────────────────
const ED = {
  grunt:  {name:'Grunt',  hp:100,  spd:1.55,r:9,  reward:10,  armor:0,   color:'#e74c3c'},
  scout:  {name:'Scout',  hp:62,   spd:3.10,r:7,  reward:15,  armor:0,   color:'#f39c12'},
  knight: {name:'Knight', hp:265,  spd:1.18,r:11, reward:30,  armor:0.40,color:'#95a5a6'},
  ogre:   {name:'Ogre',   hp:560,  spd:0.88,r:13, reward:45,  armor:0.22,color:'#8e44ad'},
  boss:   {name:'BOSS',   hp:2100, spd:0.72,r:19, reward:200, armor:0.52,color:'#c0392b', isBoss:true}
};

// ─── waves ───────────────────────────────────────────────────────────────────
// {t=type, n=count, gap=frames between spawns, after=delay before group}
const WAVES = [
  [{t:'grunt', n:8,  gap:52}],
  [{t:'grunt', n:12, gap:44},{t:'scout',  n:5,  gap:44, after:310}],
  [{t:'scout', n:12, gap:34},{t:'grunt',  n:6,  gap:44, after:260}],
  [{t:'knight',n:6,  gap:66},{t:'scout',  n:8,  gap:32, after:200}],
  [{t:'boss',  n:1,  gap:1 },{t:'scout',  n:14, gap:28, after:75 }],  // mini-boss
  [{t:'knight',n:10, gap:55},{t:'grunt',  n:12, gap:38, after:260}],
  [{t:'scout', n:18, gap:24},{t:'knight', n:6,  gap:55, after:360}],
  [{t:'ogre',  n:5,  gap:82},{t:'scout',  n:12, gap:28, after:200},{t:'knight',n:8,gap:46,after:460}],
  [{t:'knight',n:14, gap:40},{t:'ogre',   n:8,  gap:66, after:300}],
  [{t:'boss',  n:2,  gap:200},{t:'ogre',  n:6,  gap:72, after:310},{t:'knight',n:12,gap:40,after:680}],  // boss wave
  [{t:'scout', n:22, gap:20},{t:'ogre',   n:9,  gap:62, after:360}],
  [{t:'knight',n:18, gap:35},{t:'ogre',   n:12, gap:56, after:420},{t:'boss',n:1,gap:1,after:800}],
  [{t:'scout', n:28, gap:17},{t:'knight', n:18, gap:28, after:460}],
  [{t:'boss',  n:3,  gap:185},{t:'ogre',  n:12, gap:46, after:420},{t:'scout',n:25,gap:17,after:900}],
  [{t:'scout', n:35, gap:13},{t:'knight', n:24, gap:23, after:420},{t:'ogre',n:18,gap:40,after:950},{t:'boss',n:6,gap:120,after:1500}]
];

// ─── game state ──────────────────────────────────────────────────────────────
let gold, lives, score, wave, tick, hs;
let towers, enemies, bullets, particles, floats, chainLines;
let towerMap; // 'c,r' -> tower ref
let waveActive, spawnQ;
let fastFwd, selType, selTower;
let bombCD, fzCD, bombArm;
let screenShake, shakeX, shakeY;
let gstate; // 'menu','playing','gameover','won'

hs = +(localStorage.getItem('td_hs')||0);

function reset(){
  gold=200; lives=20; score=0; wave=0; tick=0;
  towers=[]; enemies=[]; bullets=[]; particles=[]; floats=[]; chainLines=[];
  towerMap={};
  waveActive=false; spawnQ=[];
  fastFwd=false; selType='arrow'; selTower=null;
  bombCD=0; fzCD=0; bombArm=false;
  screenShake=0; shakeX=0; shakeY=0;
  gstate='playing';
  updateSidebar();
  document.getElementById('ffbtn').classList.remove('on');
  document.getElementById('bombbtn').classList.remove('arm');
}

// ─── sidebar ─────────────────────────────────────────────────────────────────
(function buildTowerBtns(){
  const container=document.getElementById('tbns');
  for(const k of TKEYS){
    const d=TD[k];
    const btn=document.createElement('button');
    btn.className='tbn'+(k==='arrow'?' sel':'');
    btn.dataset.type=k;
    btn.innerHTML=`<span class="tn">${d.icon} ${d.name}</span>
<span class="tc"> — ${d.cost}g</span>
<span class="td"> ${d.desc}</span>`;
    btn.addEventListener('click',()=>{
      selType=k; selTower=null;
      document.querySelectorAll('.tbn').forEach(b=>b.classList.toggle('sel',b.dataset.type===k));
      updateSidebar();
    });
    container.appendChild(btn);
  }
})();

function updateSidebar(){
  const info=document.getElementById('tinfo');
  const upgbtn=document.getElementById('upgbtn');
  const sellbtn=document.getElementById('sellbtn');

  if(selTower){
    const t=selTower, d=TD[t.type], st=tStats(t);
    const maxLvl=d.upgs.length;
    const nextUpg=t.lvl<maxLvl?d.upgs[t.lvl]:null;
    const invested=tCost(t);
    const sellVal=Math.round(invested*0.6);

    let lvlStr='';
    for(let i=0;i<maxLvl;i++) lvlStr+= i<t.lvl?'★':'☆';

    info.innerHTML=`<b style="color:#e0e0e0">${d.icon} ${d.name} ${lvlStr}</b><br>
<span class="srow">DMG: ${st.dmg}  RNG: ${st.range}  CD: ${st.rate}</span><br>
${st.splash?`<span class="srow">Splash: ${st.splash}</span><br>`:''}
${st.slow?`<span class="srow">Slow: ${Math.round(st.slow*100)}%  Dur: ${st.slowDur}</span><br>`:''}
${st.dot?`<span class="srow">DoT: ${st.dot}×${st.dotTicks}</span><br>`:''}
${st.multi?`<span class="srow">Multi-shot: ${st.multi}</span><br>`:''}
${st.chain?`<span class="srow">Chain: ${st.chain} targets</span><br>`:''}
${nextUpg?`<span class="uname">▲ ${nextUpg.name} — ${nextUpg.cost}g</span>`:'<span style="color:#2ecc71">✔ Maxed</span>'}`;

    if(nextUpg){
      upgbtn.disabled=gold<nextUpg.cost;
      upgbtn.textContent=`Upgrade → ${nextUpg.name} (${nextUpg.cost}g)`;
    } else {
      upgbtn.disabled=true;
      upgbtn.textContent='Maxed Out';
    }
    upgbtn.style.display='';
    sellbtn.style.display='';
    sellbtn.textContent=`Sell Tower (+${sellVal}g)`;
  } else {
    const d=TD[selType];
    info.innerHTML=`<b style="color:#e0e0e0">${d.icon} ${d.name}</b> — <span style="color:#f1c40f">${d.cost}g</span><br>
<span class="srow">DMG: ${d.dmg}  RNG: ${d.range}  CD: ${d.rate}</span><br>
<span class="td">${d.desc}</span><br><br>
<span style="color:#556">Click a grass cell to place.</span>`;
    upgbtn.disabled=true;
    upgbtn.textContent='Upgrade';
    upgbtn.style.display='';
    sellbtn.style.display='none';
  }

  // wave button
  const wbtn=document.getElementById('wavebtn');
  if(wave>=WAVES.length && !waveActive){
    wbtn.disabled=true; wbtn.textContent='All Waves Complete!';
  } else {
    wbtn.disabled=waveActive;
    wbtn.textContent=waveActive?`Wave ${wave} in progress…`:`▶ Start Wave ${wave+1}`;
  }

  // ability buttons
  const bb=document.getElementById('bombbtn');
  const fb=document.getElementById('fzbtn');
  bb.disabled=gold<120&&!bombArm;
  bb.textContent=bombArm?'💥 Click map to strike!':
    `💥 Air Strike — 120g${bombCD>0?` [${Math.ceil(bombCD/60)}s]`:' [READY]'}`;
  fb.disabled=gold<80||fzCD>0;
  fb.textContent=`❄️ Blizzard — 80g${fzCD>0?` [${Math.ceil(fzCD/60)}s]`:' [READY]'}`;

  // badge
  const badge=document.getElementById('wavebadge');
  if(gstate==='playing'){
    badge.textContent=waveActive?`Wave ${wave}/${WAVES.length} — ${enemies.length} enemies left`:
      wave===0?'Place towers, then start!':
      wave>=WAVES.length?`🏆 All waves cleared!`:`Wave ${wave} clear! +${25+wave*5}g bonus`;
  }
}

// ─── sidebar button handlers ──────────────────────────────────────────────────
document.getElementById('wavebtn').addEventListener('click',()=>{
  if(gstate!=='playing'||waveActive||wave>=WAVES.length) return;
  startWave();
  updateSidebar();
});

document.getElementById('ffbtn').addEventListener('click',()=>{
  fastFwd=!fastFwd;
  const b=document.getElementById('ffbtn');
  b.classList.toggle('on',fastFwd);
  b.textContent=`⏩ 2× Speed: ${fastFwd?'ON':'OFF'}`;
});

document.getElementById('upgbtn').addEventListener('click',()=>{
  if(!selTower) return;
  const d=TD[selTower.type];
  if(selTower.lvl>=d.upgs.length) return;
  const cost=d.upgs[selTower.lvl].cost;
  if(gold<cost) return;
  gold-=cost;
  selTower.lvl++;
  addFloat(selTower.cx, selTower.cy-18, `↑ ${d.upgs[selTower.lvl-1].name}`, '#f1c40f');
  updateSidebar();
});

document.getElementById('sellbtn').addEventListener('click',()=>{
  if(!selTower) return;
  const ref=Math.round(tCost(selTower)*0.6);
  gold+=ref;
  const key=`${selTower.c},${selTower.r}`;
  delete towerMap[key];
  towers=towers.filter(t=>t!==selTower);
  addFloat(selTower.cx, selTower.cy-18, `+${ref}g`, '#e74c3c');
  selTower=null;
  updateSidebar();
});

document.getElementById('bombbtn').addEventListener('click',()=>{
  if(bombArm){ bombArm=false; document.getElementById('bombbtn').classList.remove('arm'); updateSidebar(); return; }
  if(gold<120) return;
  bombArm=true;
  document.getElementById('bombbtn').classList.add('arm');
  updateSidebar();
});

document.getElementById('fzbtn').addEventListener('click',()=>{
  if(gold<80||fzCD>0) return;
  gold-=80;
  fzCD=2700;
  for(const e of enemies){
    if(e.dead) continue;
    e.slow=0.10; e.slowTimer=200;
  }
  addFloat(CW/2, CH/2-30, '❄️ BLIZZARD!', '#3498db');
  emitParticles(CW/2,CH/2,'#3498db',50,6,55,true);
  updateSidebar();
});

// ─── input ───────────────────────────────────────────────────────────────────
let hoverC=-1, hoverR=-1;

function canvasXY(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = rect.width / canvas.width;
  const scaleY = rect.height / canvas.height;
  const src = e.touches ? e.touches[0] : e;
  return { mx: (src.clientX - rect.left) / scaleX, my: (src.clientY - rect.top) / scaleY };
}

canvas.addEventListener('mousemove',e=>{
  const {mx,my}=canvasXY(e);
  if(my<GY){hoverC=-1;hoverR=-1;return;}
  hoverC=Math.floor(mx/CELL);
  hoverR=Math.floor((my-GY)/CELL);
});
canvas.addEventListener('mouseleave',()=>{hoverC=-1;hoverR=-1;});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const {mx,my}=canvasXY(e);
  if(my<GY){hoverC=-1;hoverR=-1;return;}
  hoverC=Math.floor(mx/CELL);
  hoverR=Math.floor((my-GY)/CELL);
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  const {mx,my}=canvasXY(e);
  const fakeClick={clientX:e.changedTouches[0].clientX,clientY:e.changedTouches[0].clientY};
  canvas.dispatchEvent(Object.assign(new MouseEvent('click'),{clientX:fakeClick.clientX,clientY:fakeClick.clientY}));
},{passive:false});

canvas.addEventListener('click',e=>{
  if(gstate==='gameover'||gstate==='won'){
    start(); return;
  }
  if(gstate!=='playing') return;
  const {mx,my}=canvasXY(e);

  // Bomb strike mode
  if(bombArm){
    gold-=120; bombCD=1800; bombArm=false;
    document.getElementById('bombbtn').classList.remove('arm');
    const bx=mx+shakeX, by=my+shakeY;
    for(const en of enemies){
      if(en.dead) continue;
      const dx=en.x-bx, dy=en.y-by;
      if(Math.sqrt(dx*dx+dy*dy)<=95) hitEnemy(en,420,{color:'#ff5500'});
    }
    emitParticles(bx,by,'#e67e22',35,7,45,true);
    emitParticles(bx,by,'#ff5500',20,5,35,true);
    addFloat(bx,by-20,'💥 AIR STRIKE!','#e74c3c');
    screenShake=10;
    updateSidebar();
    return;
  }

  if(my<GY) return;
  const c=Math.floor(mx/CELL), r=Math.floor((my-GY)/CELL);
  const key=`${c},${r}`;

  if(towerMap[key]){
    selTower=towerMap[key]; selType=selTower.type;
    document.querySelectorAll('.tbn').forEach(b=>b.classList.toggle('sel',b.dataset.type===selTower.type));
    updateSidebar(); return;
  }

  // Place tower
  if(selType && !pathSet.has(key) && c>=0&&c<COLS&&r>=0&&r<ROWS){
    const d=TD[selType];
    if(gold>=d.cost){
      gold-=d.cost;
      const t={
        type:selType, c, r,
        cx:c*CELL+CELL/2, cy:GY+r*CELL+CELL/2,
        lvl:0, cd:0, angle:0
      };
      towerMap[key]=t;
      towers.push(t);
      selTower=t;
      updateSidebar();
    }
  } else {
    selTower=null;
    updateSidebar();
  }
});

// ─── wave / spawn ─────────────────────────────────────────────────────────────
function startWave(){
  if(waveActive||wave>=WAVES.length) return;
  wave++;
  waveActive=true;
  spawnQ=[];
  const groups=WAVES[wave-1];
  const baseTick=tick;
  for(const g of groups){
    const start=baseTick+(g.after||0);
    for(let i=0;i<g.n;i++) spawnQ.push({type:g.t, at:start+i*g.gap});
  }
  spawnQ.sort((a,b)=>a.at-b.at);
  updateSidebar();
}

function spawnEnemy(type){
  const d=ED[type];
  const scale=1+Math.pow(wave-1,1.1)*0.08;
  const id=Math.random()*1e9|0;
  enemies.push({
    type,id,
    hp:Math.round(d.hp*scale), maxHp:Math.round(d.hp*scale),
    spd:d.spd, r:d.r, reward:d.reward, armor:d.armor,
    color:d.color, isBoss:d.isBoss||false,
    wp:0, x:WPX[0][0], y:WPX[0][1], dist:0,
    slow:1, slowTimer:0,
    dots:[], flashTimer:0, dead:false
  });
}

// ─── enemy movement ───────────────────────────────────────────────────────────
function moveEnemy(e){
  const speed=e.spd*(e.slowTimer>0?e.slow:1)*(fastFwd?2:1);
  let rem=speed;
  while(rem>0 && e.wp+1<WPX.length){
    const [nx,ny]=WPX[e.wp+1];
    const dx=nx-e.x, dy=ny-e.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<=rem){ e.x=nx; e.y=ny; e.dist+=d; rem-=d; e.wp++; }
    else{ e.x+=dx/d*rem; e.y+=dy/d*rem; e.dist+=rem; rem=0; }
  }
  return e.wp+1>=WPX.length;
}

// ─── combat ───────────────────────────────────────────────────────────────────
function hitEnemy(e,dmg,opts={}){
  if(e.dead) return;
  const actual=Math.max(1,Math.round(dmg*(1-e.armor)));
  e.hp-=actual;
  e.flashTimer=7;
  if(opts.slow){ e.slow=opts.slow; e.slowTimer=opts.slowDur||80; }
  if(opts.dot && opts.dotTicks){
    e.dots.push({dmg:opts.dot, ticks:opts.dotTicks, interval:opts.dotInt||28, next:tick+(opts.dotInt||28)});
  }
  emitParticles(e.x,e.y,opts.color||'#fff',3,2.5,16);
  if(e.hp<=0) killEnemy(e);
}

let combo=0, comboTimer=0;
function killEnemy(e){
  if(e.dead) return;
  e.dead=true;
  gold+=e.reward;
  const mult=1+Math.min(combo,25)*0.08;
  score+=Math.round(e.reward*mult*(1+wave*0.05));
  combo++; comboTimer=180;
  emitParticles(e.x,e.y,e.color, e.isBoss?50:e.r>11?22:14, e.isBoss?8:5, 45);
  addFloat(e.x,e.y-e.r, `+${e.reward}g`, '#f1c40f');
  if(combo>3) addFloat(e.x,e.y-e.r-16,`${combo}× COMBO`,'#ff9900');
  if(e.isBoss) addFloat(e.x,e.y-e.r-30,'BOSS DOWN!','#e74c3c');
}

function getTarget(t, range){
  let best=null;
  for(const e of enemies){
    if(e.dead) continue;
    const dx=e.x-t.cx, dy=e.y-t.cy;
    if(dx*dx+dy*dy<=range*range){
      if(!best||e.dist>best.dist) best=e;
    }
  }
  return best;
}

// ─── particles / floats ───────────────────────────────────────────────────────
function emitParticles(x,y,color,n,spd,life,spread=false){
  const cap=200;
  if(particles.length>cap) particles.splice(0,particles.length-cap);
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const s=spd*(0.4+Math.random()*0.9);
    particles.push({
      x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-(spread?1:0),
      life, maxLife:life, color,
      r:1.2+Math.random()*(spread?3:2)
    });
  }
}

function addFloat(x,y,text,color){
  floats.push({x,y,text,color,life:72,vy:-1.2});
}

// ─── chain line helper ────────────────────────────────────────────────────────
function addChainLine(x1,y1,x2,y2){
  chainLines.push({x1,y1,x2,y2,life:18});
}

// ─── main update ─────────────────────────────────────────────────────────────
function update(){
  if(gstate!=='playing') return;
  tick++;

  if(comboTimer>0){ comboTimer--; if(comboTimer===0) combo=0; }
  if(bombCD>0) bombCD--;
  if(fzCD>0)   fzCD--;

  // Screen shake decay
  if(screenShake>0){
    screenShake=Math.max(0,screenShake-0.8);
    shakeX=(Math.random()*2-1)*screenShake;
    shakeY=(Math.random()*2-1)*screenShake;
  } else { shakeX=0; shakeY=0; }

  // Spawn
  while(spawnQ.length && spawnQ[0].at<=tick) spawnEnemy(spawnQ.shift().type);

  // Enemies: DoT, slow, move
  for(const e of enemies){
    if(e.dead) continue;
    if(e.slowTimer>0) e.slowTimer--;
    if(e.flashTimer>0) e.flashTimer--;

    // DoT
    e.dots=e.dots.filter(d=>{
      if(d.ticks<=0||e.dead) return false;
      if(tick>=d.next){
        e.hp-=d.dmg;
        d.ticks--;
        d.next=tick+d.interval;
        emitParticles(e.x,e.y,'#9b59b6',2,1.5,12);
        if(e.hp<=0){ killEnemy(e); return false; }
      }
      return true;
    });
    if(e.dead) continue;

    const reached=moveEnemy(e);
    if(reached){
      e.dead=true; lives--;
      emitParticles(e.x,e.y,'#e74c3c',8,3,25);
      if(lives<=0){
        lives=0; gstate='gameover';
        if(score>hs){ hs=score; localStorage.setItem('td_hs',hs); }
        if(typeof Leaderboard!=='undefined') Leaderboard.saveScore('tower-defense',Math.round(score));
        updateSidebar(); return;
      }
    }
  }
  enemies=enemies.filter(e=>!e.dead);

  // Check wave end
  if(waveActive && spawnQ.length===0 && enemies.length===0){
    waveActive=false;
    const bonus=25+wave*5;
    gold+=bonus;
    addFloat(CW/2, GY+20, `Wave ${wave} Clear! +${bonus}g`, '#2ecc71');
    updateSidebar();
    if(wave>=WAVES.length){
      setTimeout(()=>{
        gstate='won';
        if(score>hs){ hs=score; localStorage.setItem('td_hs',hs); }
        if(typeof Leaderboard!=='undefined') Leaderboard.saveScore('tower-defense',Math.round(score));
        updateSidebar();
      }, 1200);
    }
  }

  // Periodic sidebar refresh for cooldown countdowns
  if(tick%60===0) updateSidebar();

  // Tower shooting
  for(const t of towers){
    const st=tStats(t);
    t.cd=Math.max(0, t.cd-1);
    if(t.cd>0) continue;

    // Ice blizzard: AoE pulse every cooldown
    if(st.aoe && t.type==='ice'){
      const inRange=enemies.filter(e=>{
        if(e.dead) return false;
        const dx=e.x-t.cx,dy=e.y-t.cy;
        return dx*dx+dy*dy<=st.range*st.range;
      });
      if(inRange.length>0){
        t.cd=st.rate;
        t.angle=Math.atan2(inRange[0].y-t.cy, inRange[0].x-t.cx);
        for(const e of inRange) hitEnemy(e,st.dmg,{slow:st.slow,slowDur:st.slowDur,color:'#3498db'});
        emitParticles(t.cx,t.cy,'#3498db',12,5,22);
      }
      continue;
    }

    const tgt=getTarget(t, st.range);
    if(!tgt) continue;
    t.cd=st.rate;
    t.angle=Math.atan2(tgt.y-t.cy, tgt.x-t.cx);

    if(st.multi>1){
      const inR=enemies
        .filter(e=>{ if(e.dead)return false; const dx=e.x-t.cx,dy=e.y-t.cy; return dx*dx+dy*dy<=st.range*st.range; })
        .sort((a,b)=>b.dist-a.dist)
        .slice(0,st.multi);
      for(const e of inR) fireBullet(t,e,st);
    } else {
      fireBullet(t,tgt,st);
    }
  }

  // Bullets
  for(const b of bullets){
    if(b.dead) continue;
    // Update homing target position
    const tgt=enemies.find(e=>!e.dead&&e.id===b.tid);
    if(tgt){ b.tx=tgt.x; b.ty=tgt.y; }

    const dx=b.tx-b.x, dy=b.ty-b.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const spd=b.spd*(fastFwd?2:1);

    if(dist<spd+2){
      b.dead=true;
      if(b.splash>0){
        for(const e of enemies){
          if(e.dead) continue;
          const ex=e.x-b.x, ey=e.y-b.y;
          if(ex*ex+ey*ey<=b.splash*b.splash)
            hitEnemy(e,b.dmg,{color:'#e67e22'});
        }
        emitParticles(b.x,b.y,'#e67e22',22,6,35,true);
        emitParticles(b.x,b.y,'#ffd700',10,4,22,true);
        screenShake=Math.max(screenShake,4);
      } else if(tgt||dist<12){
        const en=tgt||enemies.find(e=>{ if(e.dead)return false; const dx=e.x-b.x,dy=e.y-b.y; return dx*dx+dy*dy<(e.r+6)*(e.r+6); });
        if(en){
          hitEnemy(en,b.dmg,{slow:b.slow,slowDur:b.slowDur,dot:b.dot,dotTicks:b.dotTicks,dotInt:b.dotInt,color:b.color});
          // Chain lightning
          if(b.chain>0){
            let src=en;
            for(let ci=0;ci<b.chain;ci++){
              let near=null, nearD=130;
              for(const ce of enemies){
                if(ce.dead||ce===src) continue;
                const dx=ce.x-src.x, dy=ce.y-src.y;
                const d=Math.sqrt(dx*dx+dy*dy);
                if(d<nearD){ near=ce; nearD=d; }
              }
              if(near){
                addChainLine(src.x,src.y,near.x,near.y);
                hitEnemy(near,Math.round(b.dmg*0.55),{color:'#9b59b6'});
                src=near;
              }
            }
          }
        }
      }
    } else {
      b.x+=dx/dist*spd;
      b.y+=dy/dist*spd;
    }
  }
  bullets=bullets.filter(b=>!b.dead);

  // Particles
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.vx*=0.97; p.life--; }
  particles=particles.filter(p=>p.life>0);

  // Floats
  for(const f of floats){ f.y+=f.vy; f.life--; }
  floats=floats.filter(f=>f.life>0);

  // Chain lines
  for(const cl of chainLines) cl.life--;
  chainLines=chainLines.filter(cl=>cl.life>0);

  updateSidebar();
}

function fireBullet(t,tgt,st){
  bullets.push({
    x:t.cx, y:t.cy,
    tx:tgt.x, ty:tgt.y,
    tid:tgt.id,
    spd:TD[t.type].spd,
    dmg:st.dmg, splash:st.splash||0,
    slow:st.slow||0, slowDur:st.slowDur||0,
    dot:st.dot||0, dotTicks:st.dotTicks||0, dotInt:st.dotInt||28,
    chain:st.chain||0,
    color:TD[t.type].color,
    type:t.type,
    r:t.type==='cannon'?6:t.type==='ice'?5:4,
    dead:false
  });
}

// ─── drawing ──────────────────────────────────────────────────────────────────
function draw(){
  ctx.save();
  ctx.translate(shakeX,shakeY);

  // Background
  const bg=ctx.createLinearGradient(0,0,0,CH);
  bg.addColorStop(0,'#152215'); bg.addColorStop(1,'#0a120a');
  ctx.fillStyle=bg; ctx.fillRect(-5,-5,CW+10,CH+10);

  // Subtle grid
  ctx.strokeStyle='rgba(255,255,255,0.035)'; ctx.lineWidth=1;
  for(let c=0;c<=COLS;c++){
    ctx.beginPath(); ctx.moveTo(c*CELL,GY); ctx.lineTo(c*CELL,CH); ctx.stroke();
  }
  for(let r=0;r<=ROWS;r++){
    ctx.beginPath(); ctx.moveTo(0,GY+r*CELL); ctx.lineTo(CW,GY+r*CELL); ctx.stroke();
  }

  // Path cells
  for(const key of pathSet){
    const [c,r]=key.split(',').map(Number);
    const px=c*CELL, py=GY+r*CELL;
    // Dirt base
    ctx.fillStyle='#6b4c1a'; ctx.fillRect(px,py,CELL,CELL);
    // Inner lighter dirt
    ctx.fillStyle='#8a6228'; ctx.fillRect(px+2,py+2,CELL-4,CELL-4);
    // Centre highlight
    ctx.fillStyle='#9a7030'; ctx.fillRect(px+5,py+5,CELL-10,CELL-10);
  }

  // Path direction arrows (subtle)
  ctx.globalAlpha=0.18; ctx.fillStyle='#fff';
  ctx.font=`${CELL-10}px sans-serif`; ctx.textAlign='center';
  for(let i=1;i<WP.length-1;i++){
    const [c,r]=WP[i];
    if(c<0||c>=COLS||r<0||r>=ROWS) continue;
    const [nc,nr]=WP[i+1];
    const dx=nc-c, dy=nr-r;
    const sym=dx>0?'›':dx<0?'‹':dy>0?'v':'^';
    ctx.fillText(sym, c*CELL+CELL/2, GY+r*CELL+CELL/2+6);
  }
  ctx.globalAlpha=1;

  // Entry / exit labels
  ctx.font='bold 9px monospace';
  ctx.textAlign='left'; ctx.fillStyle='#2ecc71';
  ctx.fillText('▶ START', 2, GY+3*CELL+CELL/2+4);
  ctx.textAlign='right'; ctx.fillStyle='#e74c3c';
  ctx.fillText('END ▶', CW-2, GY+11*CELL+CELL/2+4);

  // Tower range preview while hovering (placement mode)
  if(!selTower && selType && hoverC>=0 && hoverR>=0){
    const key=`${hoverC},${hoverR}`;
    const ok=!pathSet.has(key)&&!towerMap[key]&&hoverC>=0&&hoverC<COLS&&hoverR>=0&&hoverR<ROWS;
    const px=hoverC*CELL, py=GY+hoverR*CELL;
    ctx.fillStyle=ok?'rgba(46,204,113,0.25)':'rgba(231,76,60,0.25)';
    ctx.fillRect(px,py,CELL,CELL);
    ctx.strokeStyle=ok?'#2ecc71':'#e74c3c'; ctx.lineWidth=2;
    ctx.strokeRect(px+1,py+1,CELL-2,CELL-2);
    if(ok){
      const d=TD[selType];
      const cx=hoverC*CELL+CELL/2, cy=GY+hoverR*CELL+CELL/2;
      ctx.beginPath(); ctx.arc(cx,cy,d.range,0,Math.PI*2);
      ctx.strokeStyle=d.color+'55'; ctx.lineWidth=1.5; ctx.stroke();
      ctx.fillStyle=d.color+'0d'; ctx.fill();
    }
  }

  // Selected tower range
  if(selTower){
    const st=tStats(selTower);
    ctx.beginPath(); ctx.arc(selTower.cx,selTower.cy,st.range,0,Math.PI*2);
    ctx.strokeStyle=TD[selTower.type].color+'88'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle=TD[selTower.type].color+'0e'; ctx.fill();
  }

  // Draw towers
  for(const t of towers) drawTower(t);

  // Chain lightning lines
  for(const cl of chainLines){
    const a=cl.life/18;
    ctx.globalAlpha=a;
    ctx.strokeStyle='#9b59b6'; ctx.lineWidth=2.5;
    ctx.shadowBlur=8; ctx.shadowColor='#9b59b6';
    ctx.beginPath(); ctx.moveTo(cl.x1,cl.y1); ctx.lineTo(cl.x2,cl.y2); ctx.stroke();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  // Bullets
  for(const b of bullets){
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle=b.color;
    ctx.shadowBlur=b.type==='cannon'?0:7; ctx.shadowColor=b.color;
    ctx.fill(); ctx.shadowBlur=0;
  }

  // Enemies
  for(const e of enemies) if(!e.dead) drawEnemy(e);

  // Particles
  for(const p of particles){
    const a=p.life/p.maxLife;
    ctx.globalAlpha=a;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a+0.5,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill();
  }
  ctx.globalAlpha=1;

  // Floating texts
  ctx.font='bold 13px monospace'; ctx.textAlign='center';
  for(const f of floats){
    const a=Math.min(1,f.life/20);
    ctx.globalAlpha=a;
    ctx.fillStyle=f.color;
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;

  // HUD
  drawHUD();

  // Overlays
  if(gstate==='gameover') drawOverlay('GAME OVER','#e74c3c',`Score: ${Math.round(score)}`,`Best: ${Math.round(hs)}`,'Click to retry');
  if(gstate==='won')      drawOverlay('🏆 VICTORY!','#2ecc71',`Final Score: ${Math.round(score)}`,`Best: ${Math.round(hs)}`,'Click to play again');

  ctx.restore();
}

function drawTower(t){
  const d=TD[t.type];
  const {cx,cy}=t;
  const half=CELL/2;

  // Base pad
  ctx.fillStyle='#2c3e50';
  ctx.beginPath();
  ctx.roundRect(cx-half+2,cy-half+2,CELL-4,CELL-4,4);
  ctx.fill();

  // Body circle
  ctx.beginPath(); ctx.arc(cx,cy,half-5,0,Math.PI*2);
  const grad=ctx.createRadialGradient(cx-3,cy-3,1,cx,cy,half-5);
  grad.addColorStop(0,lighten(d.color,40)); grad.addColorStop(1,d.color);
  ctx.fillStyle=grad; ctx.fill();

  // Border glow when selected
  if(selTower===t){
    ctx.beginPath(); ctx.arc(cx,cy,half-4,0,Math.PI*2);
    ctx.strokeStyle='#f1c40f'; ctx.lineWidth=2.5;
    ctx.shadowBlur=8; ctx.shadowColor='#f1c40f'; ctx.stroke(); ctx.shadowBlur=0;
  }

  // Barrel
  const blen=d.barrelLen;
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(t.angle);
  ctx.fillStyle='#1a252f';
  ctx.fillRect(0,-3.5,blen,7);
  ctx.fillStyle='#2c3e50';
  ctx.fillRect(2,-2.5,blen-4,5);
  ctx.restore();

  // Upgrade stars
  const stars=t.lvl;
  for(let i=0;i<stars;i++){
    ctx.beginPath(); ctx.arc(cx-4+i*8, cy+half-7, 3, 0, Math.PI*2);
    ctx.fillStyle='#f1c40f'; ctx.fill();
  }

  // Icon
  ctx.font='12px serif'; ctx.textAlign='center';
  ctx.fillText(d.icon, cx, cy-1);
}

function drawEnemy(e){
  const {x,y,r}=e;

  // Shadow ellipse
  ctx.beginPath();
  ctx.ellipse(x,y+r+1,r*0.7,r*0.28,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fill();

  // Slow aura
  if(e.slowTimer>0){
    ctx.beginPath(); ctx.arc(x,y,r+3,0,Math.PI*2);
    ctx.fillStyle='rgba(52,152,219,0.3)'; ctx.fill();
  }

  // Body
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  const flash=e.flashTimer>0;
  if(flash){
    ctx.fillStyle='#ffffff';
  } else {
    const g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
    g.addColorStop(0,lighten(e.color,30)); g.addColorStop(1,e.color);
    ctx.fillStyle=g;
  }
  ctx.fill();

  // DoT overlay
  if(e.dots.length>0){
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle='rgba(155,89,182,0.35)'; ctx.fill();
  }

  // Boss pulse ring
  if(e.isBoss){
    const pulse=0.5+0.5*Math.sin(tick*0.08);
    ctx.beginPath(); ctx.arc(x,y,r+4+pulse*4,0,Math.PI*2);
    ctx.strokeStyle='rgba(192,57,43,'+(.4+pulse*.3)+')';
    ctx.lineWidth=2.5; ctx.stroke();
  }

  // HP bar
  const bw=r*2+6, bh=5;
  const bx=x-bw/2, by=y-r-11;
  ctx.fillStyle='#222'; ctx.fillRect(bx,by,bw,bh);
  const hp=Math.max(0,e.hp/e.maxHp);
  const hcol=hp>0.5?'#2ecc71':hp>0.25?'#f39c12':'#e74c3c';
  ctx.fillStyle=hcol; ctx.fillRect(bx,by,bw*hp,bh);
  ctx.strokeStyle='#000'; ctx.lineWidth=0.6; ctx.strokeRect(bx,by,bw,bh);

  if(e.isBoss){
    ctx.fillStyle='#fff'; ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillText(Math.ceil(e.hp),x,by-1);
  }
}

function drawHUD(){
  // HUD background
  const hg=ctx.createLinearGradient(0,0,0,GY);
  hg.addColorStop(0,'#0e1c2e'); hg.addColorStop(1,'#0a1520');
  ctx.fillStyle=hg; ctx.fillRect(0,0,CW,GY);
  ctx.fillStyle='#1e3a5f'; ctx.fillRect(0,GY-2,CW,2);

  ctx.textAlign='left'; ctx.font='bold 13px monospace';
  ctx.fillStyle='#f1c40f'; ctx.fillText(`💰 ${gold}`, 10, 21);
  ctx.fillStyle='#e74c3c'; ctx.fillText(`❤️  ${lives}`, 10, 40);

  ctx.textAlign='center'; ctx.font='bold 15px monospace';
  ctx.fillStyle='#e0e0e0'; ctx.fillText(`Wave ${wave} / ${WAVES.length}`, CW/2, 21);
  ctx.fillStyle='#93c5fd'; ctx.font='13px monospace';
  ctx.fillText(`Score: ${Math.round(score)}`, CW/2, 40);

  if(combo>1&&comboTimer>0){
    const hue=Math.min(combo*12,60);
    ctx.fillStyle=`hsl(${hue},100%,60%)`;
    ctx.font='bold 12px monospace';
    ctx.textAlign='center';
    ctx.fillText(`🔥 ${combo}× COMBO`, CW*0.75, 30);
  }

  ctx.textAlign='right'; ctx.font='11px monospace';
  ctx.fillStyle='#556'; ctx.fillText(`Best: ${Math.round(hs)}`, CW-8, 20);
  if(fastFwd){ ctx.fillStyle='#f1c40f'; ctx.font='bold 11px monospace'; ctx.fillText('⏩ 2×', CW-8, 38); }
}

function drawOverlay(title,titleColor,line1,line2,cta){
  ctx.fillStyle='rgba(0,0,0,0.78)';
  ctx.fillRect(0,GY,CW,CH-GY);

  const mx=CW/2, my=(GY+CH)/2;
  ctx.textAlign='center';
  ctx.font='bold 40px monospace'; ctx.fillStyle=titleColor;
  ctx.shadowBlur=16; ctx.shadowColor=titleColor;
  ctx.fillText(title,mx,my-50); ctx.shadowBlur=0;

  ctx.font='20px monospace'; ctx.fillStyle='#fff';
  ctx.fillText(line1,mx,my);
  ctx.font='14px monospace'; ctx.fillStyle='#f1c40f';
  ctx.fillText(line2,mx,my+30);
  ctx.fillStyle='#4afa9a'; ctx.font='13px monospace';
  ctx.fillText(cta,mx,my+65);
}

function lighten(hex,amt){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  const lr=Math.min(255,r+amt), lg=Math.min(255,g+amt), lb=Math.min(255,b+amt);
  return `rgb(${lr},${lg},${lb})`;
}

// ─── game loop ────────────────────────────────────────────────────────────────
let rafId=null;
function loop(){
  update();
  if(fastFwd) update();  // double tick when fast-forward
  draw();
  if(gstate==='playing') rafId=requestAnimationFrame(loop);
  else draw(); // final frame for overlays
}

function start(){
  reset();
  if(rafId) cancelAnimationFrame(rafId);
  rafId=requestAnimationFrame(loop);
}

// ─── boot ─────────────────────────────────────────────────────────────────────
reset();
draw(); // static first frame (menu)
// Start immediately in playing state (menu is implicit; wave starts on button click)
rafId=requestAnimationFrame(loop);
</script>
<script src="leaderboard.js"></script>
