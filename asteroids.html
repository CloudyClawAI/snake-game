<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asteroids — CloudyClaw Games</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="canonical" href="https://cloudyclawai.github.io/snake-game/asteroids.html" />
  <meta name="theme-color" content="#7c6aff" />
  <link rel="stylesheet" href="design-system.css" />
  <style>
    #game-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .game-stage {
      position: relative;
      display: inline-block;
      line-height: 0;
      width: 100%;
    }

    #game-wrap canvas {
      background: var(--bg);
      touch-action: none;
    }

    .overlay .score-display {
      font-size: 1.4rem;
      color: var(--accent);
      font-weight: 700;
    }

    #mobile-controls {
      display: none;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      padding: 0.6rem 0.5rem 1rem;
      gap: 0.5rem;
      user-select: none;
      flex-direction: column;
    }

    .ctrl-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.4rem;
    }

    .ctrl-btn {
      background: var(--surface);
      border: 1px solid var(--border-hi);
      border-radius: 10px;
      color: var(--text);
      font-size: 1.4rem;
      font-family: inherit;
      padding: 0.7rem 0.9rem;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
      min-width: 56px;
      text-align: center;
    }

    .ctrl-btn:active, .ctrl-btn.pressed {
      background: var(--accent);
      border-color: var(--accent);
    }

    .ctrl-fire {
      background: #2a1a44;
      border-color: var(--accent);
      color: var(--accent);
      font-size: 1.1rem;
      font-weight: 700;
    }

    .ctrl-hyper {
      background: #1a2444;
      border-color: #6aafff;
      color: #6aafff;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.7rem 0.6rem;
    }

    @media (max-width: 520px) {
      #mobile-controls { display: flex; }
    }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <a href="index.html" class="nav-brand">Cloudy<span>Claw</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Games</a>
    </div>
  </nav>

  <div class="game-shell">
    <main class="game-main">
      <header class="game-header">
        <a href="index.html" class="back-link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13l-5-5 5-5"/></svg>Back to Hub</a>
        <h1 class="game-title">ASTEROIDS</h1>
        <p class="game-subtitle">Rotate, thrust, and blast asteroids before they hit you.</p>
      </header>

      <div class="stat-grid" id="hud">
        <div class="stat-tile">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score-display">0</span>
        </div>
        <div class="stat-tile">
          <span class="stat-label">Best</span>
          <span class="stat-value" id="hi-display">0</span>
        </div>
        <div class="stat-tile">
          <span class="stat-label">Lives</span>
          <span class="stat-value" id="lives-display">3</span>
        </div>
      </div>

      <div class="canvas-container" id="game-wrap">
        <div class="game-stage">
          <canvas id="c"></canvas>

          <div class="overlay" id="start-screen">
            <h2 class="overlay-title">ASTEROIDS</h2>
            <div class="overlay-body">
              Arrows: Rotate &amp; Thrust &nbsp;|&nbsp; Space: Fire<br>
              H: Hyperspace Jump<br>
              Destroy all asteroids to advance!
            </div>
            <button class="btn btn-primary btn-lg" id="start-btn">LAUNCH</button>
          </div>

          <div class="overlay" id="gameover-screen" style="display:none">
            <h2 class="overlay-title">GAME OVER</h2>
            <div class="score-display" id="go-score">0</div>
            <div class="overlay-body" id="go-hi-msg"></div>
            <button class="btn btn-primary btn-lg" id="restart-btn">PLAY AGAIN</button>
          </div>
        </div>
      </div>

      <div class="text-dim text-center mt-4" style="font-size: 0.85rem;">
        Arrows rotate &amp; thrust &nbsp;|&nbsp; Space fire &nbsp;|&nbsp; H hyperspace
      </div>

      <div id="mobile-controls" class="touch-controls">
  <div class="ctrl-row">
    <button class="ctrl-btn" id="btn-left" aria-label="Rotate Left">&#8592;</button>
    <button class="ctrl-btn ctrl-fire" id="btn-fire" aria-label="Fire">FIRE</button>
    <button class="ctrl-btn" id="btn-right" aria-label="Rotate Right">&#8594;</button>
  </div>
  <div class="ctrl-row">
    <button class="ctrl-btn ctrl-hyper" id="btn-hyper" aria-label="Hyperspace">HYPER</button>
    <button class="ctrl-btn" id="btn-thrust" aria-label="Thrust">&#9650; THRUST</button>
    <div style="min-width:56px"></div>
  </div>
      </div>
    </main>
  </div>

<script src="leaderboard.js"></script>
  <script src="leaderboard-cloud.js"></script>
<script>
(function() {
  'use strict';

  // ── Canvas setup ──────────────────────────────────────────────────────────
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const IDEAL_W = 800, IDEAL_H = 600;

  function resize() {
    const wrap = document.getElementById('game-wrap');
    const maxW = Math.min(wrap.clientWidth - 16, IDEAL_W);
    const scale = maxW / IDEAL_W;
    canvas.width  = IDEAL_W;
    canvas.height = IDEAL_H;
    canvas.style.width  = Math.round(IDEAL_W * scale) + 'px';
    canvas.style.height = Math.round(IDEAL_H * scale) + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  // ── localStorage high score ────────────────────────────────────────────────
  const LS_KEY = 'ccg_asteroids_hi';
  let highScore = parseInt(localStorage.getItem(LS_KEY) || '0', 10);
  document.getElementById('hi-display').textContent = highScore;

  // ── Constants ─────────────────────────────────────────────────────────────
  const W = IDEAL_W, H = IDEAL_H;
  const SHIP_SIZE   = 18;
  const SHIP_TURN   = 0.055;    // radians per frame
  const SHIP_THRUST = 0.18;
  const SHIP_DRAG   = 0.985;
  const BULLET_SPD  = 8;
  const BULLET_LIFE = 65;       // frames
  const INVINCIBLE_FRAMES = 180; // 3 seconds at 60fps
  const RESPAWN_DELAY      = 90;

  const ASTEROID_SIZES = { large: 44, medium: 24, small: 12 };
  const ASTEROID_SCORE = { large: 20, medium: 50, small: 100 };
  const ASTEROID_VERTS = { large: 12, medium: 9, small: 7 };
  const ASTEROID_SPD   = { large: 1.2, medium: 1.9, small: 2.8 };

  // ── Game state ────────────────────────────────────────────────────────────
  let state, ship, bullets, asteroids, particles, score, lives;
  let wave, waveClearing, keys;

  // ── Key tracking ──────────────────────────────────────────────────────────
  keys = {};
  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
      e.preventDefault();
    }
    if (e.code === 'KeyH' && state === 'playing') hyperspace();
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  // ── Ship factory ──────────────────────────────────────────────────────────
  function makeShip() {
    return {
      x: W / 2, y: H / 2,
      vx: 0, vy: 0,
      angle: -Math.PI / 2,   // pointing up
      thrusting: false,
      invincible: INVINCIBLE_FRAMES,
      dead: false,
      respawnTimer: 0,
      shootCooldown: 0
    };
  }

  // ── Asteroid factory ──────────────────────────────────────────────────────
  function makeAsteroid(x, y, size) {
    const r = ASTEROID_SIZES[size];
    const speed = ASTEROID_SPD[size] * (0.7 + Math.random() * 0.6);
    const angle = Math.random() * Math.PI * 2;
    const numVerts = ASTEROID_VERTS[size];
    const verts = [];
    for (let i = 0; i < numVerts; i++) {
      const a = (i / numVerts) * Math.PI * 2;
      const jitter = 0.55 + Math.random() * 0.45;
      verts.push({ x: Math.cos(a) * r * jitter, y: Math.sin(a) * r * jitter });
    }
    return { x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, size, r, verts, rot: Math.random() * Math.PI * 2, rotV: (Math.random() - 0.5) * 0.02 };
  }

  function spawnAsteroids(count) {
    for (let i = 0; i < count; i++) {
      let x, y;
      do {
        x = Math.random() * W;
        y = Math.random() * H;
      } while (dist(x, y, ship.x, ship.y) < 130);
      asteroids.push(makeAsteroid(x, y, 'large'));
    }
  }

  // ── Particle factory ─────────────────────────────────────────────────────
  function makeParticle(x, y, color) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 3.5;
    return { x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 40 + Math.random() * 30, color };
  }

  function explode(x, y, count, color) {
    for (let i = 0; i < count; i++) particles.push(makeParticle(x, y, color));
  }

  // ── Hyperspace ────────────────────────────────────────────────────────────
  function hyperspace() {
    ship.x = Math.random() * W;
    ship.y = Math.random() * H;
    ship.vx = 0; ship.vy = 0;
    // small risk: instant death if near asteroid
    for (const a of asteroids) {
      if (dist(ship.x, ship.y, a.x, a.y) < a.r + SHIP_SIZE) {
        killShip();
        return;
      }
    }
    explode(ship.x, ship.y, 10, '#6aafff');
    ship.invincible = Math.max(ship.invincible, 60);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function dist(x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function wrap(obj) {
    if (obj.x < -60) obj.x = W + 60;
    if (obj.x > W + 60) obj.x = -60;
    if (obj.y < -60) obj.y = H + 60;
    if (obj.y > H + 60) obj.y = -60;
  }

  // ── Shoot ─────────────────────────────────────────────────────────────────
  function shoot() {
    if (ship.dead || ship.shootCooldown > 0) return;
    const tipX = ship.x + Math.cos(ship.angle) * SHIP_SIZE;
    const tipY = ship.y + Math.sin(ship.angle) * SHIP_SIZE;
    bullets.push({
      x: tipX, y: tipY,
      vx: Math.cos(ship.angle) * BULLET_SPD + ship.vx * 0.3,
      vy: Math.sin(ship.angle) * BULLET_SPD + ship.vy * 0.3,
      life: BULLET_LIFE
    });
    ship.shootCooldown = 12;
  }

  // ── Kill ship ─────────────────────────────────────────────────────────────
  function killShip() {
    if (ship.invincible > 0) return;
    explode(ship.x, ship.y, 28, '#ff8855');
    lives--;
    document.getElementById('lives-display').textContent = lives;
    if (lives <= 0) {
      state = 'gameover';
      showGameOver();
      return;
    }
    ship.dead = true;
    ship.respawnTimer = RESPAWN_DELAY;
  }

  // ── Game init ─────────────────────────────────────────────────────────────
  function initGame() {
    state      = 'playing';
    score      = 0;
    lives      = 3;
    wave       = 1;
    waveClearing = false;
    ship       = makeShip();
    bullets    = [];
    asteroids  = [];
    particles  = [];
    updateHUD();
    spawnAsteroids(4);
  }

  function updateHUD() {
    document.getElementById('score-display').textContent = score;
    document.getElementById('lives-display').textContent = lives;
    document.getElementById('hi-display').textContent = highScore;
  }

  function showGameOver() {
    document.getElementById('go-score').textContent = 'SCORE  ' + score;
    if (score >= highScore && score > 0) {
      highScore = score;
      localStorage.setItem(LS_KEY, highScore);
      document.getElementById('go-hi-msg').textContent = '★ New High Score! ★';
    } else {
      document.getElementById('go-hi-msg').textContent = 'Best: ' + highScore;
    }
    document.getElementById('hi-display').textContent = highScore;
    if (typeof Leaderboard !== 'undefined' && score > 0) {
      Leaderboard.saveScore('asteroids', score, { wave });
    }
    document.getElementById('gameover-screen').style.display = 'flex';
  }

  // ── Update ────────────────────────────────────────────────────────────────
  function update() {
    if (state !== 'playing') return;

    // Ship dead / respawn
    if (ship.dead) {
      ship.respawnTimer--;
      if (ship.respawnTimer <= 0) {
        ship = makeShip();
      }
      // update particles only
      updateParticles();
      return;
    }

    // Input
    const rotLeft  = keys['ArrowLeft']  || mobileKeys.left;
    const rotRight = keys['ArrowRight'] || mobileKeys.right;
    const thrust   = keys['ArrowUp']    || mobileKeys.thrust;
    const firing   = keys['Space']      || mobileKeys.fire;

    if (rotLeft)  ship.angle -= SHIP_TURN;
    if (rotRight) ship.angle += SHIP_TURN;
    if (thrust) {
      ship.vx += Math.cos(ship.angle) * SHIP_THRUST;
      ship.vy += Math.sin(ship.angle) * SHIP_THRUST;
    }
    ship.thrusting = thrust;

    // Drag
    ship.vx *= SHIP_DRAG;
    ship.vy *= SHIP_DRAG;

    // Move
    ship.x += ship.vx;
    ship.y += ship.vy;
    wrap(ship);

    if (ship.invincible > 0) ship.invincible--;
    if (ship.shootCooldown > 0) ship.shootCooldown--;

    // Auto-fire
    if (firing) shoot();

    // Bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx; b.y += b.vy;
      b.life--;
      // wrap bullets too
      if (b.x < 0) b.x = W; if (b.x > W) b.x = 0;
      if (b.y < 0) b.y = H; if (b.y > H) b.y = 0;
      if (b.life <= 0) { bullets.splice(i, 1); continue; }

      // Bullet vs asteroid
      let hit = false;
      for (let j = asteroids.length - 1; j >= 0; j--) {
        const a = asteroids[j];
        if (dist(b.x, b.y, a.x, a.y) < a.r) {
          // score
          score += ASTEROID_SCORE[a.size];
          if (score > highScore) {
            highScore = score;
            localStorage.setItem(LS_KEY, highScore);
          }
          updateHUD();

          // explode
          const cnt = a.size === 'large' ? 18 : a.size === 'medium' ? 12 : 8;
          explode(a.x, a.y, cnt, '#ffcc55');

          // split
          if (a.size === 'large') {
            asteroids.push(makeAsteroid(a.x, a.y, 'medium'));
            asteroids.push(makeAsteroid(a.x, a.y, 'medium'));
          } else if (a.size === 'medium') {
            asteroids.push(makeAsteroid(a.x, a.y, 'small'));
            asteroids.push(makeAsteroid(a.x, a.y, 'small'));
          }
          asteroids.splice(j, 1);
          bullets.splice(i, 1);
          hit = true;
          break;
        }
      }
      if (hit) continue;
    }

    // Asteroids
    for (const a of asteroids) {
      a.x += a.vx; a.y += a.vy;
      a.rot += a.rotV;
      wrap(a);
    }

    // Ship vs asteroid collision
    if (ship.invincible <= 0) {
      for (const a of asteroids) {
        if (dist(ship.x, ship.y, a.x, a.y) < a.r + SHIP_SIZE * 0.7) {
          killShip();
          break;
        }
      }
    }

    // Wave complete
    if (asteroids.length === 0 && !waveClearing) {
      waveClearing = true;
      setTimeout(() => {
        wave++;
        spawnAsteroids(Math.min(4 + wave - 1, 10));
        waveClearing = false;
      }, 1500);
    }

    // Thrust particles
    if (ship.thrusting && Math.random() < 0.6) {
      const tailX = ship.x - Math.cos(ship.angle) * SHIP_SIZE;
      const tailY = ship.y - Math.sin(ship.angle) * SHIP_SIZE;
      particles.push({
        x: tailX + (Math.random() - 0.5) * 6,
        y: tailY + (Math.random() - 0.5) * 6,
        vx: -Math.cos(ship.angle) * (1 + Math.random() * 1.5),
        vy: -Math.sin(ship.angle) * (1 + Math.random() * 1.5),
        life: 15 + Math.random() * 10,
        color: '#ff8830'
      });
    }

    updateParticles();
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.96; p.vy *= 0.96;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // ── Draw ──────────────────────────────────────────────────────────────────
  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Starfield (static, seeded)
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    for (const s of stars) {
      ctx.fillRect(s.x, s.y, s.r, s.r);
    }

    // Particles
    for (const p of particles) {
      const alpha = p.life / 50;
      ctx.save();
      ctx.globalAlpha = Math.min(alpha, 1);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Asteroids
    for (const a of asteroids) {
      ctx.save();
      ctx.translate(a.x, a.y);
      ctx.rotate(a.rot);
      ctx.strokeStyle = '#c8c0ff';
      ctx.lineWidth = 1.5;
      ctx.shadowColor = '#7c6aff';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(a.verts[0].x, a.verts[0].y);
      for (let i = 1; i < a.verts.length; i++) ctx.lineTo(a.verts[i].x, a.verts[i].y);
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    // Bullets
    for (const b of bullets) {
      ctx.save();
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#aaffaa';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Ship
    if (!ship.dead) {
      const visible = ship.invincible <= 0 || Math.floor(ship.invincible / 5) % 2 === 0;
      if (visible) {
        ctx.save();
        ctx.translate(ship.x, ship.y);
        ctx.rotate(ship.angle);
        ctx.strokeStyle = '#e0e0ff';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#7c6aff';
        ctx.shadowBlur = 14;
        ctx.beginPath();
        ctx.moveTo(SHIP_SIZE, 0);
        ctx.lineTo(-SHIP_SIZE * 0.7, SHIP_SIZE * 0.55);
        ctx.lineTo(-SHIP_SIZE * 0.4, 0);
        ctx.lineTo(-SHIP_SIZE * 0.7, -SHIP_SIZE * 0.55);
        ctx.closePath();
        ctx.stroke();
        // Thruster flame
        if (ship.thrusting && Math.random() < 0.7) {
          ctx.strokeStyle = '#ff8830';
          ctx.lineWidth = 1.5;
          ctx.shadowColor = '#ff8830';
          ctx.shadowBlur = 12;
          ctx.beginPath();
          ctx.moveTo(-SHIP_SIZE * 0.4, SHIP_SIZE * 0.25);
          ctx.lineTo(-SHIP_SIZE * (0.9 + Math.random() * 0.4), 0);
          ctx.lineTo(-SHIP_SIZE * 0.4, -SHIP_SIZE * 0.25);
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    // Wave label
    ctx.save();
    ctx.fillStyle = 'rgba(124,106,255,0.35)';
    ctx.font = '13px "Segoe UI", system-ui, sans-serif';
    ctx.fillText('WAVE ' + wave, 12, H - 12);
    ctx.restore();
  }

  // ── Stars (static) ───────────────────────────────────────────────────────
  const stars = [];
  for (let i = 0; i < 90; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() < 0.15 ? 1.5 : 0.8
    });
  }

  // ── Mobile keys ────────────────────────────────────────────────────────────
  const mobileKeys = { left: false, right: false, thrust: false, fire: false };

  function bindMobileBtn(id, key) {
    const el = document.getElementById(id);
    if (!el) return;
    const press = () => { mobileKeys[key] = true; el.classList.add('pressed'); };
    const release = () => { mobileKeys[key] = false; el.classList.remove('pressed'); };
    el.addEventListener('touchstart', e => { e.preventDefault(); press(); }, { passive: false });
    el.addEventListener('touchend',   e => { e.preventDefault(); release(); }, { passive: false });
    el.addEventListener('mousedown',  press);
    el.addEventListener('mouseup',    release);
    el.addEventListener('mouseleave', release);
  }

  bindMobileBtn('btn-left',   'left');
  bindMobileBtn('btn-right',  'right');
  bindMobileBtn('btn-thrust', 'thrust');
  bindMobileBtn('btn-fire',   'fire');

  document.getElementById('btn-hyper').addEventListener('touchstart', e => {
    e.preventDefault();
    if (state === 'playing') hyperspace();
  }, { passive: false });
  document.getElementById('btn-hyper').addEventListener('click', () => {
    if (state === 'playing') hyperspace();
  });

  // ── Main loop ─────────────────────────────────────────────────────────────
  let rafId = null;
  function loop() {
    update();
    draw();
    rafId = requestAnimationFrame(loop);
  }

  // ── UI bindings ───────────────────────────────────────────────────────────
  document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('start-screen').style.display = 'none';
    initGame();
    if (!rafId) loop();
  });

  document.getElementById('restart-btn').addEventListener('click', () => {
    document.getElementById('gameover-screen').style.display = 'none';
    initGame();
  });

  // ── Init idle draw ────────────────────────────────────────────────────────
  // Draw stars on load
  (function idleDraw() {
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(s.x, s.y, s.r, s.r);
    }
  })();

})();
</script>
</body>
</html>
