<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudyClaw Games</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="canonical" href="https://cloudyclawai.github.io/snake-game/" />
  <meta name="theme-color" content="#7c6aff" />
  <meta name="description" content="Browser games — no downloads, no installs, just play." />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="design-system.css" />
</head>
<body>

  <nav class="nav-bar">
    <a href="index.html" class="nav-brand">Cloudy<span>Claw</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-link active">Games</a>
      <a href="#leaderboard" class="nav-link">Leaderboard</a>
      <button id="install-btn" class="btn btn-secondary btn-sm" style="display:none">Install</button>
    </div>
  </nav>

  <header class="hub-header">
    <div class="hub-hero">
      <h1 class="hub-title">Cloudy<span>Claw</span> Games</h1>
      <p class="hub-subtitle">The ultimate browser arcade. No downloads, no installs, just pure play.</p>
    </div>
    
    <div class="hub-controls">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="hub-search" placeholder="Search games, genres, or tags..." aria-label="Search games" />
      </div>
      <div class="category-filters">
        <button class="category-chip active" data-category="All">All</button>
        <button class="category-chip" data-category="Arcade">Arcade</button>
        <button class="category-chip" data-category="Puzzle">Puzzle</button>
        <button class="category-chip" data-category="Classic">Classic</button>
        <button class="category-chip" data-category="Strategy">Strategy</button>
        <button class="category-chip" data-category="Multiplayer">Multiplayer</button>
        <button class="category-chip" data-category="Skill">Skill</button>
      </div>
    </div>
  </header>

  <div class="game-shell">
    <main class="hub-grid">
      <!-- Games will be rendered here by Hub.init() -->
    </main>

    <aside class="game-sidebar">
      <div class="panel" id="leaderboard">
        <h2 class="panel-title">🏆 Top Scores</h2>
        <div id="lb-hub" class="lb-hub-summary"></div>
      </div>

      <div id="lb-global-panel" class="panel mt-4" style="display:none">
        <h3 class="panel-title">🌐 Global Leaders</h3>
        <div class="lb-game-picker">
          <select id="lb-game-select" aria-label="Select game for global leaderboard" class="btn btn-secondary btn-sm btn-full" style="text-align: left;"></select>
        </div>
        <div id="lb-global-list" class="lb-global-container mt-2"></div>
        <div id="lb-nick-area" class="lb-nick-area"></div>
      </div>

      <div class="ad-slot">
        <div class="ad-slot-label">Sponsor</div>
        <div id="carbonads"></div>
        <a id="house-ad" class="house-ad" href="mailto:hello@cloudyclawgames.com" onclick="trackAdImpression()">
          <div class="house-ad-icon">☁</div>
          <div class="house-ad-body">
            <strong>Advertise here</strong>
            <span>Reach game-loving players worldwide</span>
          </div>
        </a>
      </div>
    </aside>

  </div>

  <footer style="text-align: center; padding: 4rem 1rem; color: var(--text-dim); font-size: 0.85rem; border-top: 1px solid var(--border); margin-top: 4rem;">
    CloudyClaw Games &mdash; vanilla HTML5 &bull; no dependencies
  </footer>

  <script src="games.js"></script>
  <script src="leaderboard.js"></script>
  <script src="leaderboard-cloud.js"></script>
  <script>
    // Hub rendering and search/filter logic
    const Hub = (() => {
      const state = {
        search: '',
        category: 'All',
        games: GAMES,
        engagement: {},
        globalBest: {}
      };

      function render() {
        const main = document.querySelector('.hub-grid');
        if (!main) return;

        const sorted = sortGames(state.games);
        const filtered = sorted.filter(g => {
          const matchesSearch = g.title.toLowerCase().includes(state.search.toLowerCase()) || 
                               g.description.toLowerCase().includes(state.search.toLowerCase()) ||
                               g.tags.some(t => t.toLowerCase().includes(state.search.toLowerCase()));
          const matchesCategory = state.category === 'All' || g.categories.includes(state.category);
          return matchesSearch && matchesCategory;
        });

        if (state.category === 'All' && state.search === '') {
          renderFullHub(main);
        } else {
          renderSearchResults(main, filtered);
        }
      }

      function renderFullHub(container) {
        const games = sortGames(state.games);

        container.style.display = 'block';
        container.innerHTML = `
          <section class="hub-section">
            <h2 class="section-title">Most Liked Games</h2>
            <div class="shelf">
              ${games.map(renderCard).join('')}
            </div>
          </section>
        `;
      }

      function renderSearchResults(container, games) {
        container.style.display = 'grid';
        if (games.length === 0) {
          container.innerHTML = `<div class="empty-state">No games found matching "${state.search}" in ${state.category}</div>`;
          return;
        }
        container.innerHTML = games.map(renderCard).join('');
      }

      function renderCard(g) {
        const best = Leaderboard.getBest(g.key);
        const engagement = state.engagement[g.key] || GameEngagement.getSummary(g.key);
        const global = state.globalBest[g.key];
        const globalScore = global?.score || 0;
        const globalName = global?.nickname || 'No leader yet';
        const reaction = GameEngagement.getReaction(g.key);
        return `
          <div class="card" data-game-key="${g.key}">
            <div class="card-icon">${g.icon}</div>
            <h3 class="card-title">${g.title}</h3>
            <p class="card-desc">${g.description}</p>
            <div class="card-score-grid">
              <div class="card-score">Your best <span>${best ? best.toLocaleString() : '—'}</span></div>
              <div class="card-score">Global best <span>${globalScore ? globalScore.toLocaleString() : '—'}</span></div>
              <div class="card-leader">Leader <span>${escapeHtml(globalName)}</span></div>
            </div>
            <div class="card-engagement" aria-label="${g.title} community stats">
              <button class="vote-btn${reaction === 'like' ? ' active' : ''}" type="button" data-reaction="like" data-game="${g.key}" aria-label="Like ${g.title}">👍 <span>${engagement.likes}</span></button>
              <button class="vote-btn${reaction === 'dislike' ? ' active' : ''}" type="button" data-reaction="dislike" data-game="${g.key}" aria-label="Dislike ${g.title}">👎 <span>${engagement.dislikes}</span></button>
              <span class="play-count">${engagement.plays.toLocaleString()} plays</span>
            </div>
            <div class="card-meta">
              ${g.tags.map(t => `<span class="chip">${t}</span>`).join('')}
            </div>
            <a class="btn btn-primary mt-4 play-link" data-game="${g.key}" href="${g.href}">▶ Play</a>
          </div>
        `;
      }

      function sortGames(games) {
        return [...games].sort((a, b) => {
          const aStats = state.engagement[a.key] || GameEngagement.getSummary(a.key);
          const bStats = state.engagement[b.key] || GameEngagement.getSummary(b.key);
          const aScore = aStats.likes - aStats.dislikes;
          const bScore = bStats.likes - bStats.dislikes;
          return bScore - aScore || bStats.plays - aStats.plays || a.title.localeCompare(b.title);
        });
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      async function refreshCloudStats() {
        if (typeof CloudLeaderboard === 'undefined' || !CloudLeaderboard.configured) return;
        const keys = state.games.map(g => g.key);
        const [engagement, globalBest] = await Promise.all([
          CloudLeaderboard.getEngagementSummary(keys),
          CloudLeaderboard.getGlobalBestDetails(keys)
        ]);
        state.engagement = GameEngagement.mergeSummaries(engagement);
        state.globalBest = globalBest;
        render();
      }

      function init() {
        const searchInput = document.getElementById('hub-search');
        const categoryChips = document.querySelectorAll('.category-chip');

        searchInput?.addEventListener('input', (e) => {
          state.search = e.target.value;
          render();
        });

        categoryChips.forEach(chip => {
          chip.addEventListener('click', () => {
            categoryChips.forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            state.category = chip.dataset.category;
            render();
          });
        });

        document.addEventListener('click', (event) => {
          const vote = event.target.closest('.vote-btn');
          if (vote) {
            const updated = GameEngagement.setReaction(vote.dataset.game, vote.dataset.reaction);
            state.engagement = { ...state.engagement, [vote.dataset.game]: updated };
            render();
            return;
          }

          const playLink = event.target.closest('.play-link');
          if (playLink) {
            GameEngagement.recordPlay(playLink.dataset.game);
          }
        });

        render();
        refreshCloudStats();
      }

      return { init };
    })();

    Hub.init();
    Leaderboard.renderHubSummary('lb-hub');

    // Global leaderboard panel — only shown when Supabase is configured
    (async () => {
      if (!CloudLeaderboard.configured) return;
      const panel = document.getElementById('lb-global-panel');
      if (panel) panel.style.display = 'block';

      const sel = document.getElementById('lb-game-select');
      if (sel) {
        Leaderboard.getActiveGames().forEach(g => {
          const opt = document.createElement('option');
          opt.value = g.key;
          opt.textContent = g.label;
          sel.appendChild(opt);
        });
        const loadGame = async () => {
          await CloudLeaderboard.renderGlobalWidget(sel.value, 'lb-global-list', 10);
        };
        sel.addEventListener('change', loadGame);
        await loadGame();
      }

      CloudLeaderboard.renderNicknameForm('lb-nick-area');
    })();

    // PWA install prompt
    let deferredPrompt;
    const installBtn = document.getElementById('install-btn');
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'block';
    });
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') installBtn.style.display = 'none';
      deferredPrompt = null;
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // Ad slot: hide house ad if Carbon Ads loads real content
    const carbonEl = document.getElementById('carbonads');
    const houseAd = document.getElementById('house-ad');
    if (carbonEl && houseAd) {
      new MutationObserver(() => {
        if (carbonEl.childElementCount > 0) houseAd.style.display = 'none';
      }).observe(carbonEl, { childList: true });
    }

    // Lightweight CTR tracker (localStorage — no external dependencies)
    function trackAdImpression() {
      try {
        const d = JSON.parse(localStorage.getItem('ad_stats') || '{}');
        d.clicks = (d.clicks || 0) + 1;
        d.lastClick = new Date().toISOString();
        localStorage.setItem('ad_stats', JSON.stringify(d));
      } catch (_) {}
    }
    // Track page view for impression metric
    try {
      const d = JSON.parse(localStorage.getItem('ad_stats') || '{}');
      d.impressions = (d.impressions || 0) + 1;
      localStorage.setItem('ad_stats', JSON.stringify(d));
    } catch (_) {}
  </script>
</body>
</html>
